<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>WENDIO — Impression des cartes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Écran ── */
    body { font-family: 'Segoe UI', sans-serif; background: #f4e7d3; padding: 16px; }

    .controls {
      max-width: 297mm;
      margin: 0 auto 14px;
      background: white;
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,.1);
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-end;
    }
    .controls-section { display: flex; flex-direction: column; gap: 6px; }
    .controls-titre { font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: #999; font-weight: 700; }

    /* Sélecteur nombre de cartes */
    .nb-selector { display: flex; gap: 6px; }
    .btn-nb {
      padding: 8px 16px; border: 2px solid #ddd; border-radius: 6px;
      background: #fafafa; cursor: pointer; font-size: .88rem; font-weight: 700;
      transition: .2s; white-space: nowrap;
    }
    .btn-nb:hover { border-color: #5d4037; }
    .btn-nb.actif { background: #5d4037; color: white; border-color: #5d4037; }

    /* Sélecteur clan */
    .clan-selector { display: flex; flex-wrap: wrap; gap: 6px; }
    .btn-clan {
      padding: 7px 12px; border: 2px solid #ddd; border-radius: 6px;
      background: #fafafa; cursor: pointer; font-size: .88rem; font-weight: 700;
      transition: .2s; display: flex; align-items: center; gap: 5px;
    }
    .btn-clan:hover { border-color: var(--c); }
    .btn-clan.actif { background: var(--c); color: white; border-color: var(--c); }
    .btn-clan.actif .wendat { opacity: .85; }
    .wendat { font-size: .7rem; font-weight: normal; font-style: italic; }

    /* Boutons action */
    .btn-bar { display: flex; gap: 8px; align-items: flex-end; margin-left: auto; }
    .btn-bar button { padding: 9px 20px; border: none; border-radius: 6px; font-weight: 700; font-size: .92rem; cursor: pointer; }
    .btn-regen { background: #5d4037; color: white; }
    .btn-print { background: #d35400; color: white; }
    .btn-regen:hover, .btn-print:hover { opacity: .85; }

    /* ── Pages ── */
    .page {
      background: white;
      margin: 0 auto;
      display: grid;
      gap: 4mm;
    }
    .page.n1 {
      width: 210mm; height: 297mm;
      padding: 10mm;
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      --cell-font: 16pt;
      --label-w: 2.2rem;
      --lbl-font: 13pt;
      --head-font: 13pt;
      --sub-font: 8pt;
      --band-font: 11pt;
      --band-sub: 8.5pt;
    }
    .page.n2 {
      width: 297mm; height: 210mm;
      padding: 8mm;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
      --cell-font: 11pt;
      --label-w: 1.6rem;
      --lbl-font: 10pt;
      --head-font: 10pt;
      --sub-font: 6.5pt;
      --band-font: 8.5pt;
      --band-sub: 7pt;
    }
    .page.n4 {
      width: 210mm; height: 297mm;
      padding: 6mm;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      --cell-font: 8pt;
      --label-w: 1.3rem;
      --lbl-font: 8pt;
      --head-font: 10pt;
      --sub-font: 6.5pt;
      --band-font: 8pt;
      --band-sub: 6.5pt;
    }

    /* ── Carte ── */
    .carte {
      border: 1.5px solid #5d4037;
      border-radius: 2mm;
      padding: 2.5mm;
      display: flex; flex-direction: column; gap: 1.8mm;
      min-height: 0; overflow: hidden;
    }
    .carte.avec-clan { border-width: 2px; border-color: var(--clan-c); }

    /* En-tête */
    .carte-entete { flex-shrink: 0; text-align: center; }
    .carte-jeu     { font-size: var(--head-font, 10pt); font-weight: 900; letter-spacing: .06em; color: #5d4037; }
    .carte-consigne { font-size: var(--sub-font, 6.5pt); color: #5d4037; margin-top: 1px; font-weight: 600; }

    /* Bandeau clan */
    .clan-bandeau {
      display: none;
      align-items: center; justify-content: center; gap: 5px;
      padding: 2mm 3mm; border-radius: 1.5mm; color: white; flex-shrink: 0;
    }
    .clan-bandeau.visible { display: flex; }
    .clan-bandeau .clan-icone  { font-size: var(--band-font, 8pt); }
    .clan-bandeau .clan-nom    { font-size: var(--band-font, 8pt); font-weight: 800; letter-spacing: .03em; }
    .clan-bandeau .clan-wendat { font-size: var(--band-sub, 6.5pt); font-style: italic; opacity: .9; }
    .clan-bandeau .clan-obj    { font-size: var(--band-sub, 6.5pt); background: rgba(255,255,255,.22); padding: 1px 5px; border-radius: 3px; }

    /* ── Grille bingo ── */
    .bingo-grid {
      display: grid;
      grid-template-columns: var(--label-w, 1.3rem) repeat(6, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 1.5px;
      background: #5d4037;
      padding: 2px;
      border-radius: 2px;
      flex: 1; min-height: 0;
    }
    .row-label {
      color: white; font-weight: 900; font-size: var(--lbl-font, 8pt);
      display: flex; align-items: center; justify-content: center;
    }
    .cell {
      background: white;
      display: flex; justify-content: center; align-items: center;
      font-size: var(--cell-font, 8pt); font-weight: 900;
    }

    /* Cases cibles clan */
    .cell.cible {
      background: var(--clan-bg, #fff8e1);
      outline: 1.5px solid var(--clan-c, #d35400);
      outline-offset: -1.5px;
    }

    /* ── Cœur fusionné — mosaïque 2×2 d'animaux ── */
    .coeur-merged {
      background: #f0ebe2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      overflow: hidden;
      gap: 1px;
      padding: 2px;
    }
    .coeur-img-wrap {
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; background: #f0ebe2; min-height: 0;
    }
    .coeur-img-wrap.ours { background: #f0ebe2; }
    .coeur-img-wrap img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
    }

    /* ── Légende ── */
    .legende { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5mm; flex-shrink: 0; }
    .clan-item {
      font-size: 6pt; border: 1.2px solid #ddd;
      border-radius: 1.5mm; padding: 1mm 1.5mm;
    }
    .clan-item.actif {
      border-color: var(--clan-c);
      background: var(--clan-bg);
      font-weight: bold;
      box-shadow: 0 0 0 1px var(--clan-c);
    }

    /* ── Impression ──
       Force le rendu couleur des fonds (par défaut Chrome/Firefox/Safari
       n'impriment PAS les background-color, ce qui rend invisibles le texte
       blanc des row-label et clan-bandeau). */
    .row-label, .clan-bandeau, .bingo-grid, .cell.cible,
    .clan-item.actif, .coeur-merged, .coeur-img-wrap {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    @media print {
      body { background: white; padding: 0; }
      .controls { display: none; }
      .page { margin: 0; }
    }
  </style>
  <style id="print-style">
    @media print { @page { size: A4 portrait; margin: 0; } }
  </style>
</head>
<body>


<div class="controls">

  <div class="controls-section">
    <div class="controls-titre" data-i18n="imprimer.nb_titre">Nombre de cartes</div>
    <div class="nb-selector">
      <button class="btn-nb" id="btn-nb-1" onclick="setNb(1)" data-i18n="imprimer.nb_1">1 carte</button>
      <button class="btn-nb" id="btn-nb-2" onclick="setNb(2)" data-i18n="imprimer.nb_2">2 cartes — paysage</button>
      <button class="btn-nb actif" id="btn-nb-4" onclick="setNb(4)" data-i18n="imprimer.nb_4">4 cartes</button>
    </div>
  </div>

  <div class="controls-section">
    <div class="controls-titre" data-i18n="imprimer.clan_titre">Clan</div>
    <div class="clan-selector" id="clan-selector"></div>
  </div>

  <div class="btn-bar">
    <button class="btn-regen" onclick="regenerer()" data-i18n="imprimer.btn_regen">&#x1F504; Nouvelles cartes</button>
    <button class="btn-print" onclick="window.print()" data-i18n="imprimer.btn_print">&#x1F5A8;&#xFE0F; Imprimer</button>
  </div>

</div>

<div class="page n4" id="page"></div>

<script src="data.js"></script>
<script src="i18n.js"></script>
<script>
  'use strict';
  let clanChoisi = null;
  let nbCartes   = 4;

  // Ordre d'affichage dans la mosaïque 2×2 (haut-gauche → bas-droite)
  // COEUR_CLAN vient de data.js
  const COEUR_ORDRE = ['Tortue', 'Ours', 'Loup', 'Chevreuil'];

  // ── Couleurs par clan ─────────────────────────────────────────────────
  function clanCouleur(nom) {
    const c = { Chevreuil: '#27ae60', Loup: '#2980b9', Ours: '#8e44ad', Tortue: '#d35400' };
    return c[nom] || '#5d4037';
  }
  function clanCouleurBg(nom) {
    const c = { Chevreuil: '#eafaf1', Loup: '#eaf3fb', Ours: '#f5eef8', Tortue: '#fef5ec' };
    return c[nom] || '#fff8e1';
  }

  // ── Sélecteur nombre de cartes ────────────────────────────────────────
  function setNb(n) {
    nbCartes = n;
    [1, 2, 4].forEach(x => {
      document.getElementById('btn-nb-' + x).classList.toggle('actif', x === n);
    });
    document.getElementById('print-style').textContent = n === 2
      ? '@media print { @page { size: A4 landscape; margin: 0; } }'
      : '@media print { @page { size: A4 portrait; margin: 0; } }';
    document.getElementById('page').className = 'page n' + n;
    regenerer();
  }

  // ── Sélecteur clan ────────────────────────────────────────────────────
  function initSelector() {
    const sel = document.getElementById('clan-selector');

    const btnGen = document.createElement('button');
    btnGen.className = 'btn-clan actif';
    btnGen.id = 'btn-generique';
    btnGen.style.setProperty('--c', '#5d4037');
    const genIcon = document.createTextNode('\uD83D\uDCCB ');
    const genSpan = document.createElement('span');
    genSpan.setAttribute('data-i18n', 'imprimer.generique');
    genSpan.textContent = t('imprimer.generique');
    btnGen.append(genIcon, genSpan);
    btnGen.onclick = () => setClan(null);
    sel.appendChild(btnGen);

    const btnMix = document.createElement('button');
    btnMix.className = 'btn-clan';
    btnMix.id = 'btn-melange';
    btnMix.style.setProperty('--c', '#555');
    const mixIcon = document.createTextNode('\uD83D\uDD00 ');
    const mixSpan = document.createElement('span');
    mixSpan.setAttribute('data-i18n', 'imprimer.melange');
    mixSpan.textContent = t('imprimer.melange');
    btnMix.append(mixIcon, mixSpan);
    btnMix.onclick = () => setClan('melange');
    sel.appendChild(btnMix);

    Object.entries(CLANS).forEach(([nom, clan]) => {
      const btn = document.createElement('button');
      btn.className = 'btn-clan';
      btn.id = 'btn-' + nom;
      btn.style.setProperty('--c', clanCouleur(nom));
      const icon  = document.createTextNode(clan.icon + ' ');
      const span  = document.createElement('span');
      const strong = document.createElement('strong');
      strong.textContent = nom;
      const wend  = document.createElement('span');
      wend.className   = 'wendat';
      wend.textContent = ' ' + clan.wendat;
      span.append(strong, wend);
      btn.append(icon, span);
      btn.onclick = () => setClan(nom);
      sel.appendChild(btn);
    });
  }

  function setClan(clan) {
    clanChoisi = clan;
    document.querySelectorAll('.btn-clan').forEach(b => b.classList.remove('actif'));
    const id = clan === null ? 'btn-generique' : clan === 'melange' ? 'btn-melange' : 'btn-' + clan;
    document.getElementById(id).classList.add('actif');
    regenerer();
  }

  // ── Génération ────────────────────────────────────────────────────────
  function regenerer() {
    const page = document.getElementById('page');
    page.replaceChildren();

    if (clanChoisi === 'melange') {
      // Un de chaque clan — jusqu'à nbCartes
      const clans = Object.keys(CLANS).slice(0, nbCartes);
      clans.forEach(nom => page.appendChild(creerCarte(nom)));
    } else {
      for (let i = 0; i < nbCartes; i++) {
        page.appendChild(creerCarte(clanChoisi));
      }
    }
  }

  function creerCarte(clan) {
    const donnees   = genererCarte();
    const couleur   = clan && clan !== 'melange' ? clanCouleur(clan) : '#5d4037';
    const couleurBg = clan && clan !== 'melange' ? clanCouleurBg(clan) : '#fff8e1';
    const infoClan  = clan && clan !== 'melange' ? CLANS[clan] : null;

    const div = document.createElement('div');
    div.className = infoClan ? 'carte avec-clan' : 'carte';
    div.style.setProperty('--clan-c', couleur);
    div.style.setProperty('--clan-bg', couleurBg);

    // ── En-tête ──
    const entete = document.createElement('div');
    entete.className = 'carte-entete';
    const titre = document.createElement('div');
    titre.className = 'carte-jeu';
    titre.setAttribute('data-i18n', 'imprimer.carte_titre');
    titre.textContent = t('imprimer.carte_titre');
    const consigne = document.createElement('div');
    consigne.className = 'carte-consigne';
    consigne.setAttribute('data-i18n', 'imprimer.carte_consigne');
    consigne.textContent = t('imprimer.carte_consigne');
    entete.append(titre, consigne);
    div.appendChild(entete);

    // ── Bandeau clan ──
    const bandeau = document.createElement('div');
    bandeau.className = infoClan ? 'clan-bandeau visible' : 'clan-bandeau';
    bandeau.style.background = couleur;
    if (infoClan) {
      const icone = document.createElement('span');
      icone.className = 'clan-icone';
      icone.textContent = infoClan.icon;
      const nomEl = document.createElement('span');
      nomEl.className = 'clan-nom';
      nomEl.textContent = clan;
      const wendEl = document.createElement('span');
      wendEl.className = 'clan-wendat';
      wendEl.textContent = infoClan.wendat;
      const objEl = document.createElement('span');
      objEl.className = 'clan-obj';
      objEl.setAttribute('data-i18n', 'clan.' + clan + '.victoire');
      objEl.textContent = (function() {
        const k = 'clan.' + clan + '.victoire';
        const tx = t(k);
        return (tx && tx !== k) ? tx : infoClan.label;
      })();
      bandeau.append(icone, nomEl, wendEl, objEl);
    }
    div.appendChild(bandeau);

    // ── Grille ──
    const grid = document.createElement('div');
    grid.className = 'bingo-grid';
    let coeurAjoute = false;

    LIGNES.forEach((ligne, ligneIdx) => {
      const label = document.createElement('div');
      label.className = 'row-label';
      label.style.background = CONFIG[ligne].couleur;
      label.textContent = ligne;
      grid.appendChild(label);

      for (let col = 0; col < 6; col++) {
        if (estCoeur(ligne, col)) {
          if (!coeurAjoute) {
            grid.appendChild(creerCoeurMosaique());
            coeurAjoute = true;
          }
          continue; // toujours ignorer les 3 autres cases cœur
        }
        const val  = valeurCase(donnees, ligne, col);
        const cell = document.createElement('div');
        cell.className   = estCible(clan, ligneIdx, col) ? 'cell cible' : 'cell';
        cell.textContent = val || '';
        grid.appendChild(cell);
      }
    });

    div.appendChild(grid);

    // ── Légende ──
    const legende = document.createElement('div');
    legende.className = 'legende';
    Object.entries(CLANS).forEach(([nom, c]) => {
      const item = document.createElement('div');
      item.className = nom === clan ? 'clan-item actif' : 'clan-item';
      item.style.setProperty('--clan-c', clanCouleur(nom));
      item.style.setProperty('--clan-bg', clanCouleurBg(nom));
      const icon   = document.createTextNode(c.icon + ' ');
      const strong = document.createElement('strong');
      strong.textContent = nom;
      const labelKey = 'clan.' + nom + '.victoire';
      const labelTxt = t(labelKey);
      const labelSpan = document.createElement('span');
      labelSpan.setAttribute('data-i18n', labelKey);
      labelSpan.textContent = (labelTxt && labelTxt !== labelKey) ? labelTxt : c.label;
      item.append(icon, strong, document.createTextNode(' \u2014 '), labelSpan);
      legende.appendChild(item);
    });
    div.appendChild(legende);

    return div;
  }

  // Suppression fond noir Ours par flood fill — partagé entre toutes les cartes
  let oursDataUrl = null;
  function prepareOursImage(imgEl) {
    if (oursDataUrl) { imgEl.src = oursDataUrl; return; }
    const src = new Image();
    src.onload = function () {
      try {
        const W = src.width, H = src.height;
        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(src, 0, 0);
        const imgData = ctx.getImageData(0, 0, W, H);
        const d = imgData.data;
        const SEUIL = 40;
        const fond = new Uint8Array(W * H);
        const queue = [];
        const essayer = (x, y) => {
          const k = y * W + x;
          if (fond[k]) return;
          const i = k * 4;
          if (Math.max(d[i], d[i+1], d[i+2]) < SEUIL) { fond[k] = 1; queue.push(k); }
        };
        for (let x = 0; x < W; x++) { essayer(x, 0); essayer(x, H - 1); }
        for (let y = 1; y < H - 1; y++) { essayer(0, y); essayer(W - 1, y); }
        let qi = 0;
        while (qi < queue.length) {
          const k = queue[qi++];
          const x = k % W, y = (k / W) | 0;
          if (x > 0)     essayer(x - 1, y);
          if (x < W - 1) essayer(x + 1, y);
          if (y > 0)     essayer(x, y - 1);
          if (y < H - 1) essayer(x, y + 1);
        }
        for (let k = 0; k < W * H; k++) if (fond[k]) d[k * 4 + 3] = 0;
        ctx.putImageData(imgData, 0, 0);
        oursDataUrl = canvas.toDataURL('image/png');
        document.querySelectorAll('img[data-ours]').forEach(el => el.src = oursDataUrl);
      } catch (e) { /* fallback silencieux */ }
    };
    src.src = 'sources/Ours.png';
  }

  // Mosaïque 2×2 d'images animaux fusionnant les 4 cases cœur
  function creerCoeurMosaique() {
    const merged = document.createElement('div');
    merged.className = 'cell coeur-merged';
    // Position explicite dans la CSS grid : colonnes 4-5, lignes 3-4
    merged.style.gridColumn = '4 / 6';
    merged.style.gridRow    = '3 / 5';

    COEUR_ORDRE.forEach(clan => {
      const wrap = document.createElement('div');
      wrap.className = 'coeur-img-wrap' + (clan === 'Ours' ? ' ours' : '');
      const img = document.createElement('img');
      img.alt = clan;
      if (clan === 'Ours') {
        img.dataset.ours = '1';
        img.src = 'sources/Ours.png';
        prepareOursImage(img);
      } else {
        img.src = 'sources/' + clan + '.png';
      }
      wrap.appendChild(img);
      merged.appendChild(wrap);
    });

    return merged;
  }

  // Cases cibles à surligner selon le clan
  function estCible(clan, ligneIdx, colIdx) {
    if (!clan || clan === 'melange') return false;
    const ligne = LIGNES[ligneIdx];
    const v = CLANS[clan].victoire;
    if (v === 'coins')  return (ligneIdx === 0 || ligneIdx === 5) && (colIdx === 0 || colIdx === 5);
    if (v === 'carre')  return ligneIdx >= 1 && ligneIdx <= 4 && colIdx >= 1 && colIdx <= 4 && !estCoeur(ligne, colIdx);
    if (v === 'pleine') return !estCoeur(ligne, colIdx);
    return false;
  }

  initSelector();
  regenerer();
</script>
<script src="/_widget-loader.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WENDIO — Meneur de Jeu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0c0a07;
      --surface: #181008;
      --card:    #211508;
      --border:  #362010;
      --gold:    #c07808;
      --gold-lt: #e8a828;
      --text:    #ede0c8;
      --muted:   #907248;
      --dim:     #4e3018;
      --green:   #1e9050;
      --green-lt:#28c86a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      background-image: radial-gradient(ellipse 100% 50% at 50% 0%, #1c1005 0%, #0c0a07 65%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 48px;
      gap: 0;
    }

    /* ── Colonne gauche (portrait = pleine largeur, paysage = sidebar) ── */
    #colonne-gauche {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    h1 {
      font-family: 'Cinzel', Georgia, serif;
      text-align: center;
      font-size: 1.8rem;
      letter-spacing: .22em;
      background: linear-gradient(135deg, var(--gold-lt) 0%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(192,120,8,.22));
    }

    /* ── Mode toggle ── */
    .mode-bar {
      display: flex;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 4px;
      max-width: 300px;
      margin: 0 auto;
    }
    .btn-mode {
      flex: 1;
      padding: 9px 14px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 600;
      font-size: .85rem;
      border-radius: 50px;
      transition: all .22s;
      letter-spacing: .03em;
      font-family: inherit;
    }
    .btn-mode.actif {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 100%);
      color: #0c0a07;
      box-shadow: 0 2px 12px rgba(192,120,8,.4);
      font-weight: 700;
    }

    /* ── Panneau en ligne ── */
    #panneau-online {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }
    /* Le btn « Créer la partie » n'est utile qu'en mode online.
       En local, le choix de clan active directement le bouton TIRER. */
    body:not(.mode-online) #btn-creer-partie { display: none; }
    body:not(.mode-online) .clan-choix-titre.online-only { display: none; }

    .btn-creer {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-lt) 100%);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px 32px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: block;
      margin: 12px auto 0;
      box-shadow: 0 4px 16px rgba(30,144,80,.35);
      transition: all .2s;
      letter-spacing: .04em;
      font-family: inherit;
    }
    .btn-creer:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(30,144,80,.45); }
    .btn-creer:disabled { opacity: .42; cursor: default; box-shadow: none; transform: none; }

    /* Sélection du clan imposé (meneur) */
    .clan-choix-titre { color: var(--muted); font-size: .85rem; text-align: center; margin-bottom: 12px; }
    .clan-choix-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .btn-clan-meneur {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      cursor: pointer;
      color: var(--text);
      font-weight: 700;
      font-size: .9rem;
      line-height: 1.35;
      text-align: center;
      transition: all .2s;
      font-family: inherit;
    }
    .btn-clan-meneur:hover { border-color: var(--gold); background: #2a1c0c; }
    .btn-clan-meneur.actif {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 100%);
      color: #0c0a07;
      border-color: transparent;
      box-shadow: 0 3px 12px rgba(192,120,8,.35);
    }
    .btn-clan-meneur small { display: block; font-weight: 400; font-size: .76em; opacity: .85; margin-top: 2px; }
    .clan-objectif {
      text-align: center; font-size: .8rem; color: var(--muted);
      font-style: italic; min-height: 18px; margin: 10px 0 4px;
    }

    /* Bannière du clan actif (après création) */
    .clan-actif-banner {
      background: linear-gradient(135deg, rgba(192,120,8,.18), rgba(232,168,40,.12));
      border: 1px solid rgba(192,120,8,.42);
      border-radius: 10px;
      padding: 8px 12px;
      margin-bottom: 14px;
      font-size: .82rem;
      color: var(--text);
      display: none;
      align-items: center;
      gap: 8px;
    }
    .clan-actif-banner.visible { display: flex; }
    .clan-actif-banner strong { color: var(--gold-lt); }

    /* Pill « En ligne » affiché en jeu (quand toggles cachés) */
    .status-online {
      display: none;
      margin-bottom: 12px;
      padding: 6px 14px;
      background: rgba(46,204,113,.12);
      border: 1px solid rgba(46,204,113,.42);
      border-radius: 999px;
      font-size: .72rem;
      color: #80edb5;
      letter-spacing: .18em;
      text-transform: uppercase;
      font-weight: 600;
      width: fit-content;
      align-items: center;
      gap: 6px;
    }
    .status-online.visible { display: inline-flex; }

    .online-actif { display: none; }
    .online-actif.visible { display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: start; }

    .code-label  { font-size: .68rem; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    .code-valeur {
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: .25em;
      background: linear-gradient(135deg, var(--green-lt), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      line-height: 1;
    }
    .lien-rejoin-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .lien-rejoin  { font-size: .7rem; color: var(--dim); word-break: break-all; font-family: monospace; flex: 1; min-width: 0; }
    .btn-copier {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: .78rem;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: .03em;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s, border-color .15s, color .15s, transform .12s;
      white-space: nowrap;
    }
    .btn-copier:hover { background: var(--card); border-color: var(--gold); color: var(--gold-lt); transform: translateY(-1px); }
    .btn-copier:active { transform: translateY(0); }
    .btn-copier.copied { background: rgba(107,142,58,.15); border-color: #6b8e3a; color: #a8c97a; }
    .joueurs-titre { font-size: .72rem; color: var(--muted); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
    .joueur-item  { display: flex; align-items: center; gap: 8px; font-size: .88rem; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .joueur-item:last-child { border: none; }

    .qr-bloc       { text-align: center; }
    .qr-bloc small { display: block; font-size: .68rem; color: var(--muted); margin-top: 6px; letter-spacing: .05em; }
    #qr-rejoindre  { background: white; padding: 8px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 16px rgba(0,0,0,.5); }

    /* Bouton terminer/nouvelle partie — icone compacte dans la btn-bar */
    .btn-arreter {
      background: transparent;
      color: #e05040;
      border: 1px solid #5a2020;
      border-radius: 50%;
      width: 44px; height: 44px;
      font-size: 1.15rem;
      line-height: 1;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }
    .btn-arreter.visible { display: inline-flex; }
    .btn-arreter:hover { background: #5a2020; border-color: #e05040; color: white; transform: scale(1.06); }

    /* Bouton "demo" (spawn joueurs simules pour demonstrer sans audience) */
    .btn-demo-bots {
      background: transparent;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: .8rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 10px;
      transition: all .2s;
      letter-spacing: .02em;
      font-family: inherit;
      width: 100%;
    }
    .btn-demo-bots:hover { background: var(--card); color: var(--gold-lt); border-color: var(--gold); border-style: solid; }
    .btn-demo-bots:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Boutons d'action ── */
    /* btn-bar : icones compactes (action principale + reset) au lieu de
       gros boutons texte. Le de TIRER reste l'element le plus visible. */
    .btn-bar { display: flex; gap: 10px; justify-content: center; align-items: center; }
    .btn-tirer {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 100%);
      color: #0c0a07;
      border: none;
      border-radius: 50%;
      width: 64px; height: 64px;
      font-size: 2rem;
      line-height: 1;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 4px 20px rgba(192,120,8,.4);
      font-family: inherit;
    }
    .btn-tirer:hover  { transform: translateY(-2px) rotate(-12deg); box-shadow: 0 8px 28px rgba(192,120,8,.55); filter: brightness(1.06); }
    .btn-tirer:active { transform: translateY(0) rotate(0); }
    .btn-tirer:disabled { opacity: .28; cursor: default; transform: none; box-shadow: none; filter: none; }
    .btn-reset {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 44px; height: 44px;
      font-size: 1.15rem;
      line-height: 1;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }
    .btn-reset:hover { border-color: var(--muted); color: var(--text); transform: rotate(-90deg); }

    /* ── Carte numéro tiré ── */
    #carte-numero {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 22px 24px;
      display: none;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      position: relative;
      overflow: hidden;
    }
    #carte-numero.visible { display: block; }
    #carte-numero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--ligne-couleur, var(--gold));
      border-radius: 16px 16px 0 0;
    }
    .carte-interieur { display: flex; justify-content: center; gap: 24px; align-items: flex-start; min-height: 0; }
    .carte-droite { display: flex; flex-direction: column; align-items: center; gap: 12px; flex-shrink: 1; min-height: 0; max-height: 100%; }
    .carte-droite img#carte-image { max-height: 100%; object-fit: contain; }
    /* #qrcode retire (support #7) — la carte tiree est dans le popup */

    /* ── Tableau de suivi ── */
    #tableau {
      width: 100%;
      max-width: 680px;
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
      margin-top: 18px;
    }
    #tableau h2 { font-size: .7rem; color: var(--muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: .16em; font-weight: 600; }
    .suivi-grille { display: grid; grid-template-columns: 2rem repeat(12, 1fr); gap: 3px; }
    .suivi-label {
      color: white;
      font-weight: 900;
      font-size: .9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      padding: 5px 0;
      font-family: 'Cinzel', serif;
    }
    .suivi-cell {
      background: #1c1208;
      color: rgba(255,255,255,.45);
      text-align: center;
      padding: 6px 1px;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: 900;
      font-family: 'Cinzel', serif;
      cursor: default;
      transition: all .15s;
      border: 1px solid transparent;
    }
    .suivi-cell.tire  { color: white; cursor: pointer; border-color: rgba(255,255,255,.07); box-shadow: 0 1px 4px rgba(0,0,0,.3); }
    .suivi-cell.tire:hover { opacity: .78; transform: scale(.94); }
    .suivi-cell.actuel { outline: 2px solid rgba(255,255,255,.8); outline-offset: 1px; box-shadow: 0 0 8px rgba(255,255,255,.18); }

    /* ── Mode physique ── */
    body.mode-physique .suivi-cell:not(.tire) {
      cursor: pointer;
    }
    body.mode-physique .suivi-cell:not(.tire):hover {
      background: #2a1e08;
      border-color: var(--gold);
      color: var(--gold-lt);
      transform: scale(1.05);
    }
    body.mode-physique .btn-tirer { display: none; }
    .compteur { text-align: center; margin-top: 14px; font-size: .8rem; color: var(--muted); font-weight: 500; letter-spacing: .05em; }

    /* ── Bandeau classement ── */
    #bandeau-gagnant {
      display: none;
      background: linear-gradient(135deg, #0d3820 0%, #1a5c35 100%);
      border: 1px solid #2ecc71;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 18px;
      box-shadow: 0 0 28px rgba(46,204,113,.2), 0 4px 16px rgba(0,0,0,.4);
    }
    #bandeau-gagnant.visible { display: block; }
    .bandeau-titre {
      font-family: 'Cinzel', serif;
      font-size: .78rem; font-weight: 900;
      letter-spacing: .22em; text-transform: uppercase;
      color: #2ecc71; margin-bottom: 10px;
    }
    .bandeau-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(46,204,113,.12);
      animation: slideIn .4s cubic-bezier(.175,.885,.32,1.275);
    }
    .bandeau-item:last-child  { border-bottom: none; padding-bottom: 0; }
    .bandeau-item:first-child { padding-top: 0; }
    .bandeau-rang     { font-size: 1.3rem; flex-shrink: 0; width: 28px; text-align: center; }
    .bandeau-nom      { font-size: .95rem; font-weight: 700; color: white; }
    .bandeau-clan-info { font-size: .75rem; color: #80edb5; margin-top: 1px; }
    @keyframes slideIn { from { transform: translateY(-8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── Gagnant overlay ── */
    #win-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.92);
      backdrop-filter: blur(6px);
      z-index: 100; justify-content: center; align-items: center;
    }
    #win-overlay.visible { display: flex; }
    .win-card {
      background: linear-gradient(160deg, #1a5c35 0%, #0d3820 100%);
      padding: 50px;
      border-radius: 24px;
      border: 1px solid #2ecc71;
      text-align: center;
      animation: pop .4s cubic-bezier(.175,.885,.32,1.275);
      max-width: 480px; width: 90%;
      box-shadow: 0 0 60px rgba(46,204,113,.25), 0 24px 60px rgba(0,0,0,.7);
    }
    .win-card h2 {
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      margin-bottom: 14px;
      letter-spacing: .1em;
      color: white;
    }
    .win-joueur { font-size: 1.5rem; font-weight: 700; margin-bottom: 14px; color: #80edb5; }
    .win-trophee {
      display: none;
      margin: 6px auto 18px;
      max-width: 220px;
      width: 60%;
      border-radius: 14px;
      box-shadow: 0 14px 38px rgba(0,0,0,.55), 0 0 36px rgba(232,201,108,.22);
      animation: trophyIn .9s cubic-bezier(.22,1,.32,1) .15s both;
    }
    .win-trophee.visible { display: block; }
    @keyframes trophyIn {
      from { opacity: 0; transform: scale(.55) translateY(30px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }
    .win-clan   { font-size: 1rem; color: #58b880; margin-bottom: 28px; }
    .win-card button {
      background: rgba(255,255,255,.1);
      color: white;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 10px;
      padding: 12px 28px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      margin: 5px;
      transition: all .2s;
      letter-spacing: .04em;
      font-family: inherit;
    }
    .win-card button:hover { background: rgba(255,255,255,.2); }
    @keyframes pop { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ── Popup carte tiree (support #7+#9) ──
       Overlay sombre semi-transparent, image grande au centre, auto-dismiss 5s,
       X en haut a droite, clic n'importe ou pour fermer. */
    #popup-carte {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,.78);
      backdrop-filter: blur(6px);
      /* z-index > 9999 du lang-toggle i18n.js et > 1000 de l'auth-widget,
         sinon la croix de fermeture passe dessous (support #7+#9 finition). */
      z-index: 10000;
      padding: 32px;
      cursor: pointer;
      animation: pop-fade .2s ease-out;
    }
    #popup-carte.visible { display: flex; }
    #popup-carte img {
      max-width: min(90vw, 540px);
      max-height: 88vh;
      width: auto; height: auto;
      object-fit: contain;
      border-radius: 18px;
      box-shadow: 0 24px 80px rgba(0,0,0,.7), 0 0 60px rgba(200,132,58,.15);
      animation: pop-zoom .28s cubic-bezier(.22,.8,.4,1);
    }
    #popup-carte .close {
      position: absolute;
      top: 18px; right: 18px;
      width: 42px; height: 42px;
      border: 1px solid rgba(244,231,211,.25);
      border-radius: 50%;
      background: rgba(33,21,8,.7);
      color: var(--text);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      transition: background .15s, transform .12s, border-color .15s;
      display: flex; align-items: center; justify-content: center;
    }
    #popup-carte .close:hover { background: rgba(33,21,8,.95); border-color: var(--gold); transform: scale(1.08); }
    #popup-carte .progress {
      position: absolute;
      bottom: 0; left: 0; height: 3px;
      background: linear-gradient(90deg, var(--ember) 0%, var(--gold-lt) 100%);
      width: 100%;
      transform-origin: left;
      animation: pop-progress 5s linear forwards;
    }
    @keyframes pop-fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pop-zoom { from { opacity: 0; transform: scale(.85); } to { opacity: 1; transform: scale(1); } }
    @keyframes pop-progress { from { transform: scaleX(1); } to { transform: scaleX(0); } }

    /* ── Bouton plein écran ── */
    #btn-fullscreen {
      position: fixed;
      top: 10px; right: 12px;
      z-index: 300;
      background: rgba(33,21,8,.75);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      transition: color .2s, border-color .2s, background .2s;
      backdrop-filter: blur(4px);
    }
    #btn-fullscreen:hover { color: var(--gold-lt); border-color: var(--gold); background: rgba(33,21,8,.95); }
    #btn-fullscreen svg { width: 18px; height: 18px; display: block; }
    #btn-fullscreen .icon-compress { display: none; }
    #btn-fullscreen.actif .icon-expand   { display: none; }
    #btn-fullscreen.actif .icon-compress { display: block; }

    #btn-accueil {
      position: fixed;
      top: 10px; right: 54px;
      z-index: 300;
      background: rgba(33,21,8,.75);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s, border-color .2s, background .2s;
      backdrop-filter: blur(4px);
    }
    #btn-accueil:hover { color: var(--gold-lt); border-color: var(--gold); background: rgba(33,21,8,.95); }
    #btn-accueil svg { width: 18px; height: 18px; display: block; }

    #btn-aide {
      position: fixed;
      top: 10px; right: 96px;
      z-index: 300;
      background: rgba(33,21,8,.75);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 1.1rem;
      transition: color .2s, border-color .2s, background .2s;
      backdrop-filter: blur(4px);
    }
    #btn-aide:hover { color: var(--gold-lt); border-color: var(--gold); background: rgba(33,21,8,.95); }

    /* ── Bandeau compact de configuration (depuis meneur-config.html) ── */
    .bandeau-config {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .82rem;
      color: var(--text);
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin: 8px 0 4px;
      letter-spacing: .02em;
      flex-wrap: wrap;
    }
    .bandeau-config .sep { color: var(--dim); margin: 0 2px; }
    .bandeau-config .edit {
      margin-left: auto;
      color: var(--gold-lt);
      text-decoration: none;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: .95rem;
      transition: background .15s, color .15s;
    }
    .bandeau-config .edit:hover { background: var(--card); color: var(--gold); }

    /* ── Bouton « QR carte mobile » + popup QR (support #16, élargi #21/#22)
       Visible en mode LOCAL (tout tirage) — le meneur offre une carte numerique
       aux joueurs qui scannent. Masqué en online (les joueurs rejoignent via le
       code/QR de la vraie partie). */
    .btn-qr-mobile {
      display: none;
      align-items: center; justify-content: center;
      gap: 6px;
      padding: 7px 12px;
      margin: 4px 0 6px;
      background: var(--surface);
      color: var(--gold-lt);
      border: 1px dashed var(--gold);
      border-radius: 8px;
      font-size: .82rem;
      cursor: pointer;
      transition: background .15s, color .15s, border-style .15s;
    }
    body:not(.mode-online) .btn-qr-mobile { display: inline-flex; }
    .btn-qr-mobile:hover { background: var(--card); color: var(--gold); border-style: solid; }

    #popup-qr-mobile {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,.85);
      backdrop-filter: blur(8px);
      z-index: 10000;
      padding: 32px;
    }
    #popup-qr-mobile.visible { display: flex; }
    #popup-qr-mobile .qr-card {
      background: var(--text);
      color: var(--bg);
      padding: 28px 32px 24px;
      border-radius: 18px;
      box-shadow: 0 24px 80px rgba(0,0,0,.7), 0 0 60px rgba(200,132,58,.18);
      text-align: center;
      max-width: min(92vw, 420px);
      animation: pop-zoom .28s cubic-bezier(.22,.8,.4,1);
    }
    #popup-qr-mobile h3 {
      margin: 0 0 8px;
      font-family: 'Cinzel', serif;
      font-size: 1.25rem;
      color: var(--bg);
    }
    #popup-qr-mobile p {
      margin: 0 0 16px;
      font-size: .9rem;
      color: #444;
      line-height: 1.35;
    }
    #popup-qr-mobile .qr-holder {
      background: white;
      padding: 14px;
      border-radius: 10px;
      display: inline-block;
    }
    #popup-qr-mobile .close {
      position: absolute;
      top: 18px; right: 18px;
      width: 42px; height: 42px;
      border: 1px solid rgba(244,231,211,.25);
      border-radius: 50%;
      background: rgba(33,21,8,.7);
      color: var(--text);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      transition: background .15s, transform .12s, border-color .15s;
      display: flex; align-items: center; justify-content: center;
    }
    #popup-qr-mobile .close:hover { background: rgba(33,21,8,.95); border-color: var(--gold); transform: scale(1.08); }

    /* ── Paysage tablette ── */
    /* Seuil min-height 320 (au lieu de 400) pour que tablettes/iframes
       en paysage etroit (390-400 px) declenchent aussi le layout sidebar
       gauche + grille droite. En dessous de 320 c'est du very-tiny. */
    @media (orientation: landscape) and (min-height: 320px) {
      body {
        flex-direction: row;
        align-items: stretch;
        justify-content: center;
        padding: 12px;
        gap: 14px;
        /* Contraint à la hauteur du viewport : sinon une colonne gauche
           trop haute (code + QR + boutons) pousse le tableau à dépasser,
           ce qui cache la ligne « O » et étire les cases en hauteur. */
        height: 100vh;
        overflow: hidden;
      }

      #colonne-gauche {
        width: 260px;
        max-width: none;
        flex-shrink: 0;
        gap: 8px;
        min-height: 0;
        overflow-y: auto;
      }

      h1 {
        font-size: 1.2rem;
        letter-spacing: .18em;
        margin-bottom: 0;
      }

      .mode-bar { max-width: none; margin: 0; }

      /* Carte tiree dans la sidebar — taille bornee pour rester visible
         peu importe le contenu autour (joueurs list, boutons). La grande
         vue est dans le popup (auto-dismiss 5s). */
      .carte-droite {
        align-self: center;
        justify-content: center;
        min-height: 0;
      }
      .carte-droite #carte-image {
        margin-bottom: 0;
        max-height: 28vh;
        max-width: 220px;
        width: auto;
        object-fit: contain;
      }

      /* En landscape, le carte-numero est au TOP de la sidebar (position
         deplacee). Il garde sa taille naturelle (cappee par max-height
         sur l'image) — pas de flex:1 sinon il pousserait les autres
         elements (joueurs/TIRER) hors viewport. */
      #carte-numero.visible {
        flex: 0 0 auto;
        display: block;
      }
      #carte-numero.visible .carte-interieur {
        min-height: 0;
      }

      #tableau {
        flex: 1;
        max-width: none;
        margin-top: 0;
        display: flex;
        flex-direction: column;
      }
      .suivi-grille { flex: 1; grid-auto-rows: 1fr; align-content: stretch; }

      /* Code online plus compact */
      .code-valeur { font-size: 1.6rem; margin: 0; padding: 2px 0; }
      .code-label { font-size: .65rem; margin-bottom: 2px; }
      .online-actif.visible { grid-template-columns: 1fr; gap: 8px; }
      /* QR visible en paysage — réduit pour tenir dans la sidebar */
      .qr-bloc { display: block; text-align: center; margin-top: 4px; }
      .qr-bloc small { font-size: .62rem; margin-top: 2px; }
      #qr-rejoindre { display: inline-block; }
      #qr-rejoindre canvas, #qr-rejoindre img { width: 72px !important; height: 72px !important; }
      /* Compactage general en landscape pour tenir 100vh sans scroll */
      .joueurs-titre { font-size: .68rem; margin-bottom: 4px; }
      .joueur-item { padding: 3px 0; font-size: .82rem; }
      .btn-demo-bots { padding: 5px 10px; font-size: .76rem; margin-top: 6px; }
      .btn-creer { padding: 8px 14px; font-size: .85rem; margin-top: 8px !important; }
      .btn-arreter { padding: 5px 12px; font-size: .76rem; margin-top: 8px; }
      .lien-rejoin-wrap { margin: 2px 0; }
      .lien-rejoin { font-size: .68rem; line-height: 1.3; }
      .btn-copier { padding: 3px 8px; font-size: .68rem; }
      /* btn-bar plus compact + sticky au bas de la sidebar pour rester
         toujours visible peu importe la quantite de contenu au-dessus
         (joueurs nombreux, qr, etc.). Le bouton de tirage est le critique. */
      .btn-bar {
        position: sticky;
        bottom: 0;
        background: linear-gradient(to top, var(--bg) 65%, transparent 100%);
        padding: 10px 0 6px;
        margin-top: 4px;
        z-index: 5;
      }
      .btn-tirer { width: 54px; height: 54px; font-size: 1.7rem; }
      .btn-reset { width: 38px; height: 38px; font-size: 1rem; }
      .btn-arreter { width: 38px; height: 38px; font-size: .95rem; padding: 0; }
      /* Carte tiree un peu plus compacte pour laisser de la place a la sidebar */
      .carte-droite #carte-image { max-height: 22vh; max-width: 200px; }
    }
  </style>
</head>

<!-- ── Colonne gauche ── -->
<div id="colonne-gauche">

  <h1 data-i18n="meneur.title">WENDIO &#8212; Meneur</h1>

  <!-- Bouton « QR carte mobile » (support #16) — visible UNIQUEMENT en mode
       physique via CSS. Ouvre une popup avec un QR pointant sur
       joueur.html?mode=local&clan=<clanChoisi>. Chaque scan = carte aleatoire. -->
  <button type="button" class="btn-qr-mobile" id="btn-qr-mobile" onclick="ouvrirPopupQrMobile()"
          data-i18n="meneur.btn_qr_mobile"

  <!-- status-online retire (redondant avec le bandeau-config en haut qui

  <div class="status-online" id="status-online" data-i18n="meneur.status_online" style="display:none !important;">&#127760; Partie en ligne</div>

  <!-- Carte numero tire (place EN HAUT de la sidebar pour rester visible

      </div>
    </div>
  </div>

  <div class="mode-bar" id="barre-connexion">

    <button class="btn-mode"       id="btn-online" onclick="setMode('online')" data-i18n="meneur.btn_online">&#127760; En ligne</button>
  </div>

  <div class="mode-bar" id="barre-tirage" style="margin-top:8px;">
    <button class="btn-mode actif" id="btn-auto"     onclick="setModePhysique(false)" data-i18n="meneur.btn_auto">&#127922; Al&#233;atoire</button>
    <button class="btn-mode"       id="btn-physique" onclick="setModePhysique(true)"  data-i18n="meneur.btn_physique">&#127183; Physique</button>
  </div>

  <!-- Panel online -->
  <div id="panneau-online">
    <div id="online-creation">
      <div class="clan-choix-titre" data-i18n="meneur.clan_choix_titre">Choisissez le clan que les joueurs incarneront&#160;:</div>
      <div class="clan-choix-grid" id="clan-choix-grid"></div>
      <div class="clan-objectif" id="clan-objectif">&#160;</div>
      <button class="btn-creer" id="btn-creer-partie" onclick="creerPartie()" disabled data-i18n="meneur.btn_creer">&#10010; Cr&#233;er la partie</button>
    </div>
    <div class="online-actif" id="online-actif">
      <div>
        <!-- clan-actif-banner retire (redondant avec le bandeau-config). Conserve
             pour ne pas casser le JS, mais display:none. -->
        <div class="clan-actif-banner" id="clan-actif-banner" style="display:none !important;"></div>
        <div id="zone-code">
          <div class="code-label" data-i18n="meneur.code_label">Code de la partie</div>
          <div class="code-valeur" id="code-affiche">----</div>
          <div class="lien-rejoin-wrap">
            <div class="lien-rejoin" id="lien-rejoin"></div>
            <button class="btn-copier" id="btn-copier-lien" type="button" onclick="copierLien()" data-i18n="meneur.btn_copier" data-i18n-attr="title:meneur.btn_copier_title" title="Copier le lien">📋 Copier</button>
          </div>
        </div>
        <div class="joueurs-titre"><span data-i18n="meneur.joueurs_titre">Joueurs connect&#233;s :</span> <strong id="joueurs-count">0</strong></div>
        <div id="joueurs-items"></div>
        <button class="btn-demo-bots" id="btn-demo-bots" type="button" onclick="spawnDemoJoueurs()" data-i18n="meneur.btn_demo_bots" data-i18n-attr="title:meneur.btn_demo_bots_title" title="Ajoute 3 joueurs simules pour faire une demo sans audience" style="display:none;">&#129302; Simuler 3 joueurs</button>
        <button class="btn-creer" id="btn-commencer" onclick="commencerPartie()" style="margin-top:14px;display:none;" disabled data-i18n="meneur.btn_commencer">&#9654;&#65039; Commencer la partie</button>
        <!-- btn-arreter deplace dans la btn-bar sticky en bas (icone compacte) -->
      </div>
      <div class="qr-bloc" id="qr-bloc">
        <div id="qr-rejoindre"></div>
        <small data-i18n="meneur.qr_lien_joueur">Lien joueur</small>

  <!-- Boutons action — icones compactes sticky au bas de la sidebar :
       reset (gauche) | de TIRER (centre, prioritaire) | terminer (droite).

  <div class="btn-bar">

  <!-- Carte numero tire (DEPLACE en HAUT plus haut dans le DOM via l'edit
       du panneau-online ci-dessus — capped en landscape pour ne pas
       bouffer la sidebar). Position originale conservee pour fallback
       portrait mais en pratique le bloc en HAUT prend priorite. -->

    <div id="gagnants-liste"></div>

<script src="qrcode.min.js"></script>
<script src="data.js"></script>
<script src="i18n.js"></script>
<script>
  'use strict';
  let tirages        = [];
  let numeroActuel   = null;
  let modeOnline     = false;
  let modePhysique   = false;
  let socket         = null;
  let codePartie     = null;
  let clanChoisi     = null;
  let partieTerminee = false;

  // ── Mode ──────────────────────────────────────────────────────────────
  function setMode(mode) {
    modeOnline = (mode === 'online');
    document.body.classList.toggle('mode-online', modeOnline);
    document.getElementById('btn-local').classList.toggle('actif', !modeOnline);
    document.getElementById('btn-online').classList.toggle('actif', modeOnline);
    // Quand on switche en online avant que la partie soit lancée, le tirage
    // doit être désactivé (il s'activera via commencerPartie). En local,
    // l'état dépend juste du choix de clan.
    document.getElementById('btn-tirer').disabled = modeOnline || !clanChoisi;
    if (modeOnline && !socket) chargerSocket();
  }

  function setModePhysique(physique) {
    modePhysique = physique;
    document.getElementById('btn-auto').classList.toggle('actif', !physique);
    document.getElementById('btn-physique').classList.toggle('actif', physique);
    document.body.classList.toggle('mode-physique', physique);
  }

  function chargerSocket() {
    const s   = document.createElement('script');
    s.src     = '/socket.io/socket.io.js';
    s.onload  = connecterSocket;
    s.onerror = () => alert(t('meneur.serveur_introuvable'));
    document.head.appendChild(s);
  }

  // Helper i18n : retourne le label de victoire traduit pour un clan donné.
  // Fallback sur le label FR de data.js si la clé i18n est absente.
  function clanLabel(nom) {
    const key = 'clan.' + nom + '.victoire';
    const txt = t(key);
    if (txt && txt !== key) return txt;
    return (CLANS[nom] && CLANS[nom].label) || '';
  }

  // ── Sélection clan imposé ────────────────────────────────────────────
  function genererBoutonsClanMeneur() {
    const grid = document.getElementById('clan-choix-grid');
    grid.replaceChildren();
    Object.entries(CLANS).forEach(([nom, clan]) => {
      const btn = document.createElement('button');
      btn.className     = 'btn-clan-meneur';
      btn.id            = 'meneur-clan-' + nom;
      btn.dataset.nom   = nom;
      const icon   = document.createTextNode(clan.icon + ' ');
      const strong = document.createElement('strong');
      // data-i18n pour que le nom suive la langue dynamiquement
      strong.setAttribute('data-i18n', 'clan.' + nom);
      strong.textContent = (typeof i18n !== 'undefined' ? i18n.t('clan.' + nom) : nom) || nom;
      const small  = document.createElement('small');
      small.setAttribute('data-i18n', 'clan.' + nom + '.victoire');
      small.textContent = clanLabel(nom);
      btn.append(icon, strong, document.createElement('br'), small);
      btn.onclick = () => choisirClanMeneur(nom);
      grid.appendChild(btn);
    });
  }

  function choisirClanMeneur(nom) {
    clanChoisi = nom;
    document.querySelectorAll('.btn-clan-meneur').forEach(b => b.classList.remove('actif'));
    document.getElementById('meneur-clan-' + nom).classList.add('actif');
    // Mémorise le nom pour pouvoir re-traduire au changement de langue
    const objEl = document.getElementById('clan-objectif');
    objEl.dataset.clan = nom;
    objEl.textContent = t('meneur.objectif_prefix') + clanLabel(nom);
    document.getElementById('btn-creer-partie').disabled = false;
    // Sylvain : aucun tirage tant qu'un clan n'a pas été choisi. En local,
    // on active btn-tirer immédiatement. En online, on attend que le meneur
    // ait cliqué « Commencer la partie » (cf. commencerPartie).
    if (!modeOnline) document.getElementById('btn-tirer').disabled = false;
  }

  function connecterSocket() {
    socket = io();  // eslint-disable-line no-undef

    socket.on('connect',    () => console.log('[WENDIO meneur] socket connecté id=', socket.id));
    socket.on('disconnect', r  => console.log('[WENDIO meneur] socket déconnecté :', r));
    socket.on('connect_error', err => console.error('[WENDIO meneur] connect_error:', err.message));

    socket.on('partie-creee', ({ code, clan }) => {
      codePartie = code;
      const lien = window.location.origin + '/joueur-config.html?code=' + code;
      document.getElementById('code-affiche').textContent = code;
      document.getElementById('lien-rejoin').textContent  = lien;
      document.getElementById('online-creation').style.display = 'none';
      document.getElementById('online-actif').classList.add('visible');
      document.getElementById('btn-arreter').classList.add('visible');

      // Bannière clan imposé
      const c = CLANS[clan] || {};
      const banner = document.getElementById('clan-actif-banner');
      banner.dataset.clan = clan; // pour la re-traduction
      banner.replaceChildren();
      banner.append(document.createTextNode((c.icon || '') + ' '));
      const lbl = document.createElement('span');
      lbl.append(t('meneur.clan_impose_prefix'));
      const strong = document.createElement('strong');
      strong.setAttribute('data-i18n', 'clan.' + clan);
      strong.textContent = t('clan.' + clan) || clan;
      lbl.appendChild(strong);
      lbl.append(' — ' + clanLabel(clan));
      banner.appendChild(lbl);
      banner.classList.add('visible');

      // Affiche le bouton "Commencer" (désactivé tant qu'aucun joueur)
      const btnCommencer = document.getElementById('btn-commencer');
      btnCommencer.style.display = 'block';
      btnCommencer.disabled = true;
      btnCommencer.textContent = t('meneur.btn_commencer');

      // Réafficher zone-code + QR pour les nouvelles parties
      document.getElementById('zone-code').style.display = '';
      document.getElementById('qr-bloc').style.display = '';

      const qrEl = document.getElementById('qr-rejoindre');
      qrEl.replaceChildren();
      if (typeof QRCode !== 'undefined') {
        new QRCode(qrEl, { text: lien, width: 120, height: 120 });  // eslint-disable-line no-undef
      }
    });

    socket.on('erreur', msg => alert(msg));

    socket.on('joueur-connecte', ({ nom, clan, count }) => {
      document.getElementById('joueurs-count').textContent = count;
      const c    = CLANS[clan] || {};
      const item = document.createElement('div');
      item.className = 'joueur-item';
      const icon   = document.createTextNode((c.icon || '') + '\u00a0');
      const strong = document.createElement('strong');
      strong.textContent = nom;
      const muted  = document.createElement('span');
      muted.style.cssText = 'color:var(--muted);font-size:.8rem';
      muted.setAttribute('data-i18n', 'clan.' + clan);
      muted.textContent   = '\u00a0' + (t('clan.' + clan) || clan);
      item.append(icon, strong, muted);
      document.getElementById('joueurs-items').appendChild(item);

      // Active le bouton "Commencer" d\u00e8s qu'un joueur a rejoint
      const btnCommencer = document.getElementById('btn-commencer');
      if (btnCommencer && btnCommencer.style.display !== 'none' && count > 0) {
        btnCommencer.disabled = false;
      }
    });

    socket.on('joueur-deconnecte', ({ count }) => {
      // On ne décrémente plus visuellement — le joueur peut se reconnecter via sessionToken.
      // Le serveur garde l'entrée et renvoie le count actuel (stable).
      document.getElementById('joueurs-count').textContent = count;
    });

    socket.on('joueur-reconnecte', ({ count }) => {
      document.getElementById('joueurs-count').textContent = count;
    });

    socket.on('numero-tire', ({ num }) => {
      tirages.push(num);
      numeroActuel = num;
      afficherCarte(num);
      jouerSon(num);
      mettreAJourSuivi(num);
    });

    socket.on('gagnant', ({ nom, clan }) => {
      console.log('[WENDIO] gagnant reçu :', nom, clan);
      afficherGagnant(nom, clan);
    });
    socket.on('partie-terminee', ({ raison }) => {
      console.log('[WENDIO] partie terminée :', raison);
      terminerCoteMeneur(raison);
    });
    socket.on('tous-tires', () => { document.getElementById('btn-tirer').disabled = true; });
  }

  function creerPartie() {
    if (!socket || !clanChoisi) return;
    socket.emit('creer', { clan: clanChoisi });
  }

  // Spawn N joueurs simules cote serveur (mode demo sans audience reelle).
  // Le bouton est dispo dans la sidebar online-actif (avant demarrage).
  // Le serveur ajoute des bots dans partie.joueurs ; l'auto-detection
  // victoire les inclut, donc une fois la partie commencee, l'un d'eux
  // finira par gagner naturellement (Chevreuil = ~10-15 tirages).
  function spawnDemoJoueurs() {
    if (!socket || !codePartie) return;
    socket.emit('demo-spawn-joueurs', { code: codePartie, count: 3 });
  }

  // Bouton copier (à côté du lien à partager) — Clipboard API + feedback visuel
  function copierLien() {
    const lien = document.getElementById('lien-rejoin').textContent.trim();
    if (!lien) return;
    const btn = document.getElementById('btn-copier-lien');
    const flashOk = () => {
      const orig = btn.textContent;
      btn.textContent = '✓ Copié';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = orig;
        btn.classList.remove('copied');
      }, 1800);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(lien).then(flashOk).catch(fallbackCopy);
    } else {
      fallbackCopy();
    }
    // Fallback : selection + execCommand (compat Safari iOS < 13.4, navigateurs anciens)
    function fallbackCopy() {
      try {
        const ta = document.createElement('textarea');
        ta.value = lien;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        flashOk();
      } catch (e) {
        alert('Impossible de copier — copie le lien à la main.');
      }
    }
  }

  function commencerPartie() {
    if (!socket || !codePartie) return;
    socket.emit('demarrer', { code: codePartie });
    // Active le tirage maintenant que la partie est lancée
    document.getElementById('btn-tirer').disabled = false;
    // Cache le code, le lien et le QR — la partie est lancée
    document.getElementById('zone-code').style.display = 'none';
    document.getElementById('qr-bloc').style.display = 'none';
    document.getElementById('btn-commencer').style.display = 'none';
    // Cache les toggles (mode connexion + tirage) — figés pour la partie
    document.getElementById('barre-connexion').style.display = 'none';
    document.getElementById('barre-tirage').style.display    = 'none';
    document.getElementById('status-online').classList.add('visible');
  }

  function terminerCoteMeneur(raison) {
    partieTerminee = true;
    document.getElementById('btn-tirer').disabled = true;

    // L'icone « 🛑 Terminer » se transforme en « 🔄 Nouvelle partie »
    // (vert + icone differente du reset 38px gris ↻ pour eviter confusion).
    const btn = document.getElementById('btn-arreter');
    btn.removeAttribute('data-i18n');
    btn.textContent = '🔄';
    btn.title = t('meneur.btn_nouvelle_partie') || 'Nouvelle partie';
    btn.setAttribute('aria-label', btn.title);
    btn.onclick = () => nouvellePartieMeneur({ skipTerminer: true });
    btn.style.color = '#80edb5';
    btn.style.borderColor = '#2ecc71';
    btn.classList.add('visible');

    // Fallback défensif : si on reçoit partie-terminee/gagnant SANS avoir reçu
    // l'event 'gagnant' (race condition / glitch réseau), afficher un overlay générique.
    if (raison === 'gagnant' &&
        !document.getElementById('win-overlay').classList.contains('visible')) {
      document.getElementById('win-joueur').textContent = TROPHEE + ' ' + t('meneur.un_joueur_gagne');
      document.getElementById('win-clan').textContent   = t('meneur.partie_terminee_msg');
      document.getElementById('win-trophee').classList.remove('visible');
      document.getElementById('win-overlay').classList.add('visible');
    }
  }

  function arreterPartie() {
    if (!socket || !codePartie) return;
    if (!confirm(t('meneur.confirm_terminer'))) return;
    socket.emit('terminer', { code: codePartie });
    nouvellePartieMeneur({ skipTerminer: true });
  }

  // Support #10 : « Nouvelle partie » redirige maintenant vers meneur-config
  // avec les params URL actuels pre-remplis (mode/tirage/clan). Le meneur
  // n a plus qu un seul clic « Commencer » pour relancer une partie identique,
  // ou il modifie ce qu il veut avant. Plus de reset en place qui laissait
  // l ecran dans un etat ambigu et peu intuitif.
  function nouvellePartieMeneur(opts) {
    opts = opts || {};
    // Notifie clean les joueurs que la partie est terminee si pas deja fait.
    if (!opts.skipTerminer && socket && codePartie && !partieTerminee) {
      socket.emit('terminer', { code: codePartie });
    }
    // Le socket sera reinitialise par la nouvelle page meneur.html chargee
    // apres le passage par meneur-config.
    window.location.href = 'meneur-config.html' + window.location.search;
  }

  // ── Tirer ─────────────────────────────────────────────────────────────
  function actionTirer() {
    if (partieTerminee) return;
    if (!clanChoisi) return; // garde-fou : un clan doit être choisi (Sylvain 2026-05-04)
    if (modeOnline && socket && codePartie) {
      socket.emit('tirer', { code: codePartie });
    } else {
      const restants = [];
      for (let i = 1; i <= 72; i++) { if (!tirages.includes(i)) restants.push(i); }
      if (!restants.length) { document.getElementById('btn-tirer').disabled = true; return; }
      const num = restants[Math.floor(Math.random() * restants.length)];
      tirages.push(num);
      numeroActuel = num;
      afficherCarte(num);
      jouerSon(num);
      mettreAJourSuivi(num);
    }
  }

  // ── Carte numéro ──────────────────────────────────────────────────────
  function afficherCarte(num) {
    const carte  = document.getElementById('carte-numero');
    const couleur = CONFIG[ligneDeNumero(num)].couleur;

    carte.classList.add('visible');
    carte.style.setProperty('--ligne-couleur', couleur);

    // Carte image (toute l'info — numéro, ligne, nom Wendat, phonétique, traductions — est dans l'image)
    const img = document.getElementById('carte-image');
    img.src = `cartes/${num}.jpg`;
    img.style.display = 'block';
    img.title = t('meneur.carte_tooltip', { n: num });


    // Affiche le popup carte tiree (support #7+#9 combines) : grosse image
    // au centre, auto-dismiss 5s, X en haut a droite, clic n'importe ou.
    afficherPopupCarte(num);
  }

  // ── Popup carte tiree (support #7+#9 combines) ──────────────────────
  let popupTimer = null;
  // replaySound: true quand on rouvre via clic sur la petite carte ; false
  // quand auto-declenche par afficherCarte (le son est deja joue ailleurs).
  function afficherPopupCarte(num, replaySound) {
    if (!num) return;
    const overlay = document.getElementById('popup-carte');
    const img     = document.getElementById('popup-carte-img');
    img.src = `cartes/${num}.jpg`;
    // Re-trigger CSS animation en clonant le node (sinon la progress bar
    // ne redemarre pas si on rouvre le popup pour la meme carte).
    const progress = overlay.querySelector('.progress');
    const newProgress = progress.cloneNode();
    progress.replaceWith(newProgress);
    overlay.classList.add('visible');
    if (replaySound) jouerSon(num);
    if (popupTimer) clearTimeout(popupTimer);
    popupTimer = setTimeout(fermerPopupCarte, 5000);
  }
  function fermerPopupCarte() {
    document.getElementById('popup-carte').classList.remove('visible');
    if (popupTimer) { clearTimeout(popupTimer); popupTimer = null; }
  }
  // ESC ferme aussi le popup
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      const popCarte = document.getElementById('popup-carte');
      const popQr    = document.getElementById('popup-qr-mobile');
      if (popCarte && popCarte.classList.contains('visible')) fermerPopupCarte();
      if (popQr    && popQr.classList.contains('visible'))    fermerPopupQrMobile();
    }
  });

  // ── Popup QR « carte mobile » (support #16) — mode physique uniquement ──
  function ouvrirPopupQrMobile() {
    if (!clanChoisi) return;
    const url = window.location.origin + '/joueur.html?mode=local&clan=' + encodeURIComponent(clanChoisi);
    const holder = document.getElementById('qr-mobile-holder');
    holder.replaceChildren();
    if (typeof QRCode !== 'undefined') {
      // eslint-disable-next-line no-undef
      new QRCode(holder, { text: url, width: 240, height: 240 });
    } else {
      holder.textContent = url;
    }
    document.getElementById('popup-qr-mobile').classList.add('visible');
  }
  function fermerPopupQrMobile() {
    document.getElementById('popup-qr-mobile').classList.remove('visible');
  }

  // ── Suivi ─────────────────────────────────────────────────────────────
  function initialiser() {
    const grille = document.getElementById('suivi-grille');
    grille.replaceChildren();
    LIGNES.forEach(ligne => {
      const lbl = document.createElement('div');
      lbl.className        = 'suivi-label';
      lbl.style.background = CONFIG[ligne].couleur;
      lbl.textContent      = ligne;
      grille.appendChild(lbl);
      for (let i = 0; i < 12; i++) {
        const num  = CONFIG[ligne].min + i;
        const cell = document.createElement('div');
        cell.className   = 'suivi-cell';
        cell.id          = 'cell-' + num;
        cell.textContent = num;
        cell.onclick = () => {
          if (tirages.includes(num)) {
            jouerSon(num);
            surlignerActuel(num);
          } else if (modePhysique && !partieTerminee) {
            if (modeOnline && socket && codePartie) {
              // Online + physique (support #12) : delegue au serveur qui
              // broadcastera numero-tire a tous (meneur compris). Le handler
              // socket.on('numero-tire') fait alors le push + display + son
              // + suivi pour le meneur AUSSI. Pas de duplication locale.
              socket.emit('tirer', { code: codePartie, num });
            } else {
              // Local : maj directe (pas de joueurs distants a notifier)
              tirages.push(num);
              numeroActuel = num;
              afficherCarte(num);
              jouerSon(num);
              mettreAJourSuivi(num);
            }
          }
        };
        grille.appendChild(cell);
      }
    });
  }

  function mettreAJourSuivi(num) {
    document.querySelectorAll('.suivi-cell.actuel').forEach(c => c.classList.remove('actuel'));
    const cell = document.getElementById('cell-' + num);
    if (cell) {
      cell.classList.add('tire', 'actuel');
      cell.style.background = CONFIG[ligneDeNumero(num)].couleur;
    }
    document.getElementById('compteur').textContent = t('meneur.compteur', { n: tirages.length });
    if (tirages.length >= 72) document.getElementById('btn-tirer').disabled = true;
  }

  function surlignerActuel(num) {
    document.querySelectorAll('.suivi-cell.actuel').forEach(c => c.classList.remove('actuel'));
    document.getElementById('cell-' + num).classList.add('actuel');
    afficherCarte(num);
    numeroActuel = num;
  }

  function rejouerSon() { if (numeroActuel) jouerSon(numeroActuel); }

  // ── Gagnant ───────────────────────────────────────────────────────────
  const TROPHEE = '\uD83C\uDFC6';

  function afficherGagnant(nom, clan) {
    const c       = CLANS[clan] || {};
    const medaille = TROPHEE;

    // Grand overlay
    document.getElementById('win-joueur').textContent = medaille + ' ' + (c.icon || '') + ' ' + nom;
    const winClanEl = document.getElementById('win-clan');
    winClanEl.dataset.clan = clan;
    winClanEl.textContent  = clan + ' \u2014 ' + clanLabel(clan);
    const trophee = document.getElementById('win-trophee');
    if (c.points) {
      trophee.src = 'cartes/clan-' + c.points + 'pt.jpg';
      trophee.classList.add('visible');
    } else {
      trophee.classList.remove('visible');
    }
    document.getElementById('win-overlay').classList.add('visible');

    // Bandeau classement
    const item = document.createElement('div');
    item.className = 'bandeau-item';
    const rangEl = document.createElement('span');
    rangEl.className   = 'bandeau-rang';
    rangEl.textContent = medaille;
    const infoDiv  = document.createElement('div');
    const nomDiv   = document.createElement('div');
    nomDiv.className   = 'bandeau-nom';
    nomDiv.textContent = nom;
    const clanDiv  = document.createElement('div');
    clanDiv.className   = 'bandeau-clan-info';
    clanDiv.dataset.clan = clan;
    clanDiv.textContent = (c.icon || '') + ' ' + clan + ' \u2014 ' + clanLabel(clan);
    infoDiv.append(nomDiv, clanDiv);
    item.append(rangEl, infoDiv);
    document.getElementById('gagnants-liste').appendChild(item);
    document.getElementById('bandeau-gagnant').classList.add('visible');
  }

  function fermerWin() { document.getElementById('win-overlay').classList.remove('visible'); }

  function resetJeu() {
    tirages = []; numeroActuel = null;
    fermerWin();
    // btn-tirer reste actif uniquement si un clan est encore choisi
    document.getElementById('btn-tirer').disabled          = !clanChoisi;
    document.getElementById('carte-numero').classList.remove('visible');
    document.getElementById('carte-image').style.display   = 'none';
    document.getElementById('compteur').textContent        = t('meneur.compteur', { n: 0 });
    document.getElementById('gagnants-liste').replaceChildren();
    document.getElementById('bandeau-gagnant').classList.remove('visible');
    document.querySelectorAll('.suivi-cell').forEach(c => {
      c.classList.remove('tire', 'actuel');
      c.style.background = '';
    });
  }

  initialiser();
  genererBoutonsClanMeneur();
  // Compteur initial dans la langue active
  document.getElementById('compteur').textContent = t('meneur.compteur', { n: 0 });

  // i18n : re-traduit les textes composés (préfixe + label clan) quand la
  // langue change. Les éléments concernés ont un attribut dataset.clan.
  i18n.onLangChange(() => {
    const obj = document.getElementById('clan-objectif');
    if (obj.dataset.clan) {
      obj.textContent = t('meneur.objectif_prefix') + clanLabel(obj.dataset.clan);
    }
    const banner = document.getElementById('clan-actif-banner');
    if (banner.dataset.clan) {
      const clan = banner.dataset.clan;
      const c = CLANS[clan] || {};
      banner.replaceChildren();
      banner.append(document.createTextNode((c.icon || '') + ' '));
      const lbl = document.createElement('span');
      lbl.append(t('meneur.clan_impose_prefix'));
      const strong = document.createElement('strong');
      strong.setAttribute('data-i18n', 'clan.' + clan);
      strong.textContent = t('clan.' + clan) || clan;
      lbl.appendChild(strong);
      lbl.append(' — ' + clanLabel(clan));
      banner.appendChild(lbl);
    }
    const winClan = document.getElementById('win-clan');
    if (winClan.dataset.clan) {
      winClan.textContent = winClan.dataset.clan + ' — ' + clanLabel(winClan.dataset.clan);
    }
    document.querySelectorAll('.bandeau-clan-info[data-clan]').forEach(el => {
      const clan = el.dataset.clan;
      const c = CLANS[clan] || {};
      el.textContent = (c.icon || '') + ' ' + clan + ' — ' + clanLabel(clan);
    });
    // Compteur : suit la langue si tirages déjà commencés
    document.getElementById('compteur').textContent = t('meneur.compteur', { n: tirages.length });
  });

  // ── Configuration URL (depuis meneur-config.html ou ?demo=) ──────────
  (function() {
    const params = new URLSearchParams(window.location.search);
    // Ancien bypass ?demo= retire — remplace par le bouton « 🤖 Simuler N joueurs »
    // dans la sidebar online (qui demande un meneur authentifie, comme tout le reste).
    const mode   = params.get('mode');
    const tirage = params.get('tirage');
    const clan   = params.get('clan');

    // Accès direct sans aucun paramètre → on envoie vers la page de config
    if (!params.toString()) {
      window.location.replace('meneur-config.html');
      return;
    }

    // Paramètres incomplets : on envoie vers config (en pré-remplissant ce qu'on a)
    if (!mode || !tirage || !clan) {
      window.location.replace('meneur-config.html?' + params.toString());
      return;
    }

    // Apply config
    setMode(mode);
    // support #29 — si le tirage physique est désactivé, ignorer le param `tirage`
    // (protège contre un vieux localStorage / URL bookmarkée ?tirage=physique).
    setModePhysique(TIRAGE_PHYSIQUE_ACTIF ? tirage === 'physique' : false);
    choisirClanMeneur(clan);

    // Cache les sélecteurs maintenant inutiles (gain ~150-200px verticaux)
    document.getElementById('barre-connexion').style.display = 'none';
    document.getElementById('barre-tirage').style.display = 'none';
    document.querySelectorAll('.clan-choix-titre').forEach(el => el.style.display = 'none');
    const grid = document.getElementById('clan-choix-grid');
    if (grid) grid.style.display = 'none';
    // L'objectif (« Une ligne », « Les 4 coins », etc.) est replié dans le
    // tooltip du bandeau pour gagner de la place côté carte (support #7).
    const objectif = document.getElementById('clan-objectif');
    if (objectif) objectif.style.display = 'none';
    // En mode local, plus rien d'utile dans #panneau-online → tout cacher
    // (en online, on garde le btn « Créer la partie » et l'écran QR/joueurs).
    if (mode === 'local') {
      const panneau = document.getElementById('panneau-online');
      if (panneau) panneau.style.display = 'none';
    }

    // Mode demo (charge depuis demo-duo.html) : detection URL param ?demo=1 OU
    // charge dans une iframe. Sert au bouton « 🤖 Simuler 3 joueurs » ET au
    // bandeau (la pastille tirage reste visible en demo, cf. insertCompactBandeau).
    const inDemo = params.get('demo') === '1' || (window.parent && window.parent !== window);

    insertCompactBandeau(mode, tirage, clan, inDemo);

    if (inDemo) {
      const btnBots = document.getElementById('btn-demo-bots');
      if (btnBots) btnBots.style.display = '';
    }
  })();

  function insertCompactBandeau(mode, tirage, clan, inDemo) {
    const CLAN_ICONS = { Chevreuil: '🦌', Loup: '🐺', Ours: '🐻', Tortue: '🐢' };

    const bandeau = document.createElement('div');
    bandeau.className = 'bandeau-config';

    const span1 = document.createElement('span');
    const clanI18nKey = 'clan.' + clan;
    const clanLabel = (typeof i18n !== 'undefined' ? i18n.t(clanI18nKey) : clan) || clan;
    span1.textContent = (CLAN_ICONS[clan] || '') + ' ' + clanLabel;
    // Permet ré-traduction au changement de langue
    span1.dataset.clan = clan;
    if (typeof i18n !== 'undefined' && i18n.onLangChange) {
      i18n.onLangChange(() => { span1.textContent = (CLAN_ICONS[clan] || '') + ' ' + (i18n.t('clan.' + clan) || clan); });
    }
    // Tooltip avec l'objectif de victoire (caché de la sidebar pour gagner de la place)
    const obj = (typeof CLANS !== 'undefined' && CLANS[clan]) ? CLANS[clan].label : null;
    if (obj) span1.title = 'Objectif : ' + obj;
    const sep1 = document.createElement('span');
    sep1.className = 'sep'; sep1.textContent = '·';
    const span2 = document.createElement('span');
    span2.textContent = mode === 'online' ? '🌐 En ligne' : '📡 Local';
    const sep2 = document.createElement('span');
    sep2.className = 'sep'; sep2.textContent = '·';
    const span3 = document.createElement('span');
    span3.textContent = tirage === 'physique' ? '🃏 Physique' : '🎲 Aléatoire';

    // Crayon « ✏️ Modifier » retire : pour changer le clan/mode/tirage il
    // faut de toute facon terminer la partie en cours (puis « Nouvelle
    // partie » redirige vers meneur-config). Pas de raccourci en cours
    // de partie qui pourrait laisser un etat ambigu.

    // Pastille tirage masquée quand le physique est désactivé (toujours aléatoire = bruit),
    // SAUF en démo où on la garde (valeur pédagogique pour montrer le tirage — Sylvain).
    if (TIRAGE_PHYSIQUE_ACTIF || inDemo) {
      bandeau.append(span1, sep1, span2, sep2, span3);
    } else {
      bandeau.append(span1, sep1, span2);
    }

    const h1 = document.querySelector('#colonne-gauche h1');
    if (h1 && h1.parentNode) h1.after(bandeau);
  }

  // Plein écran
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }
  document.addEventListener('fullscreenchange', () => {
    document.getElementById('btn-fullscreen').classList.toggle('actif', !!document.fullscreenElement);
  });
  // Cacher le bouton si l'API n'est pas disponible (ex: Safari iPad)
  if (!document.documentElement.requestFullscreen) {
    document.getElementById('btn-fullscreen').style.display = 'none';
  }

</script>

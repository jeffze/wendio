<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WENDIO — Meneur de Jeu</title>
  <style>
    :root { --bg: #1a1008; --surface: #2c1a0e; --accent: #d35400; --text: #f4e7d3; --muted: #a08060; --vert: #27ae60; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; }

    h1 { text-align: center; font-size: 1.6rem; letter-spacing: .15em; color: var(--accent); margin-bottom: 14px; }

    /* ── Sélecteur de mode ── */
    .mode-bar { display: flex; gap: 0; justify-content: center; margin-bottom: 16px; border-radius: 8px; overflow: hidden; border: 1px solid #3e2510; max-width: 340px; margin-left: auto; margin-right: auto; }
    .btn-mode { flex: 1; padding: 10px; border: none; background: var(--surface); color: var(--muted); cursor: pointer; font-weight: bold; font-size: .9rem; transition: .2s; }
    .btn-mode.actif { background: var(--accent); color: white; }

    /* ── Panneau en ligne ── */
    #panneau-online { display: none; background: var(--surface); border-radius: 12px; border: 1px solid #3e2510; padding: 16px; margin-bottom: 16px; }
    #panneau-online.visible { display: block; }
    .btn-creer { background: var(--vert); color: white; border: none; border-radius: 8px; padding: 12px 30px; font-size: 1rem; font-weight: bold; cursor: pointer; display: block; margin: 12px auto 0; }
    .btn-creer:hover { opacity: .85; }

    .online-actif { display: none; }
    .online-actif.visible { display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: start; }

    .code-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 6px; }
    .code-valeur { font-size: 2.8rem; font-weight: 900; letter-spacing: .2em; color: var(--vert); margin-bottom: 6px; }
    .lien-rejoin { font-size: .75rem; color: var(--muted); word-break: break-all; margin-bottom: 12px; }

    .joueurs-titre { font-size: .8rem; color: var(--muted); margin-bottom: 6px; }
    .joueur-item { display: flex; align-items: center; gap: 8px; font-size: .9rem; padding: 5px 0; border-bottom: 1px solid #3e2510; }
    .joueur-item:last-child { border: none; }

    .qr-bloc { text-align: center; }
    .qr-bloc small { display: block; font-size: .72rem; color: var(--muted); margin-top: 4px; }
    #qr-rejoindre { background: white; padding: 6px; border-radius: 6px; display: inline-block; }

    /* ── Boutons d'action ── */
    .btn-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
    .btn-tirer { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 14px 36px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: opacity .2s; }
    .btn-tirer:hover { opacity: .85; }
    .btn-tirer:disabled { opacity: .35; cursor: default; }
    .btn-reset { background: var(--surface); color: var(--muted); border: 1px solid var(--muted); border-radius: 8px; padding: 14px 20px; cursor: pointer; }
    .btn-reset:hover { opacity: .7; }
    .btn-arreter { background: #922b21; color: white; border: none; border-radius: 8px; padding: 10px 18px; font-size: .9rem; font-weight: bold; cursor: pointer; margin-top: 14px; display: none; }
    .btn-arreter.visible { display: block; }
    .btn-arreter:hover { background: #c0392b; }

    /* ── Carte numéro tiré ── */
    #carte-numero { background: var(--surface); border-radius: 12px; border: 2px solid var(--accent); padding: 18px 20px; margin-bottom: 16px; display: none; }
    .carte-interieur { display: flex; gap: 20px; align-items: flex-start; }
    .carte-texte { flex: 1; }
    .badge-ligne { display: inline-block; color: white; font-weight: bold; font-size: .8rem; padding: 3px 12px; border-radius: 20px; margin-bottom: 8px; }
    .grand-num { font-size: 5rem; font-weight: 900; line-height: 1; margin-bottom: 6px; }
    .wendat-nom { font-size: 1.35rem; font-style: italic; color: var(--accent); margin-bottom: 3px; }
    .wendat-phon { font-size: .9rem; color: var(--muted); margin-bottom: 10px; }
    .langues { display: flex; gap: 18px; }
    .lang-fr { color: #5dade2; font-weight: 600; }
    .lang-en { color: #58d68d; font-weight: 600; }
    .msg-manquant { color: var(--muted); font-style: italic; font-size: .85rem; margin-top: 6px; }
    .carte-droite { display: flex; flex-direction: column; align-items: center; gap: 10px; flex-shrink: 0; }
    #qrcode { background: white; padding: 6px; border-radius: 6px; }
    .btn-rejouer { background: transparent; border: 1px solid var(--accent); color: var(--accent); border-radius: 6px; padding: 8px 14px; cursor: pointer; font-size: .9rem; }
    .btn-rejouer:hover { background: var(--accent); color: white; }

    /* ── Tableau de suivi ── */
    #tableau { background: var(--surface); border-radius: 12px; padding: 16px; }
    #tableau h2 { font-size: .85rem; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .1em; }
    .suivi-grille { display: grid; grid-template-columns: 2rem repeat(12, 1fr); gap: 4px; }
    .suivi-label { color: white; font-weight: bold; font-size: .95rem; display: flex; align-items: center; justify-content: center; border-radius: 4px; padding: 4px 0; }
    .suivi-cell { background: #3a2510; color: #6a4a2a; text-align: center; padding: 6px 2px; border-radius: 4px; font-size: .85rem; font-weight: bold; cursor: default; transition: background .2s, color .2s; border: 1px solid transparent; }
    .suivi-cell.tire { color: white; cursor: pointer; border-color: rgba(255,255,255,.15); }
    .suivi-cell.tire:hover { opacity: .75; }
    .suivi-cell.actuel { outline: 2px solid white; outline-offset: 1px; }
    .compteur { text-align: center; margin-top: 10px; font-size: .85rem; color: var(--muted); }

    /* ── Gagnant overlay ── */
    #win-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 100; justify-content: center; align-items: center; }
    .win-card { background: #1e8449; padding: 50px; border-radius: 24px; border: 6px solid white; text-align: center; animation: pop .4s cubic-bezier(.175,.885,.32,1.275); max-width: 480px; width: 90%; }
    .win-card h1 { font-size: 3.5rem; margin-bottom: 12px; }
    .win-joueur { font-size: 1.6rem; font-weight: bold; margin-bottom: 6px; }
    .win-clan   { font-size: 1.1rem; color: #d5f5e3; margin-bottom: 22px; }
    .win-card button { background: white; color: #1e8449; border: none; border-radius: 8px; padding: 12px 24px; font-size: 1rem; font-weight: bold; cursor: pointer; margin: 4px; }
    @keyframes pop { from { transform: scale(.5); } to { transform: scale(1); } }
  </style>
</head>
<body>

<div id="win-overlay">
  <div class="win-card">
    <h1>🌽 WENDIO ! 🌽</h1>
    <div class="win-joueur" id="win-joueur"></div>
    <div class="win-clan"   id="win-clan"></div>
    <button onclick="fermerWin()">Continuer</button>
    <button onclick="resetJeu()">Nouvelle partie</button>
  </div>
</div>

<h1>WENDIO — Meneur de Jeu</h1>

<!-- Mode local / en ligne -->
<div class="mode-bar">
  <button class="btn-mode actif" id="btn-local"  onclick="setMode('local')">📴 Mode local</button>
  <button class="btn-mode"       id="btn-online" onclick="setMode('online')">🌐 Mode en ligne</button>
</div>

<!-- Panneau en ligne -->
<div id="panneau-online">
  <div id="online-creation" style="text-align:center;">
    <p style="color:var(--muted);font-size:.9rem;">Créez une partie pour obtenir un code à partager avec vos joueurs.</p>
    <button class="btn-creer" onclick="creerPartie()">✚ Créer une partie en ligne</button>
  </div>
  <div class="online-actif" id="online-actif">
    <div>
      <div class="code-label">Code de la partie</div>
      <div class="code-valeur" id="code-affiche">----</div>
      <div class="lien-rejoin" id="lien-rejoin"></div>
      <div class="joueurs-titre">Joueurs connectés : <strong id="joueurs-count">0</strong></div>
      <div id="joueurs-items"></div>
      <button class="btn-arreter" id="btn-arreter" onclick="arreterPartie()">⏹ Terminer la partie</button>
    </div>
    <div class="qr-bloc">
      <div id="qr-rejoindre"></div>
      <small>Lien joueur</small>
    </div>
  </div>
</div>

<!-- Boutons d'action -->
<div class="btn-bar">
  <button class="btn-tirer" id="btn-tirer" onclick="actionTirer()">🎲 TIRER UN NUMÉRO</button>
  <button class="btn-reset"               onclick="resetJeu()">↺ Réinitialiser</button>
</div>

<!-- Carte numéro tiré -->
<div id="carte-numero">
  <div class="carte-interieur">
    <div class="carte-texte">
      <span class="badge-ligne" id="badge-ligne">W</span>
      <div class="grand-num"    id="grand-num">—</div>
      <div class="wendat-nom"   id="wendat-nom"></div>
      <div class="wendat-phon"  id="wendat-phon"></div>
      <div class="langues"><span class="lang-fr" id="lang-fr"></span><span class="lang-en" id="lang-en"></span></div>
      <div class="msg-manquant" id="msg-manquant"></div>
    </div>
    <div class="carte-droite">
      <div id="qrcode"></div>
      <button class="btn-rejouer" onclick="rejouerSon()">▶ Rejouer</button>
    </div>
  </div>
</div>

<!-- Tableau de suivi -->
<div id="tableau">
  <h2>Tableau des tirages</h2>
  <div class="suivi-grille" id="suivi-grille"></div>
  <div class="compteur" id="compteur">0 / 72 numéros tirés</div>
</div>

<script src="qrcode.min.js"></script>
<script src="data.js"></script>
<script>
  let tirages      = [];
  let numeroActuel = null;
  let modeOnline   = false;
  let socket       = null;
  let codePartie   = null;

  // ── Mode ──────────────────────────────────────────────────────────
  function setMode(mode) {
    modeOnline = (mode === 'online');
    document.getElementById('btn-local').classList.toggle('actif', !modeOnline);
    document.getElementById('btn-online').classList.toggle('actif', modeOnline);
    document.getElementById('panneau-online').classList.toggle('visible', modeOnline);
    if (modeOnline && !socket) chargerSocket();
  }

  function chargerSocket() {
    const s = document.createElement('script');
    s.src = '/socket.io/socket.io.js';
    s.onload  = connecterSocket;
    s.onerror = () => alert('Serveur introuvable. Lancez server.js avec Node.js.');
    document.head.appendChild(s);
  }

  function connecterSocket() {
    socket = io();

    socket.on('partie-creee', ({ code }) => {
      codePartie = code;
      const lien = `${window.location.origin}/joueur.html?code=${code}`;
      document.getElementById('code-affiche').textContent = code;
      document.getElementById('lien-rejoin').textContent  = lien;
      document.getElementById('online-creation').style.display = 'none';
      document.getElementById('online-actif').classList.add('visible');
      document.getElementById('btn-arreter').classList.add('visible');
      document.getElementById('qr-rejoindre').innerHTML = '';
      if (typeof QRCode !== 'undefined') {
        new QRCode(document.getElementById('qr-rejoindre'), { text: lien, width: 120, height: 120 });
      }
    });

    socket.on('joueur-connecte', ({ nom, clan, count }) => {
      document.getElementById('joueurs-count').textContent = count;
      const c    = CLANS[clan] || {};
      const item = document.createElement('div');
      item.className = 'joueur-item';
      item.innerHTML = `${c.icon || ''}  <strong>${nom}</strong> <span style="color:var(--muted);font-size:.8rem">${clan}</span>`;
      document.getElementById('joueurs-items').appendChild(item);
    });

    socket.on('joueur-deconnecte', ({ nom, count }) => {
      document.getElementById('joueurs-count').textContent = count;
    });

    socket.on('numero-tire', ({ num }) => {
      tirages.push(num);
      numeroActuel = num;
      afficherCarte(num);
      jouerSon(num);
      mettreAJourSuivi(num);
    });

    socket.on('gagnant', ({ nom, clan }) => afficherGagnant(nom, clan));
    socket.on('tous-tires', () => { document.getElementById('btn-tirer').disabled = true; });
  }

  function creerPartie() { if (socket) socket.emit('creer'); }

  function arreterPartie() {
    if (!socket || !codePartie) return;
    if (!confirm('Terminer la partie ? Tous les joueurs seront déconnectés.')) return;
    socket.emit('terminer', { code: codePartie });
    codePartie = null;
    document.getElementById('online-actif').classList.remove('visible');
    document.getElementById('btn-arreter').classList.remove('visible');
    document.getElementById('online-creation').style.display = '';
    document.getElementById('joueurs-items').innerHTML = '';
    document.getElementById('joueurs-count').textContent = '0';
    resetJeu();
  }

  // ── Tirer ─────────────────────────────────────────────────────────
  function actionTirer() {
    if (modeOnline && socket && codePartie) {
      socket.emit('tirer', { code: codePartie });
    } else {
      const restants = [];
      for (let i = 1; i <= 72; i++) { if (!tirages.includes(i)) restants.push(i); }
      if (!restants.length) { document.getElementById('btn-tirer').disabled = true; return; }
      const num = restants[Math.floor(Math.random() * restants.length)];
      tirages.push(num); numeroActuel = num;
      afficherCarte(num); jouerSon(num); mettreAJourSuivi(num);
    }
  }

  // ── Carte numéro ──────────────────────────────────────────────────
  function afficherCarte(num) {
    document.getElementById('carte-numero').style.display = 'block';
    const ligne   = ligneDeNumero(num);
    const couleur = CONFIG[ligne].couleur;
    const data    = NOMBRES[num];
    document.getElementById('badge-ligne').textContent       = ligne;
    document.getElementById('badge-ligne').style.background  = couleur;
    document.getElementById('grand-num').textContent         = num;
    document.getElementById('grand-num').style.color         = couleur;
    if (data) {
      document.getElementById('wendat-nom').textContent  = data.wendat;
      document.getElementById('wendat-phon').textContent = data.phon;
      document.getElementById('lang-fr').textContent     = '🇫🇷 ' + data.fr;
      document.getElementById('lang-en').textContent     = '🇬🇧 ' + data.en;
      document.getElementById('msg-manquant').textContent = '';
    } else {
      ['wendat-nom','wendat-phon','lang-fr','lang-en'].forEach(id => document.getElementById(id).textContent = '');
      document.getElementById('msg-manquant').textContent = '— vocabulaire Wendat à compléter —';
    }
    const base = window.location.href.replace(/[^/]*$/, '');
    document.getElementById('qrcode').innerHTML = '';
    if (typeof QRCode !== 'undefined') {
      new QRCode(document.getElementById('qrcode'), { text: base + cheminAudio(num), width: 100, height: 100 });
    }
  }

  // ── Suivi ─────────────────────────────────────────────────────────
  function initialiser() {
    const grille = document.getElementById('suivi-grille');
    grille.innerHTML = '';
    LIGNES.forEach(ligne => {
      const lbl = document.createElement('div');
      lbl.className = 'suivi-label';
      lbl.style.background = CONFIG[ligne].couleur;
      lbl.textContent = ligne;
      grille.appendChild(lbl);
      for (let i = 0; i < 12; i++) {
        const num  = CONFIG[ligne].min + i;
        const cell = document.createElement('div');
        cell.className = 'suivi-cell';
        cell.id = `cell-${num}`;
        cell.textContent = num;
        cell.onclick = () => { if (tirages.includes(num)) { jouerSon(num); surlignerActuel(num); } };
        grille.appendChild(cell);
      }
    });
  }

  function mettreAJourSuivi(num) {
    document.querySelectorAll('.suivi-cell.actuel').forEach(c => c.classList.remove('actuel'));
    const cell = document.getElementById(`cell-${num}`);
    if (cell) { cell.classList.add('tire','actuel'); cell.style.background = CONFIG[ligneDeNumero(num)].couleur; }
    document.getElementById('compteur').textContent = `${tirages.length} / 72 numéros tirés`;
    if (tirages.length >= 72) document.getElementById('btn-tirer').disabled = true;
  }

  function surlignerActuel(num) {
    document.querySelectorAll('.suivi-cell.actuel').forEach(c => c.classList.remove('actuel'));
    document.getElementById(`cell-${num}`).classList.add('actuel');
    afficherCarte(num); numeroActuel = num;
  }

  function rejouerSon() { if (numeroActuel) jouerSon(numeroActuel); }

  // ── Gagnant ───────────────────────────────────────────────────────
  function afficherGagnant(nom, clan) {
    const c = CLANS[clan] || {};
    document.getElementById('win-joueur').textContent = `${c.icon || ''} ${nom}`;
    document.getElementById('win-clan').textContent   = `${clan} — ${c.label || ''}`;
    document.getElementById('win-overlay').style.display = 'flex';
  }

  function fermerWin() { document.getElementById('win-overlay').style.display = 'none'; }

  function resetJeu() {
    tirages = []; numeroActuel = null;
    fermerWin();
    document.getElementById('btn-tirer').disabled = false;
    document.getElementById('carte-numero').style.display = 'none';
    document.getElementById('compteur').textContent = '0 / 72 numéros tirés';
    document.querySelectorAll('.suivi-cell').forEach(c => { c.classList.remove('tire','actuel'); c.style.background = ''; });
  }

  initialiser();
</script>
</body>
</html>

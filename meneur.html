<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WENDIO — Meneur de Jeu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0c0a07;
      --surface: #181008;
      --card:    #211508;
      --border:  #362010;
      --gold:    #c07808;
      --gold-lt: #e8a828;
      --text:    #ede0c8;
      --muted:   #907248;
      --dim:     #4e3018;
      --green:   #1e9050;
      --green-lt:#28c86a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      background-image: radial-gradient(ellipse 100% 50% at 50% 0%, #1c1005 0%, #0c0a07 65%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px 16px 48px;
    }

    h1 {
      font-family: 'Cinzel', Georgia, serif;
      text-align: center;
      font-size: 1.8rem;
      letter-spacing: .22em;
      background: linear-gradient(135deg, var(--gold-lt) 0%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 22px;
      filter: drop-shadow(0 0 18px rgba(192,120,8,.22));
    }

    /* ── Mode toggle ── */
    .mode-bar {
      display: flex;
      justify-content: center;
      margin: 0 auto 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 4px;
      max-width: 300px;
    }
    .btn-mode {
      flex: 1;
      padding: 9px 14px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 600;
      font-size: .85rem;
      border-radius: 50px;
      transition: all .22s;
      letter-spacing: .03em;
      font-family: inherit;
    }
    .btn-mode.actif {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 100%);
      color: #0c0a07;
      box-shadow: 0 2px 12px rgba(192,120,8,.4);
      font-weight: 700;
    }

    /* ── Panneau en ligne ── */
    #panneau-online {
      display: none;
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }
    #panneau-online.visible { display: block; }
    .btn-creer {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-lt) 100%);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 13px 32px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: block;
      margin: 12px auto 0;
      box-shadow: 0 4px 16px rgba(30,144,80,.35);
      transition: all .2s;
      letter-spacing: .04em;
      font-family: inherit;
    }
    .btn-creer:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(30,144,80,.45); }

    .online-actif { display: none; }
    .online-actif.visible { display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: start; }

    .code-label { font-size: .68rem; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    .code-valeur {
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: .25em;
      background: linear-gradient(135deg, var(--green-lt), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      line-height: 1;
    }
    .lien-rejoin { font-size: .7rem; color: var(--dim); word-break: break-all; margin-bottom: 14px; font-family: monospace; }
    .joueurs-titre { font-size: .72rem; color: var(--muted); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
    .joueur-item { display: flex; align-items: center; gap: 8px; font-size: .88rem; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .joueur-item:last-child { border: none; }

    .qr-bloc { text-align: center; }
    .qr-bloc small { display: block; font-size: .68rem; color: var(--muted); margin-top: 6px; letter-spacing: .05em; }
    #qr-rejoindre { background: white; padding: 8px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 16px rgba(0,0,0,.5); }

    .btn-arreter {
      background: transparent;
      color: #e05040;
      border: 1px solid #5a2020;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: .83rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      display: none;
      transition: all .2s;
      letter-spacing: .03em;
      font-family: inherit;
    }
    .btn-arreter.visible { display: block; }
    .btn-arreter:hover { background: #5a2020; border-color: #e05040; color: white; }

    /* ── Boutons d'action ── */
    .btn-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 22px; }
    .btn-tirer {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-lt) 100%);
      color: #0c0a07;
      border: none;
      border-radius: 12px;
      padding: 15px 42px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .07em;
      box-shadow: 0 4px 20px rgba(192,120,8,.4);
      font-family: inherit;
    }
    .btn-tirer:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(192,120,8,.5); }
    .btn-tirer:active { transform: translateY(0); }
    .btn-tirer:disabled { opacity: .28; cursor: default; transform: none; box-shadow: none; }
    .btn-reset {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px 22px;
      cursor: pointer;
      font-size: .88rem;
      transition: all .2s;
      font-weight: 500;
      font-family: inherit;
    }
    .btn-reset:hover { border-color: var(--muted); color: var(--text); }

    /* ── Carte numéro tiré ── */
    #carte-numero {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 22px 24px;
      margin-bottom: 22px;
      display: none;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      position: relative;
      overflow: hidden;
    }
    #carte-numero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--ligne-couleur, var(--gold));
      border-radius: 16px 16px 0 0;
    }
    .carte-interieur { display: flex; gap: 24px; align-items: flex-start; }
    .carte-texte { flex: 1; }
    .badge-ligne {
      display: inline-block;
      color: white;
      font-weight: 700;
      font-size: .72rem;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 10px;
      letter-spacing: .14em;
      font-family: 'Cinzel', serif;
    }
    .grand-num {
      font-family: 'Cinzel', serif;
      font-size: 5.5rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
    }
    .wendat-nom { font-size: 1.25rem; font-style: italic; color: var(--gold-lt); margin-bottom: 4px; font-weight: 500; }
    .wendat-phon { font-size: .84rem; color: var(--muted); margin-bottom: 12px; letter-spacing: .04em; }
    .langues { display: flex; gap: 20px; }
    .lang-fr { color: #70b8e0; font-weight: 600; font-size: .88rem; }
    .lang-en { color: #68d898; font-weight: 600; font-size: .88rem; }
    .msg-manquant { color: var(--dim); font-style: italic; font-size: .8rem; margin-top: 8px; }
    .carte-droite { display: flex; flex-direction: column; align-items: center; gap: 12px; flex-shrink: 0; }
    #qrcode { background: white; padding: 8px; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.4); }
    .btn-rejouer {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: .83rem;
      transition: all .2s;
      font-weight: 500;
      font-family: inherit;
    }
    .btn-rejouer:hover { border-color: var(--gold); color: var(--gold-lt); }

    /* ── Tableau de suivi ── */
    #tableau {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }
    #tableau h2 { font-size: .7rem; color: var(--muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: .16em; font-weight: 600; }
    .suivi-grille { display: grid; grid-template-columns: 2rem repeat(12, 1fr); gap: 3px; }
    .suivi-label {
      color: white;
      font-weight: 900;
      font-size: .9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      padding: 5px 0;
      font-family: 'Cinzel', serif;
    }
    .suivi-cell {
      background: #1c1208;
      color: rgba(255,255,255,.45);
      text-align: center;
      padding: 6px 1px;
      border-radius: 5px;
      font-size: .78rem;
      font-weight: 700;
      cursor: default;
      transition: all .15s;
      border: 1px solid transparent;
    }
    .suivi-cell.tire { color: white; cursor: pointer; border-color: rgba(255,255,255,.07); box-shadow: 0 1px 4px rgba(0,0,0,.3); }
    .suivi-cell.tire:hover { opacity: .78; transform: scale(.94); }
    .suivi-cell.actuel { outline: 2px solid rgba(255,255,255,.8); outline-offset: 1px; box-shadow: 0 0 8px rgba(255,255,255,.18); }
    .compteur { text-align: center; margin-top: 14px; font-size: .8rem; color: var(--muted); font-weight: 500; letter-spacing: .05em; }

    /* ── Bandeau classement dans le tableau ── */
    #bandeau-gagnant {
      display: none;
      background: linear-gradient(135deg, #0d3820 0%, #1a5c35 100%);
      border: 1px solid #2ecc71;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 18px;
      box-shadow: 0 0 28px rgba(46,204,113,.2), 0 4px 16px rgba(0,0,0,.4);
    }
    #bandeau-gagnant.visible { display: block; }
    .bandeau-titre {
      font-family: 'Cinzel', serif;
      font-size: .78rem; font-weight: 900;
      letter-spacing: .22em; text-transform: uppercase;
      color: #2ecc71; margin-bottom: 10px;
    }
    .bandeau-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(46,204,113,.12);
      animation: slideIn .4s cubic-bezier(.175,.885,.32,1.275);
    }
    .bandeau-item:last-child { border-bottom: none; padding-bottom: 0; }
    .bandeau-item:first-child { padding-top: 0; }
    .bandeau-rang {
      font-size: 1.3rem; flex-shrink: 0; width: 28px; text-align: center;
    }
    .bandeau-nom { font-size: .95rem; font-weight: 700; color: white; }
    .bandeau-clan-info { font-size: .75rem; color: #80edb5; margin-top: 1px; }
    @keyframes slideIn {
      from { transform: translateY(-8px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* ── Gagnant overlay ── */
    #win-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.92);
      backdrop-filter: blur(6px);
      z-index: 100; justify-content: center; align-items: center;
    }
    .win-card {
      background: linear-gradient(160deg, #1a5c35 0%, #0d3820 100%);
      padding: 50px;
      border-radius: 24px;
      border: 1px solid #2ecc71;
      text-align: center;
      animation: pop .4s cubic-bezier(.175,.885,.32,1.275);
      max-width: 480px; width: 90%;
      box-shadow: 0 0 60px rgba(46,204,113,.25), 0 24px 60px rgba(0,0,0,.7);
    }
    .win-card h1 {
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      margin-bottom: 14px;
      letter-spacing: .1em;
      color: white;
      -webkit-text-fill-color: white;
    }
    .win-joueur { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; color: #80edb5; }
    .win-clan   { font-size: 1rem; color: #58b880; margin-bottom: 28px; }
    .win-card button {
      background: rgba(255,255,255,.1);
      color: white;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 10px;
      padding: 12px 28px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      margin: 5px;
      transition: all .2s;
      letter-spacing: .04em;
      font-family: inherit;
    }
    .win-card button:hover { background: rgba(255,255,255,.2); }
    @keyframes pop { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>

<div id="win-overlay">
  <div class="win-card">
    <h1>🌽 WENDIO ! 🌽</h1>
    <div class="win-joueur" id="win-joueur"></div>
    <div class="win-clan"   id="win-clan"></div>
    <button onclick="fermerWin()">Continuer</button>
    <button onclick="resetJeu()">Nouvelle partie</button>
  </div>
</div>

<h1>WENDIO — Meneur de Jeu</h1>

<!-- Mode local / en ligne -->
<div class="mode-bar">
  <button class="btn-mode actif" id="btn-local"  onclick="setMode('local')">📴 Mode local</button>
  <button class="btn-mode"       id="btn-online" onclick="setMode('online')">🌐 Mode en ligne</button>
</div>

<!-- Panneau en ligne -->
<div id="panneau-online">
  <div id="online-creation" style="text-align:center;">
    <p style="color:var(--muted);font-size:.9rem;">Créez une partie pour obtenir un code à partager avec vos joueurs.</p>
    <button class="btn-creer" onclick="creerPartie()">✚ Créer une partie en ligne</button>
  </div>
  <div class="online-actif" id="online-actif">
    <div>
      <div class="code-label">Code de la partie</div>
      <div class="code-valeur" id="code-affiche">----</div>
      <div class="lien-rejoin" id="lien-rejoin"></div>
      <div class="joueurs-titre">Joueurs connectés : <strong id="joueurs-count">0</strong></div>
      <div id="joueurs-items"></div>
      <button class="btn-arreter" id="btn-arreter" onclick="arreterPartie()">⏹ Terminer la partie</button>
    </div>
    <div class="qr-bloc">
      <div id="qr-rejoindre"></div>
      <small>Lien joueur</small>
    </div>
  </div>
</div>

<!-- Boutons d'action -->
<div class="btn-bar">
  <button class="btn-tirer" id="btn-tirer" onclick="actionTirer()">🎲 TIRER UN NUMÉRO</button>
  <button class="btn-reset"               onclick="resetJeu()">↺ Réinitialiser</button>
</div>

<!-- Carte numéro tiré -->
<div id="carte-numero">
  <div class="carte-interieur">
    <div class="carte-texte">
      <span class="badge-ligne" id="badge-ligne">W</span>
      <div class="grand-num"    id="grand-num">—</div>
      <div class="wendat-nom"   id="wendat-nom"></div>
      <div class="wendat-phon"  id="wendat-phon"></div>
      <div class="langues"><span class="lang-fr" id="lang-fr"></span><span class="lang-en" id="lang-en"></span></div>
      <div class="msg-manquant" id="msg-manquant"></div>
    </div>
    <div class="carte-droite">
      <div id="qrcode"></div>
      <button class="btn-rejouer" onclick="rejouerSon()">▶ Rejouer</button>
    </div>
  </div>
</div>

<!-- Tableau de suivi -->
<div id="tableau">
  <h2>Tableau des tirages</h2>
  <div id="bandeau-gagnant">
    <div class="bandeau-titre">🌽 Classement</div>
    <div id="gagnants-liste"></div>
  </div>
  <div class="suivi-grille" id="suivi-grille"></div>
  <div class="compteur" id="compteur">0 / 72 numéros tirés</div>
</div>

<script src="qrcode.min.js"></script>
<script src="data.js"></script>
<script>
  let tirages      = [];
  let numeroActuel = null;
  let modeOnline   = false;
  let socket       = null;
  let codePartie   = null;

  // ── Mode ──────────────────────────────────────────────────────────
  function setMode(mode) {
    modeOnline = (mode === 'online');
    document.getElementById('btn-local').classList.toggle('actif', !modeOnline);
    document.getElementById('btn-online').classList.toggle('actif', modeOnline);
    document.getElementById('panneau-online').classList.toggle('visible', modeOnline);
    if (modeOnline && !socket) chargerSocket();
  }

  function chargerSocket() {
    const s = document.createElement('script');
    s.src = '/socket.io/socket.io.js';
    s.onload  = connecterSocket;
    s.onerror = () => alert('Serveur introuvable. Lancez server.js avec Node.js.');
    document.head.appendChild(s);
  }

  function connecterSocket() {
    socket = io();

    socket.on('partie-creee', ({ code }) => {
      codePartie = code;
      const lien = `${window.location.origin}/joueur.html?code=${code}`;
      document.getElementById('code-affiche').textContent = code;
      document.getElementById('lien-rejoin').textContent  = lien;
      document.getElementById('online-creation').style.display = 'none';
      document.getElementById('online-actif').classList.add('visible');
      document.getElementById('btn-arreter').classList.add('visible');
      document.getElementById('qr-rejoindre').innerHTML = '';
      if (typeof QRCode !== 'undefined') {
        new QRCode(document.getElementById('qr-rejoindre'), { text: lien, width: 120, height: 120 });
      }
    });

    socket.on('joueur-connecte', ({ nom, clan, count }) => {
      document.getElementById('joueurs-count').textContent = count;
      const c    = CLANS[clan] || {};
      const item = document.createElement('div');
      item.className = 'joueur-item';
      item.innerHTML = `${c.icon || ''}  <strong>${nom}</strong> <span style="color:var(--muted);font-size:.8rem">${clan}</span>`;
      document.getElementById('joueurs-items').appendChild(item);
    });

    socket.on('joueur-deconnecte', ({ nom, count }) => {
      document.getElementById('joueurs-count').textContent = count;
    });

    socket.on('numero-tire', ({ num }) => {
      tirages.push(num);
      numeroActuel = num;
      afficherCarte(num);
      jouerSon(num);
      mettreAJourSuivi(num);
    });

    socket.on('gagnant', ({ nom, clan, rang }) => afficherGagnant(nom, clan, rang));
    socket.on('tous-tires', () => { document.getElementById('btn-tirer').disabled = true; });
  }

  function creerPartie() { if (socket) socket.emit('creer'); }

  function arreterPartie() {
    if (!socket || !codePartie) return;
    if (!confirm('Terminer la partie ? Tous les joueurs seront déconnectés.')) return;
    socket.emit('terminer', { code: codePartie });
    codePartie = null;
    document.getElementById('online-actif').classList.remove('visible');
    document.getElementById('btn-arreter').classList.remove('visible');
    document.getElementById('online-creation').style.display = '';
    document.getElementById('joueurs-items').innerHTML = '';
    document.getElementById('joueurs-count').textContent = '0';
    resetJeu();
  }

  // ── Tirer ─────────────────────────────────────────────────────────
  function actionTirer() {
    if (modeOnline && socket && codePartie) {
      socket.emit('tirer', { code: codePartie });
    } else {
      const restants = [];
      for (let i = 1; i <= 72; i++) { if (!tirages.includes(i)) restants.push(i); }
      if (!restants.length) { document.getElementById('btn-tirer').disabled = true; return; }
      const num = restants[Math.floor(Math.random() * restants.length)];
      tirages.push(num); numeroActuel = num;
      afficherCarte(num); jouerSon(num); mettreAJourSuivi(num);
    }
  }

  // ── Carte numéro ──────────────────────────────────────────────────
  function afficherCarte(num) {
    document.getElementById('carte-numero').style.display = 'block';
    const ligne   = ligneDeNumero(num);
    const couleur = CONFIG[ligne].couleur;
    const data    = NOMBRES[num];
    document.getElementById('carte-numero').style.setProperty('--ligne-couleur', couleur);
    document.getElementById('badge-ligne').textContent       = ligne;
    document.getElementById('badge-ligne').style.background  = couleur;
    document.getElementById('grand-num').textContent         = num;
    document.getElementById('grand-num').style.color         = couleur;
    if (data) {
      document.getElementById('wendat-nom').textContent  = data.wendat;
      document.getElementById('wendat-phon').textContent = data.phon;
      document.getElementById('lang-fr').textContent     = '🇫🇷 ' + data.fr;
      document.getElementById('lang-en').textContent     = '🇬🇧 ' + data.en;
      document.getElementById('msg-manquant').textContent = '';
    } else {
      ['wendat-nom','wendat-phon','lang-fr','lang-en'].forEach(id => document.getElementById(id).textContent = '');
      document.getElementById('msg-manquant').textContent = '— vocabulaire Wendat à compléter —';
    }
    const base = window.location.href.replace(/[^/]*$/, '');
    document.getElementById('qrcode').innerHTML = '';
    if (typeof QRCode !== 'undefined') {
      new QRCode(document.getElementById('qrcode'), { text: base + cheminAudio(num), width: 100, height: 100 });
    }
  }

  // ── Suivi ─────────────────────────────────────────────────────────
  function initialiser() {
    const grille = document.getElementById('suivi-grille');
    grille.innerHTML = '';
    LIGNES.forEach(ligne => {
      const lbl = document.createElement('div');
      lbl.className = 'suivi-label';
      lbl.style.background = CONFIG[ligne].couleur;
      lbl.textContent = ligne;
      grille.appendChild(lbl);
      for (let i = 0; i < 12; i++) {
        const num  = CONFIG[ligne].min + i;
        const cell = document.createElement('div');
        cell.className = 'suivi-cell';
        cell.id = `cell-${num}`;
        cell.textContent = num;
        cell.onclick = () => { if (tirages.includes(num)) { jouerSon(num); surlignerActuel(num); } };
        grille.appendChild(cell);
      }
    });
  }

  function mettreAJourSuivi(num) {
    document.querySelectorAll('.suivi-cell.actuel').forEach(c => c.classList.remove('actuel'));
    const cell = document.getElementById(`cell-${num}`);
    if (cell) { cell.classList.add('tire','actuel'); cell.style.background = CONFIG[ligneDeNumero(num)].couleur; }
    document.getElementById('compteur').textContent = `${tirages.length} / 72 numéros tirés`;
    if (tirages.length >= 72) document.getElementById('btn-tirer').disabled = true;
  }

  function surlignerActuel(num) {
    document.querySelectorAll('.suivi-cell.actuel').forEach(c => c.classList.remove('actuel'));
    document.getElementById(`cell-${num}`).classList.add('actuel');
    afficherCarte(num); numeroActuel = num;
  }

  function rejouerSon() { if (numeroActuel) jouerSon(numeroActuel); }

  // ── Gagnant ───────────────────────────────────────────────────────
  const MEDAILLES = ['🥇','🥈','🥉'];
  function afficherGagnant(nom, clan, rang) {
    const c = CLANS[clan] || {};
    // Grand overlay
    const medaille = MEDAILLES[rang - 1] || `#${rang}`;
    document.getElementById('win-joueur').textContent = `${medaille} ${c.icon || ''} ${nom}`;
    document.getElementById('win-clan').textContent   = `${clan} — ${c.label || ''}`;
    document.getElementById('win-overlay').style.display = 'flex';
    // Ajouter au classement
    const item = document.createElement('div');
    item.className = 'bandeau-item';
    item.innerHTML = `<span class="bandeau-rang">${medaille}</span>
      <div><div class="bandeau-nom">${nom}</div>
      <div class="bandeau-clan-info">${c.icon || ''} ${clan} — ${c.label || ''}</div></div>`;
    document.getElementById('gagnants-liste').appendChild(item);
    document.getElementById('bandeau-gagnant').classList.add('visible');
  }

  function fermerWin() { document.getElementById('win-overlay').style.display = 'none'; }

  function resetJeu() {
    tirages = []; numeroActuel = null;
    fermerWin();
    document.getElementById('btn-tirer').disabled = false;
    document.getElementById('carte-numero').style.display = 'none';
    document.getElementById('compteur').textContent = '0 / 72 numéros tirés';
    document.getElementById('gagnants-liste').innerHTML = '';
    document.getElementById('bandeau-gagnant').classList.remove('visible');
    document.querySelectorAll('.suivi-cell').forEach(c => { c.classList.remove('tire','actuel'); c.style.background = ''; });
  }

  initialiser();
</script>
</body>
</html>

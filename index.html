<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WENDIO — Démo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #ede4ce;
      font-family: 'Cinzel', Georgia, serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Cover image fills the viewport while preserving its aspect ratio */
    .cover {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      animation: fadeIn 1.1s ease-out both;
    }

    /* Discreet hint pulsing at the bottom */
    .hint {
      position: fixed;
      bottom: 2.2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Cinzel', serif;
      font-size: .82rem;
      letter-spacing: .42em;
      text-transform: uppercase;
      color: #4a3a20;
      opacity: 0;
      animation: hintIn .9s ease-out 1.4s forwards, hintPulse 2.6s ease-in-out 2.4s infinite;
      pointer-events: none;
      white-space: nowrap;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(.985); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes hintIn {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: .75; transform: translateX(-50%) translateY(0); }
    }
    @keyframes hintPulse {
      0%, 100% { opacity: .35; }
      50%      { opacity: .85; }
    }

    /* Tablet / phone portrait: a bit more breathing room */
    @media (max-width: 700px) {
      .hint { font-size: .68rem; bottom: 1.4rem; letter-spacing: .32em; }
    }
  </style>
</head>
<body onclick="entrer()">

  <img class="cover" src="couverture.png" alt="WENDIO Démo">

  <div class="hint">Touchez pour commencer</div>

  <script>
    function entrer() { window.location.href = 'lobby.html'; }
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') entrer();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WENDIO — Admin commentaires</title>
<style>
  :root {
    --amber: #c8843a;
    --amber-soft: #e0a55c;
    --bg: #1a1008;
    --bg2: #2c1a0e;
    --card: #2a1e12;
    --card-edge: #3d2a18;
    --text: #f4ead8;
    --muted: #b8a384;
    --ok: #4ea05a;
    --nok: #c45c4a;
    --na: #7a6a55;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    padding: 20px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  h1 {
    font-family: 'Cinzel', Georgia, serif;
    color: var(--amber-soft);
    margin: 0 0 8px;
  }
  .meta { color: var(--muted); margin-bottom: 24px; }
  .stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--card-edge);
    border-radius: 10px;
    padding: 12px 18px;
    flex: 1;
    min-width: 140px;
  }
  .stat .num { font-size: 1.8rem; font-weight: 700; color: var(--amber-soft); }
  .stat .lbl { color: var(--muted); font-size: .85rem; }
  .submission {
    background: var(--card);
    border: 1px solid var(--card-edge);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .submission header {
    border-bottom: 1px solid var(--card-edge);
    padding-bottom: 12px;
    margin-bottom: 12px;
  }
  .submission h2 {
    margin: 0 0 4px;
    font-family: 'Cinzel', Georgia, serif;
    color: var(--amber-soft);
    font-size: 1.2rem;
  }
  .submission .when { color: var(--muted); font-size: .85rem; }
  .section-title {
    color: var(--amber-soft);
    font-weight: 600;
    margin: 14px 0 6px;
    font-size: .95rem;
  }
  .item-line {
    padding: 4px 0 4px 24px;
    position: relative;
    font-size: .92rem;
  }
  .flag {
    position: absolute;
    left: 0;
    top: 4px;
  }
  .note-line {
    margin-left: 24px;
    color: var(--amber-soft);
    background: #1f1409;
    padding: 6px 10px;
    border-left: 2px solid var(--amber);
    border-radius: 0 6px 6px 0;
    margin-top: 4px;
    font-size: .88rem;
  }
  .question-block {
    background: #3a2818;
    border-left: 3px solid var(--amber);
    padding: 8px 12px;
    margin: 8px 0;
    border-radius: 0 6px 6px 0;
    font-size: .9rem;
  }
  .question-block .q { font-style: italic; color: var(--amber-soft); margin-bottom: 4px; }
  .question-block .a { color: var(--text); }
  .libre-block {
    background: #1f1409;
    border: 1px solid var(--amber);
    padding: 12px 16px;
    border-radius: 8px;
    margin-top: 16px;
    white-space: pre-wrap;
  }
  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  button {
    background: var(--amber);
    color: #1a1008;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 600;
  }
  button:hover { background: var(--amber-soft); }
</style>
</head>
<body>
<div class="wrap">
  <h1>WENDIO — Commentaires reçus</h1>
  <div class="meta" id="meta">Chargement…</div>

  <div class="stats" id="stats"></div>

  <div class="controls">
    <button id="refresh">🔄 Rafraîchir</button>
    <button id="export">📥 Télécharger en JSON</button>
  </div>

  <div id="list"></div>
</div>

<script>
const FLAGS = { ok: '✅', nok: '❌', na: '➖' };
const FLAG_NULL = '⬜';

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else e[k] = attrs[k];
  }
  children.forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}

function fmtDate(iso) {
  try { return new Date(iso).toLocaleString('fr-CA'); }
  catch { return iso; }
}

function render(items) {
  const meta = document.getElementById('meta');
  const list = document.getElementById('list');
  const stats = document.getElementById('stats');

  meta.textContent = `${items.length} soumission(s) — dernière mise à jour ${new Date().toLocaleTimeString('fr-CA')}`;

  let totOk = 0, totNok = 0, totNa = 0, totVide = 0;
  items.forEach(s => (s.sections || []).forEach(sec => (sec.items || []).forEach(it => {
    if (it.status === 'ok') totOk++;
    else if (it.status === 'nok') totNok++;
    else if (it.status === 'na') totNa++;
    else totVide++;
  })));

  stats.replaceChildren();
  [
    [items.length, 'Soumissions'],
    [totOk, '✅ OK'],
    [totNok, '❌ Problèmes'],
    [totNa, '➖ N/A'],
    [totVide, '⬜ Non renseigné']
  ].forEach(([n, lbl]) => {
    stats.appendChild(el('div', { class: 'stat' },
      el('div', { class: 'num' }, String(n)),
      el('div', { class: 'lbl' }, lbl)
    ));
  });

  list.replaceChildren();
  if (!items.length) {
    list.appendChild(el('div', { class: 'empty' }, 'Aucun commentaire reçu pour l\'instant.'));
    return;
  }

  items.slice().reverse().forEach(s => {
    const sub = el('div', { class: 'submission' });
    const head = el('header', null,
      el('h2', null, s.name || '(anonyme)'),
      el('div', { class: 'when' }, `${fmtDate(s.received_at)} — Appareil : ${s.device || '(non précisé)'}`)
    );
    sub.appendChild(head);

    (s.sections || []).forEach(sec => {
      const hasContent = (sec.questions || []).some(q => q.answer)
                     || (sec.items || []).some(it => it.status || it.note);
      if (!hasContent) return;

      sub.appendChild(el('div', { class: 'section-title' }, sec.titre));

      (sec.questions || []).forEach(q => {
        if (!q.answer) return;
        sub.appendChild(el('div', { class: 'question-block' },
          el('div', { class: 'q' }, '❓ ' + q.question),
          el('div', { class: 'a' }, q.answer)
        ));
      });

      (sec.items || []).forEach(it => {
        if (!it.status && !it.note) return;
        const flag = it.status ? FLAGS[it.status] : FLAG_NULL;
        const line = el('div', { class: 'item-line' },
          el('span', { class: 'flag' }, flag),
          it.label
        );
        sub.appendChild(line);
        if (it.note) sub.appendChild(el('div', { class: 'note-line' }, it.note));
      });
    });

    if (s.free_text) {
      sub.appendChild(el('div', { class: 'section-title' }, 'Commentaires libres'));
      sub.appendChild(el('div', { class: 'libre-block' }, s.free_text));
    }

    list.appendChild(sub);
  });
}

async function load() {
  try {
    const r = await fetch('/api/feedback-list');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const items = await r.json();
    render(items);
  } catch (e) {
    document.getElementById('meta').textContent = '❌ Erreur de chargement : ' + e.message;
  }
}

document.getElementById('refresh').addEventListener('click', load);
document.getElementById('export').addEventListener('click', async () => {
  const r = await fetch('/api/feedback-list');
  const items = await r.json();
  const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `wendio-feedback-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});

load();
setInterval(load, 30000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WENDIO — Carte Joueur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2c1a0e;
      --accent:  #b86808;
      --accent-lt: #e09030;
      --bg:      #ede0c8;
      --surface: #ffffff;
      --vert:    #1e9050;
      --vert-lt: #28c86a;
      --muted:   #7a5030;
      --border:  #d4b888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      background-image: radial-gradient(ellipse 120% 50% at 50% 0%, #e4d0a8 0%, #ede0c8 55%);
      color: var(--primary);
      min-height: 100vh;
      padding: 16px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 2rem;
      letter-spacing: .22em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-lt) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      filter: drop-shadow(0 1px 3px rgba(184,104,8,.18));
    }

    /* ── Overlay connexion ── */
    #overlay-rejoindre {
      display: none; position: fixed; inset: 0;
      background: rgba(15,8,0,.78);
      backdrop-filter: blur(6px);
      z-index: 200;
      justify-content: center; align-items: center;
    }
    #overlay-rejoindre.visible { display: flex; }
    .form-rejoindre {
      background: var(--surface);
      border-radius: 20px;
      padding: 36px 30px;
      width: 90%; max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,.4);
      border: 1px solid var(--border);
    }
    .form-rejoindre h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.25rem;
      color: var(--accent);
      margin-bottom: 6px;
      letter-spacing: .06em;
    }
    .form-rejoindre .code-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--vert), var(--vert-lt));
      color: white;
      font-family: 'Cinzel', serif;
      font-weight: 900;
      letter-spacing: .2em;
      padding: 5px 16px;
      border-radius: 8px;
      margin-bottom: 18px;
      font-size: 1.15rem;
      box-shadow: 0 3px 12px rgba(30,144,80,.3);
    }
    .form-rejoindre label {
      display: block;
      font-size: .72rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 5px;
      margin-top: 14px;
      text-transform: uppercase;
      letter-spacing: .1em;
    }
    .form-rejoindre input {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
      color: var(--primary);
    }
    .form-rejoindre input:focus { border-color: var(--accent); }
    .form-clan { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
    .btn-clan-join {
      padding: 10px 8px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: #fdf7ee;
      cursor: pointer;
      font-weight: 700;
      font-size: .88rem;
      line-height: 1.4;
      transition: all .2s;
      text-align: center;
      font-family: inherit;
      color: var(--primary);
    }
    .btn-clan-join:hover { border-color: var(--accent); background: #fef3e2; }
    .btn-clan-join.actif {
      background: linear-gradient(135deg, var(--accent), var(--accent-lt));
      color: white;
      border-color: transparent;
      box-shadow: 0 3px 12px rgba(184,104,8,.3);
    }
    .btn-rejoindre {
      width: 100%;
      margin-top: 20px;
      background: linear-gradient(135deg, var(--vert), var(--vert-lt));
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .05em;
      box-shadow: 0 4px 16px rgba(30,144,80,.32);
      transition: all .2s;
      font-family: inherit;
    }
    .btn-rejoindre:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(30,144,80,.42); }
    .btn-rejoindre:disabled { opacity: .38; cursor: default; transform: none; box-shadow: none; }
    .msg-erreur { color: #c0392b; font-size: .83rem; margin-top: 8px; display: none; font-weight: 500; }
    .msg-erreur.visible { display: block; }

    /* ── Badge en ligne ── */
    .online-badge {
      display: none;
      background: linear-gradient(135deg, var(--vert), var(--vert-lt));
      color: white;
      font-size: .76rem;
      font-weight: 700;
      padding: 5px 16px;
      border-radius: 20px;
      margin-bottom: 12px;
      letter-spacing: .07em;
      box-shadow: 0 2px 10px rgba(30,144,80,.28);
    }
    .online-badge.visible { display: inline-block; }

    /* ── Contrôles ── */
    .controles {
      background: var(--surface);
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(60,30,10,.1);
      border: 1px solid var(--border);
      padding: 16px 18px;
      margin-bottom: 14px;
      width: 100%; max-width: 560px;
    }
    .section-titre {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .13em;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 700;
    }
    .clan-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
    .btn-clan {
      background: #fdf7ee;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: .88rem;
      transition: all .2s;
      text-align: center;
      line-height: 1.4;
      font-family: inherit;
      color: var(--primary);
    }
    .btn-clan:hover { border-color: var(--accent); background: #fef3e2; }
    .btn-clan.actif {
      background: linear-gradient(135deg, var(--accent), var(--accent-lt));
      color: white;
      border-color: transparent;
      box-shadow: 0 3px 12px rgba(184,104,8,.28);
    }
    .objectif { font-size: .83rem; font-style: italic; color: var(--muted); min-height: 18px; margin-bottom: 12px; font-weight: 500; }
    .btn-nouvelle {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-weight: 700;
      font-size: .95rem;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .04em;
      font-family: inherit;
    }
    .btn-nouvelle:hover { opacity: .84; transform: translateY(-1px); }

    /* ── Section code ── */
    .section-code {
      background: var(--surface);
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(60,30,10,.1);
      border: 1px solid var(--border);
      padding: 16px 18px;
      margin-bottom: 14px;
      width: 100%; max-width: 560px;
    }
    .code-entree { display: flex; gap: 10px; margin-top: 8px; }
    .code-entree input {
      flex: 0 0 auto;
      width: 108px;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: .22em;
      text-transform: uppercase;
      text-align: center;
      outline: none;
      transition: border-color .2s;
      color: var(--primary);
    }
    .code-entree input:focus { border-color: var(--accent); }
    .btn-entrer-code {
      flex: 1;
      background: linear-gradient(135deg, var(--vert), var(--vert-lt));
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      font-size: .95rem;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .04em;
      font-family: inherit;
      box-shadow: 0 3px 12px rgba(30,144,80,.28);
    }
    .btn-entrer-code:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(30,144,80,.38); }
    .btn-entrer-code:disabled { opacity: .38; cursor: default; transform: none; box-shadow: none; }

    /* ── Numéro annoncé ── */
    #annonce {
      display: none;
      background: var(--primary);
      color: white;
      border-radius: 14px;
      padding: 14px 20px;
      margin-bottom: 14px;
      width: 100%; max-width: 560px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(44,26,14,.28);
    }
    #annonce.visible { display: block; }
    .annonce-label { font-size: .68rem; color: #b8956a; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .12em; font-weight: 600; }
    .annonce-num { font-family: 'Cinzel', serif; font-size: 3.5rem; font-weight: 900; color: var(--accent-lt); line-height: 1; }
    .annonce-wendat { font-size: .92rem; font-style: italic; color: #c4905a; margin-top: 5px; }

    /* ── Grille bingo ── */
    .bingo-wrap { width: 100%; max-width: 560px; }
    .bingo-grid {
      display: grid;
      grid-template-columns: 2.4rem repeat(6, 1fr);
      gap: 5px;
      background: var(--primary);
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(44,26,14,.32), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .row-label {
      color: white;
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      letter-spacing: .04em;
    }
    .cell {
      background: white;
      aspect-ratio: 1/1;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      transition: all .12s;
      user-select: none;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
      border: 2px solid transparent;
    }
    .cell:hover { transform: scale(.94); border-color: rgba(184,104,8,.35); }
    .cell:active { transform: scale(.86); }
    .cell.cible { border-color: var(--accent-lt); background: #fffbf2; box-shadow: 0 0 0 1px var(--accent-lt), 0 2px 8px rgba(224,144,48,.2); }
    .cell.marque::after { content: '🌽'; position: absolute; font-size: 1.65rem; z-index: 2; }
    .cell.auto-marque { background: #fff8e8; border-color: rgba(224,144,48,.28); }
    .cell.coeur { background: #f5f0e8; font-size: 1.5rem; cursor: default; border-color: transparent; }
    .cell.coeur:hover { transform: none; border-color: transparent; }
    .cell.coeur:active { transform: none; }

    /* ── Bouton WENDIO ── */
    #btn-wendio {
      display: none;
      width: 100%; max-width: 560px;
      margin-top: 14px;
      background: linear-gradient(135deg, var(--vert), var(--vert-lt));
      color: white;
      border: none;
      border-radius: 14px;
      padding: 20px;
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: .1em;
      cursor: pointer;
      animation: pulse 1.2s infinite;
      box-shadow: 0 6px 24px rgba(30,144,80,.48);
    }
    #btn-wendio.visible { display: block; }
    @keyframes pulse {
      0%,100% { transform: scale(1); box-shadow: 0 6px 24px rgba(30,144,80,.48); }
      50% { transform: scale(1.025); box-shadow: 0 10px 32px rgba(30,144,80,.68); }
    }

    /* ── Victoire overlay ── */
    #win-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.88);
      backdrop-filter: blur(6px);
      z-index: 100; justify-content: center; align-items: center;
    }
    #win-overlay.visible { display: flex; }
    .win-card {
      background: linear-gradient(160deg, #1a5c35 0%, #0d3820 100%);
      padding: 44px 50px;
      border-radius: 24px;
      border: 1px solid #2ecc71;
      text-align: center;
      animation: pop .4s cubic-bezier(.175,.885,.32,1.275);
      max-width: 480px; width: 90%;
      box-shadow: 0 0 60px rgba(46,204,113,.22), 0 24px 60px rgba(0,0,0,.7);
    }
    .win-card h1 {
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      margin-bottom: 12px;
      letter-spacing: .1em;
      color: white;
    }
    .win-joueur { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; color: #80edb5; }
    .win-clan   { font-size: .95rem; color: #58b880; margin-bottom: 24px; }
    .win-card button {
      background: rgba(255,255,255,.1);
      color: white;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 10px;
      padding: 12px 26px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      margin: 4px;
      transition: all .2s;
      font-family: inherit;
    }
    .win-card button:hover { background: rgba(255,255,255,.2); }
    @keyframes pop { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ── Toast autre gagnant ── */
    #toast-gagnant {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%) translateY(-140%);
      background: linear-gradient(135deg, #0d3820, #1a5c35);
      border: 1px solid #2ecc71;
      border-radius: 14px;
      padding: 13px 14px 13px 18px;
      z-index: 150;
      width: min(90vw, 340px);
      box-shadow: 0 8px 28px rgba(0,0,0,.45);
      display: flex; align-items: center; gap: 12px;
      transition: transform .4s cubic-bezier(.175,.885,.32,1.275);
    }
    #toast-gagnant.visible { transform: translateX(-50%) translateY(0); }
    .toast-body { flex: 1; }
    .toast-rang { font-size: .7rem; color: #80edb5; letter-spacing: .08em; margin-bottom: 2px; }
    .toast-nom  { font-size: 1rem; font-weight: 700; color: white; }
    .toast-clan { font-size: .75rem; color: #80edb5; margin-top: 2px; }
    .toast-close {
      background: rgba(255,255,255,.12); border: none; color: white;
      width: 26px; height: 26px; border-radius: 50%;
      cursor: pointer; font-size: 1.1rem; line-height: 1; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .toast-close:hover { background: rgba(255,255,255,.25); }
  </style>
</head>
<body>

<!-- Formulaire de connexion en ligne -->
<div id="overlay-rejoindre">
  <div class="form-rejoindre">
    <h2>Rejoindre la partie</h2>
    <div class="code-badge" id="badge-code">----</div>
    <label>Votre prénom</label>
    <input type="text" id="input-nom" placeholder="ex : Marie" maxlength="20" />
    <label>Votre clan</label>
    <div class="form-clan" id="form-clan-grid"></div>
    <button class="btn-rejoindre" id="btn-rejoindre-submit" onclick="rejoindrePartie()" disabled>Rejoindre →</button>
    <div class="msg-erreur" id="msg-erreur"></div>
  </div>
</div>

<!-- Toast autre gagnant -->
<div id="toast-gagnant">
  <div class="toast-body">
    <div class="toast-rang" id="toast-rang"></div>
    <div class="toast-nom"  id="toast-nom"></div>
    <div class="toast-clan" id="toast-clan"></div>
  </div>
  <button class="toast-close" onclick="fermerToast()">×</button>
</div>

<!-- Overlay victoire -->
<div id="win-overlay">
  <div class="win-card">
    <h1>🌽 WENDIO ! 🌽</h1>
    <div class="win-joueur" id="win-joueur"></div>
    <div class="win-clan"   id="win-clan"></div>
    <button onclick="fermerWin()">Continuer</button>
    <button onclick="nouvellePartie()">Nouvelle carte</button>
  </div>
</div>

<h1>WENDIO</h1>
<div class="online-badge" id="online-badge">🌐 Partie en ligne</div>

<!-- Rejoindre une partie avec un code -->
<div class="section-code" id="section-code">
  <div class="section-titre">Rejoindre une partie en ligne</div>
  <div class="code-entree">
    <input type="text" id="input-code" placeholder="CODE" maxlength="4"
      oninput="this.value=this.value.toUpperCase(); validerCode()"
      onkeydown="if(event.key==='Enter') entrerCode()" />
    <button class="btn-entrer-code" id="btn-entrer-code" onclick="entrerCode()" disabled>Rejoindre →</button>
  </div>
</div>

<!-- Contrôles (mode local uniquement) -->
<div class="controles" id="controles-local" style="max-width:560px;">
  <div class="section-titre">Choisissez votre clan</div>
  <div class="clan-grid" id="clan-grid"></div>
  <div class="objectif" id="objectif">Sélectionnez un clan pour voir votre objectif</div>
  <button class="btn-nouvelle" onclick="nouvellePartie()">🔄 Nouvelle carte aléatoire</button>
</div>

<!-- Numéro annoncé (mode en ligne) -->
<div id="annonce">
  <div class="annonce-label">Numéro annoncé</div>
  <div class="annonce-num"    id="annonce-num">—</div>
  <div class="annonce-wendat" id="annonce-wendat"></div>
</div>

<!-- Grille -->
<div class="bingo-wrap">
  <div class="bingo-grid" id="grille"></div>
</div>

<!-- Bouton victoire -->
<button id="btn-wendio" onclick="declarerVictoire()">🌽 WENDIO !</button>

<script src="data.js"></script>
<script>
  let carteActuelle  = null;
  let clanActuel     = null;
  let selectionnees  = new Set();
  let modeOnline     = false;
  let socket         = null;
  let codePartie     = null;
  let nomJoueur      = null;
  let clanJoinForm   = null; // clan choisi dans le formulaire de connexion
  let tiresOnline    = [];   // numéros tirés reçus du serveur

  // ── Détection du mode (paramètre ?code= ou saisie manuelle) ─────────
  function demarrer() {
    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');

    // Boutons clan (mode local)
    const clanGridLocal = document.getElementById('clan-grid');
    Object.entries(CLANS).forEach(([nom, clan]) => {
      const btn = document.createElement('button');
      btn.className = 'btn-clan';
      btn.id = `clan-${nom}`;
      btn.innerHTML = `${clan.icon} <strong>${nom}</strong><br><small style="font-weight:normal;font-size:.8em">${clan.wendat}</small>`;
      btn.onclick = () => setClan(nom);
      clanGridLocal.appendChild(btn);
    });

    if (code) {
      activerModeOnline(code.toUpperCase());
    } else {
      nouvellePartie();
    }
  }

  function validerCode() {
    const code = document.getElementById('input-code').value.trim();
    document.getElementById('btn-entrer-code').disabled = code.length !== 4;
  }

  function entrerCode() {
    const code = document.getElementById('input-code').value.trim().toUpperCase();
    if (code.length !== 4) return;
    activerModeOnline(code);
  }

  function activerModeOnline(code) {
    modeOnline = true;
    codePartie = code;
    document.getElementById('online-badge').classList.add('visible');
    document.getElementById('controles-local').style.display = 'none';
    document.getElementById('section-code').style.display = 'none';

    // Peupler le formulaire de connexion
    document.getElementById('badge-code').textContent = codePartie;
    const formClan = document.getElementById('form-clan-grid');
    formClan.innerHTML = '';
    Object.entries(CLANS).forEach(([nom, clan]) => {
      const btn = document.createElement('button');
      btn.className = 'btn-clan-join';
      btn.innerHTML = `${clan.icon} <strong>${nom}</strong><br><small style="font-weight:normal">${clan.wendat}</small>`;
      btn.onclick = () => {
        clanJoinForm = nom;
        document.querySelectorAll('.btn-clan-join').forEach(b => b.classList.remove('actif'));
        btn.classList.add('actif');
        validerFormulaire();
      };
      formClan.appendChild(btn);
    });

    document.getElementById('input-nom').addEventListener('input', validerFormulaire);
    document.getElementById('overlay-rejoindre').classList.add('visible');
    chargerSocket();
  }

  function validerFormulaire() {
    const nom = document.getElementById('input-nom').value.trim();
    document.getElementById('btn-rejoindre-submit').disabled = !(nom && clanJoinForm);
  }

  // ── Socket.io ────────────────────────────────────────────────────
  function chargerSocket() {
    const s = document.createElement('script');
    s.src = '/socket.io/socket.io.js';
    s.onload  = connecterSocket;
    s.onerror = () => {
      document.getElementById('msg-erreur').textContent = 'Impossible de joindre le serveur.';
      document.getElementById('msg-erreur').classList.add('visible');
    };
    document.head.appendChild(s);
  }

  function connecterSocket() {
    socket = io();

    socket.on('rejoint', ({ tirages }) => {
      // Fermer le formulaire
      document.getElementById('overlay-rejoindre').classList.remove('visible');
      clanActuel   = clanJoinForm;
      nomJoueur    = document.getElementById('input-nom').value.trim();
      tiresOnline  = tirages;
      carteActuelle = genererCarte();
      rendreGrille();
      // Marquer les numéros déjà tirés
      tirages.forEach(num => marquerNumero(num));
      document.getElementById('annonce').classList.add('visible');
    });

    socket.on('numero-tire', ({ num }) => {
      tiresOnline.push(num);
      // Afficher l'annonce
      document.getElementById('annonce-num').textContent = num;
      const data = NOMBRES[num];
      document.getElementById('annonce-wendat').textContent = data ? data.wendat : '';
      // Auto-marquer sur la carte
      marquerNumero(num);
      jouerSon(num);
      verifierVictoire();
    });

    socket.on('gagnant', ({ nom, clan, rang }) => {
      if (nom === nomJoueur) {
        afficherGagnant(nom, clan, rang);
      } else {
        afficherToastGagnant(nom, clan, rang);
      }
    });

    socket.on('partie-terminee', () => {
      alert('La partie a été terminée par le meneur.');
    });

    socket.on('erreur', msg => {
      document.getElementById('msg-erreur').textContent = msg;
      document.getElementById('msg-erreur').classList.add('visible');
    });
  }

  function rejoindrePartie() {
    const nom = document.getElementById('input-nom').value.trim();
    if (!nom || !clanJoinForm || !socket) return;
    socket.emit('rejoindre', { code: codePartie, nom, clan: clanJoinForm });
  }

  // ── Marquage automatique d'un numéro annoncé ─────────────────────
  function marquerNumero(num) {
    // Trouver toutes les cases qui contiennent ce numéro sur la carte
    LIGNES.forEach((ligne, ligneIdx) => {
      for (let col = 0; col < 6; col++) {
        if (!estCoeur(ligne, col) && valeurCase(carteActuelle, ligne, col) === num) {
          selectionnees.add(ligne + col);
        }
      }
    });
    rendreGrille();
  }

  // ── Mode local ────────────────────────────────────────────────────
  function setClan(nom) {
    clanActuel = nom;
    document.querySelectorAll('.btn-clan').forEach(b => b.classList.remove('actif'));
    document.getElementById(`clan-${nom}`).classList.add('actif');
    const clan = CLANS[nom];
    document.getElementById('objectif').textContent =
      `Objectif : ${clan.label} — ${clan.points} pt${clan.points > 1 ? 's' : ''} WENDIO`;
    rendreGrille();
  }

  function nouvellePartie() {
    carteActuelle = genererCarte();
    selectionnees = new Set();
    tiresOnline   = [];
    document.getElementById('win-overlay').classList.remove('visible');
    document.getElementById('btn-wendio').classList.remove('visible');
    rendreGrille();
  }

  // ── Rendu de la grille ────────────────────────────────────────────
  function rendreGrille() {
    const grille = document.getElementById('grille');
    grille.innerHTML = '';

    LIGNES.forEach((ligne, ligneIdx) => {
      const label = document.createElement('div');
      label.className = 'row-label';
      label.style.background = CONFIG[ligne].couleur;
      label.textContent = ligne;
      grille.appendChild(label);

      for (let col = 0; col < 6; col++) {
        const cell = document.createElement('div');
        const id   = ligne + col;

        if (estCoeur(ligne, col)) {
          cell.className = 'cell coeur';
          cell.textContent = COEUR[id] || '🐾';
        } else {
          const val     = valeurCase(carteActuelle, ligne, col);
          const marque  = selectionnees.has(id);
          const isTire  = modeOnline && tiresOnline.includes(val); // auto-marqué

          cell.className = ['cell',
            marque  ? 'marque'  : '',
            isTire && !marque ? 'auto-marque' : '',
            estCible(ligneIdx, col) ? 'cible' : ''
          ].filter(Boolean).join(' ');

          cell.textContent = val;

          cell.onclick = () => {
            if (selectionnees.has(id)) selectionnees.delete(id);
            else selectionnees.add(id);
            if (!modeOnline) jouerSon(val);
            rendreGrille();
            if (!modeOnline) verifierVictoire();
          };
        }
        grille.appendChild(cell);
      }
    });
  }

  function estCible(ligneIdx, colIdx) {
    if (!clanActuel) return false;
    const ligne = LIGNES[ligneIdx];
    const v = CLANS[clanActuel].victoire;
    if (v === 'coins')  return (ligneIdx === 0 || ligneIdx === 5) && (colIdx === 0 || colIdx === 5);
    if (v === 'carre')  return ligneIdx >= 1 && ligneIdx <= 4 && colIdx >= 1 && colIdx <= 4 && !estCoeur(ligne, colIdx);
    if (v === 'pleine') return !estCoeur(ligne, colIdx);
    return false;
  }

  // ── Vérification de victoire ──────────────────────────────────────
  function verifierVictoire() {
    if (!clanActuel) return;
    const has = (l, c) => selectionnees.has(l + c);
    const v   = CLANS[clanActuel].victoire;
    let gagne = false;

    if (v === 'coins') {
      gagne = has('W',0) && has('W',5) && has('O',0) && has('O',5);
    } else if (v === 'pleine') {
      let n = 0;
      LIGNES.forEach(l => { for (let c = 0; c < 6; c++) if (!estCoeur(l,c) && has(l,c)) n++; });
      gagne = n >= 32;
    } else if (v === 'carre') {
      gagne = true;
      for (let li = 1; li <= 4 && gagne; li++)
        for (let ci = 1; ci <= 4 && gagne; ci++) {
          const l = LIGNES[li];
          if (!estCoeur(l,ci) && !has(l,ci)) gagne = false;
        }
    } else if (v === 'ligne') {
      for (let li = 0; li < 6 && !gagne; li++) {
        const l = LIGNES[li];
        let ok = true;
        for (let ci = 0; ci < 6; ci++) if (!estCoeur(l,ci) && !has(l,ci)) { ok = false; break; }
        if (ok) gagne = true;
      }
    }

    if (gagne) {
      if (modeOnline) {
        // Mode en ligne : afficher le bouton WENDIO !
        document.getElementById('btn-wendio').classList.add('visible');
      } else {
        // Mode local : overlay immédiat
        afficherGagnant(null, clanActuel);
      }
    }
  }

  function declarerVictoire() {
    if (socket && codePartie) {
      socket.emit('victoire', { code: codePartie, nom: nomJoueur, clan: clanActuel });
    }
    document.getElementById('btn-wendio').classList.remove('visible');
  }

  const MEDAILLES = ['🥇','🥈','🥉'];

  function afficherGagnant(nom, clan, rang) {
    const c       = CLANS[clan] || {};
    const medaille = rang ? (MEDAILLES[rang - 1] || `#${rang}`) : '🥇';
    document.getElementById('win-joueur').textContent = nom
      ? `${medaille} ${c.icon || ''} ${nom}`
      : `${c.icon || ''} Vous avez gagné !`;
    document.getElementById('win-clan').textContent = `${clan} — ${c.label || ''}`;
    document.getElementById('win-overlay').classList.add('visible');
  }

  let _toastTimer = null;
  function afficherToastGagnant(nom, clan, rang) {
    const c       = CLANS[clan] || {};
    const medaille = MEDAILLES[rang - 1] || `#${rang}`;
    const ordinal  = rang === 1 ? '1re place' : `${rang}e place`;
    document.getElementById('toast-rang').textContent  = `${medaille} ${ordinal}`;
    document.getElementById('toast-nom').textContent   = `${c.icon || ''} ${nom} a gagné !`;
    document.getElementById('toast-clan').textContent  = `${clan} — Continuez à jouer !`;
    document.getElementById('toast-gagnant').classList.add('visible');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(fermerToast, 6000);
  }

  function fermerToast() {
    document.getElementById('toast-gagnant').classList.remove('visible');
  }

  function fermerWin() { document.getElementById('win-overlay').classList.remove('visible'); }

  demarrer();
</script>
</body>
</html>

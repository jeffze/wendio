<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WENDIO — Carte Joueur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2c1a0e;
      --accent:  #b86808;
      --accent-lt: #e09030;
      --bg:      #ede0c8;
      --surface: #ffffff;
      --vert:    #1e9050;
      --vert-lt: #28c86a;
      --muted:   #7a5030;
      --border:  #d4b888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      background-image: radial-gradient(ellipse 120% 50% at 50% 0%, #e4d0a8 0%, #ede0c8 55%);
      color: var(--primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 32px;
    }

    h1 {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 2rem;
      letter-spacing: .22em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-lt) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      filter: drop-shadow(0 1px 3px rgba(184,104,8,.18));
    }

    /* ── Toggle local / en ligne ── */
    .mode-bar {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 4px;
      margin-bottom: 18px;
      box-shadow: 0 1px 8px rgba(60,30,10,.08);
    }
    .btn-mode {
      padding: 9px 22px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 600;
      font-size: .88rem;
      border-radius: 50px;
      transition: all .2s;
      letter-spacing: .03em;
      font-family: inherit;
    }
    .btn-mode.actif {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-lt) 100%);
      color: white;
      box-shadow: 0 2px 10px rgba(184,104,8,.35);
      font-weight: 700;
    }

    /* ── Vue setup ── */
    #vue-setup {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .setup-panel {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(60,30,10,.1);
      border: 1px solid var(--border);
      padding: 20px;
      width: 100%;
    }
    .section-titre {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .13em;
      color: var(--muted);
      margin-bottom: 12px;
      font-weight: 700;
    }

    /* Clan grid */
    .clan-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
    .btn-clan {
      background: #fdf7ee;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: .88rem;
      transition: all .2s;
      text-align: center;
      line-height: 1.4;
      font-family: inherit;
      color: var(--primary);
    }
    .btn-clan:hover { border-color: var(--accent); background: #fef3e2; }
    .btn-clan.actif {
      background: linear-gradient(135deg, var(--accent), var(--accent-lt));
      color: white;
      border-color: transparent;
      box-shadow: 0 3px 12px rgba(184,104,8,.28);
    }
    .objectif { font-size: .83rem; font-style: italic; color: var(--muted); min-height: 18px; margin-bottom: 14px; font-weight: 500; }

    /* Code input */
    .code-entree { display: flex; gap: 10px; margin-top: 8px; }
    .code-entree input {
      flex: 0 0 auto;
      width: 108px;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: .22em;
      text-transform: uppercase;
      text-align: center;
      outline: none;
      transition: border-color .2s;
      color: var(--primary);
      background: var(--surface);
    }
    .code-entree input:focus { border-color: var(--accent); }

    /* Boutons principaux */
    .btn-principal {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .05em;
      transition: all .2s;
      font-family: inherit;
    }
    .btn-principal.vert {
      background: linear-gradient(135deg, var(--vert), var(--vert-lt));
      color: white;
      box-shadow: 0 4px 16px rgba(30,144,80,.32);
    }
    .btn-principal.vert:hover  { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(30,144,80,.42); }
    .btn-principal.vert:disabled { opacity: .38; cursor: default; transform: none; box-shadow: none; }
    .btn-principal.brun {
      background: var(--primary);
      color: white;
    }
    .btn-principal.brun:hover { opacity: .84; transform: translateY(-1px); }
    .btn-principal.brun:disabled { opacity: .38; cursor: default; transform: none; }

    .msg-erreur { color: #c0392b; font-size: .83rem; margin-top: 8px; display: none; font-weight: 500; }
    .msg-erreur.visible { display: block; }

    /* ── Vue jeu ── */
    #vue-jeu {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #vue-jeu.visible { display: flex; }

    /* Barre d'info (en jeu) */
    #jeu-sidebar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 560px;
    }
    #jeu-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .info-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .info-badge.clan {
      background: linear-gradient(135deg, var(--accent), var(--accent-lt));
      color: white;
      box-shadow: 0 2px 8px rgba(184,104,8,.25);
    }
    .info-badge.online {
      background: linear-gradient(135deg, var(--vert), var(--vert-lt));
      color: white;
      box-shadow: 0 2px 8px rgba(30,144,80,.25);
    }
    .btn-retour {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      color: var(--muted);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .2s;
      margin-left: auto;
    }
    .btn-retour:hover { border-color: var(--accent); color: var(--accent); }

    /* Numéro annoncé */
    #annonce {
      display: none;
      background: var(--primary);
      color: white;
      border-radius: 14px;
      padding: 12px 20px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 20px rgba(44,26,14,.28);
    }
    #annonce.visible { display: block; }
    .annonce-label  { font-size: .65rem; color: #b8956a; margin-bottom: 3px; text-transform: uppercase; letter-spacing: .12em; font-weight: 600; }
    .annonce-num    { font-family: 'Cinzel', serif; font-size: 3rem; font-weight: 900; color: var(--accent-lt); line-height: 1; }
    .annonce-wendat { font-size: .88rem; font-style: italic; color: #c4905a; margin-top: 4px; }

    /* Grille bingo */
    .bingo-wrap { width: 100%; max-width: 560px; }
    .bingo-grid {
      display: grid;
      grid-template-columns: 2.4rem repeat(6, 1fr);
      gap: 5px;
      background: var(--primary);
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(44,26,14,.32), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .row-label {
      color: white;
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      letter-spacing: .04em;
    }
    .cell {
      background: white;
      aspect-ratio: 1/1;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      transition: all .12s;
      user-select: none;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
      border: 2px solid transparent;
    }
    .cell:hover { transform: scale(.94); border-color: rgba(184,104,8,.35); }
    .cell:active { transform: scale(.86); }
    .cell.cible { border-color: var(--accent-lt); background: #fffbf2; box-shadow: 0 0 0 1px var(--accent-lt), 0 2px 8px rgba(224,144,48,.2); }
    .cell.marque::after { content: '🌽'; position: absolute; font-size: 1.65rem; z-index: 2; }
    .cell.auto-marque { background: #fff8e8; border-color: rgba(224,144,48,.28); }
    .cell.coeur { background: #f5f0e8; font-size: 1.5rem; cursor: default; border-color: transparent; }
    .cell.coeur:hover { transform: none; border-color: transparent; }
    .cell.coeur:active { transform: none; }

    /* Bouton WENDIO ! */
    #btn-wendio {
      display: none;
      width: 100%;
      background: linear-gradient(135deg, var(--vert), var(--vert-lt));
      color: white;
      border: none;
      border-radius: 14px;
      padding: 20px;
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: .1em;
      cursor: pointer;
      animation: pulse 1.2s infinite;
      box-shadow: 0 6px 24px rgba(30,144,80,.48);
    }
    #btn-wendio.visible { display: block; }
    @keyframes pulse {
      0%,100% { transform: scale(1);     box-shadow: 0 6px 24px rgba(30,144,80,.48); }
      50%      { transform: scale(1.025); box-shadow: 0 10px 32px rgba(30,144,80,.68); }
    }

    /* ── Paysage tablette ── */
    @media (orientation: landscape) and (min-height: 400px) {
      body {
        flex-direction: row;
        align-items: flex-start;
        justify-content: center;
        padding: 12px;
        gap: 14px;
      }
      h1 { font-size: 1.5rem; margin-bottom: 8px; }
      .mode-bar { margin-bottom: 12px; }

      #vue-jeu {
        flex-direction: row;
        align-items: flex-start;
        justify-content: center;
        gap: 14px;
        width: 100%;
        max-width: 900px;
      }
      #jeu-sidebar {
        width: 200px;
        flex-shrink: 0;
        max-width: none;
        padding-top: 4px;
      }
      #jeu-info { flex-direction: column; align-items: flex-start; }
      .btn-retour { margin-left: 0; }
      #annonce { max-width: none; border-radius: 12px; padding: 10px 14px; }
      .annonce-num { font-size: 2.4rem; }
      #btn-wendio { max-width: none; font-size: 1.1rem; padding: 14px; }
      .bingo-wrap { flex: 1; max-width: none; }
      .bingo-grid { grid-auto-rows: 1fr; }
    }

    /* ── Overlay connexion ── */
    #overlay-rejoindre {
      display: none; position: fixed; inset: 0;
      background: rgba(15,8,0,.78);
      backdrop-filter: blur(6px);
      z-index: 200;
      justify-content: center; align-items: center;
    }
    #overlay-rejoindre.visible { display: flex; }
    .form-rejoindre {
      background: var(--surface);
      border-radius: 20px;
      padding: 36px 30px;
      width: 90%; max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,.4);
      border: 1px solid var(--border);
    }
    .form-rejoindre h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.25rem;
      color: var(--accent);
      margin-bottom: 6px;
      letter-spacing: .06em;
    }
    .form-rejoindre .code-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--vert), var(--vert-lt));
      color: white;
      font-family: 'Cinzel', serif;
      font-weight: 900;
      letter-spacing: .2em;
      padding: 5px 16px;
      border-radius: 8px;
      margin-bottom: 18px;
      font-size: 1.15rem;
      box-shadow: 0 3px 12px rgba(30,144,80,.3);
    }
    .form-rejoindre label {
      display: block;
      font-size: .72rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 5px;
      margin-top: 14px;
      text-transform: uppercase;
      letter-spacing: .1em;
    }
    .form-rejoindre input {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
      color: var(--primary);
      background: var(--surface);
    }
    .form-rejoindre input:focus { border-color: var(--accent); }
    .form-clan { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
    .btn-clan-join {
      padding: 10px 8px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: #fdf7ee;
      cursor: pointer;
      font-weight: 700;
      font-size: .88rem;
      line-height: 1.4;
      transition: all .2s;
      text-align: center;
      font-family: inherit;
      color: var(--primary);
    }
    .btn-clan-join:hover { border-color: var(--accent); background: #fef3e2; }
    .btn-clan-join.actif {
      background: linear-gradient(135deg, var(--accent), var(--accent-lt));
      color: white;
      border-color: transparent;
      box-shadow: 0 3px 12px rgba(184,104,8,.3);
    }

    /* ── Victoire overlay ── */
    #win-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.88);
      backdrop-filter: blur(6px);
      z-index: 100; justify-content: center; align-items: center;
    }
    #win-overlay.visible { display: flex; }
    .win-card {
      background: linear-gradient(160deg, #1a5c35 0%, #0d3820 100%);
      padding: 44px 50px;
      border-radius: 24px;
      border: 1px solid #2ecc71;
      text-align: center;
      animation: pop .4s cubic-bezier(.175,.885,.32,1.275);
      max-width: 480px; width: 90%;
      box-shadow: 0 0 60px rgba(46,204,113,.22), 0 24px 60px rgba(0,0,0,.7);
    }
    .win-card h2 {
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      margin-bottom: 12px;
      letter-spacing: .1em;
      color: white;
    }
    .win-joueur { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; color: #80edb5; }
    .win-clan   { font-size: .95rem; color: #58b880; margin-bottom: 24px; }
    .win-card button {
      background: rgba(255,255,255,.1);
      color: white;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 10px;
      padding: 12px 26px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      margin: 4px;
      transition: all .2s;
      font-family: inherit;
    }
    .win-card button:hover { background: rgba(255,255,255,.2); }
    @keyframes pop { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ── Bouton plein écran ── */
    #btn-fullscreen {
      position: fixed;
      top: 10px; right: 12px;
      z-index: 300;
      background: rgba(255,255,255,.75);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      transition: color .2s, border-color .2s, background .2s;
      backdrop-filter: blur(4px);
    }
    #btn-fullscreen:hover { color: var(--accent); border-color: var(--accent); background: rgba(255,255,255,.95); }
    #btn-fullscreen svg { width: 18px; height: 18px; display: block; }
    #btn-fullscreen .icon-compress { display: none; }
    #btn-fullscreen.actif .icon-expand   { display: none; }
    #btn-fullscreen.actif .icon-compress { display: block; }

    #btn-accueil {
      position: fixed;
      top: 10px; right: 54px;
      z-index: 300;
      background: rgba(255,255,255,.75);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s, border-color .2s, background .2s;
      backdrop-filter: blur(4px);
    }
    #btn-accueil:hover { color: var(--accent); border-color: var(--accent); background: rgba(255,255,255,.95); }
    #btn-accueil svg { width: 18px; height: 18px; display: block; }

    /* ── Toast autre gagnant ── */
    #toast-gagnant {
      position: fixed; top: 16px; left: 50%;
      transform: translateX(-50%) translateY(-140%);
      background: linear-gradient(135deg, #0d3820, #1a5c35);
      border: 1px solid #2ecc71;
      border-radius: 14px;
      padding: 13px 14px 13px 18px;
      z-index: 150;
      width: min(90vw, 340px);
      box-shadow: 0 8px 28px rgba(0,0,0,.45);
      display: flex; align-items: center; gap: 12px;
      transition: transform .4s cubic-bezier(.175,.885,.32,1.275);
    }
    #toast-gagnant.visible { transform: translateX(-50%) translateY(0); }
    .toast-body { flex: 1; }
    .toast-rang { font-size: .7rem; color: #80edb5; letter-spacing: .08em; margin-bottom: 2px; }
    .toast-nom  { font-size: 1rem; font-weight: 700; color: white; }
    .toast-clan { font-size: .75rem; color: #80edb5; margin-top: 2px; }
    .toast-close {
      background: rgba(255,255,255,.12); border: none; color: white;
      width: 26px; height: 26px; border-radius: 50%;
      cursor: pointer; font-size: 1.1rem; line-height: 1; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .toast-close:hover { background: rgba(255,255,255,.25); }
  </style>
</head>
<body>

<a id="btn-accueil" href="lobby.html" title="Accueil">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
  </svg>
</a>

<button id="btn-fullscreen" title="Plein &#233;cran" onclick="toggleFullscreen()">
  <svg class="icon-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
  </svg>
  <svg class="icon-compress" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
  </svg>
</button>

<!-- Overlay connexion en ligne -->
<div id="overlay-rejoindre">
  <div class="form-rejoindre">
    <h2>Rejoindre la partie</h2>
    <div class="code-badge" id="badge-code">----</div>
    <label>Votre prénom</label>
    <input type="text" id="input-nom" placeholder="ex : Marie" maxlength="20" />
    <label>Votre clan</label>
    <div class="form-clan" id="form-clan-grid"></div>
    <button class="btn-principal vert" id="btn-rejoindre-submit" onclick="rejoindrePartie()" disabled style="margin-top:20px;">Rejoindre &#8594;</button>
    <div class="msg-erreur" id="msg-erreur"></div>
  </div>
</div>

<!-- Toast autre gagnant -->
<div id="toast-gagnant">
  <div class="toast-body">
    <div class="toast-rang" id="toast-rang"></div>
    <div class="toast-nom"  id="toast-nom"></div>
    <div class="toast-clan" id="toast-clan"></div>
  </div>
  <button class="toast-close" onclick="fermerToast()">&#215;</button>
</div>

<!-- Overlay victoire -->
<div id="win-overlay">
  <div class="win-card">
    <h2>&#127805; WENDIO ! &#127805;</h2>
    <div class="win-joueur" id="win-joueur"></div>
    <div class="win-clan"   id="win-clan"></div>
    <button onclick="fermerWin()">Continuer</button>
    <button onclick="nouvellePartie()">Nouvelle carte</button>
  </div>
</div>

<!-- ── SETUP ── -->
<h1>WENDIO</h1>

<div class="mode-bar">
  <button class="btn-mode actif" id="btn-local"  onclick="setMode('local')">Local</button>
  <button class="btn-mode"       id="btn-online" onclick="setMode('online')">En ligne</button>
</div>

<div id="vue-setup">

  <!-- Setup local -->
  <div class="setup-panel" id="setup-local">
    <div class="section-titre">Choisissez votre clan</div>
    <div class="clan-grid" id="clan-grid"></div>
    <div class="objectif" id="objectif">S&#233;lectionnez un clan pour voir votre objectif</div>
    <button class="btn-principal brun" id="btn-jouer" onclick="commencerLocal()" disabled>Jouer &#8594;</button>
  </div>

  <!-- Setup en ligne -->
  <div class="setup-panel" id="setup-online" style="display:none;">
    <div class="section-titre">Rejoindre une partie en ligne</div>
    <div class="code-entree">
      <input type="text" id="input-code" placeholder="CODE" maxlength="4"
        oninput="this.value=this.value.toUpperCase(); validerCode()"
        onkeydown="if(event.key==='Enter') entrerCode()" />
      <button class="btn-principal vert" id="btn-entrer-code" onclick="entrerCode()" disabled style="flex:1;">Rejoindre &#8594;</button>
    </div>
    <div class="msg-erreur" id="msg-erreur-code"></div>
  </div>

</div>

<!-- ── VUE JEU ── -->
<div id="vue-jeu">

  <div id="jeu-sidebar">
    <div id="jeu-info">
      <span class="info-badge clan"   id="badge-clan"   style="display:none;"></span>
      <span class="info-badge online" id="badge-online" style="display:none;">&#127760; En ligne</span>
      <button class="btn-retour" onclick="nouvellePartie()">&#8617; Nouvelle carte</button>
    </div>

    <div id="annonce">
      <div class="annonce-label">Num&#233;ro annonc&#233;</div>
      <div class="annonce-num"    id="annonce-num">&#8212;</div>
      <div class="annonce-wendat" id="annonce-wendat"></div>
    </div>

    <button id="btn-wendio" onclick="declarerVictoire()">&#127805; WENDIO !</button>
  </div>

  <div class="bingo-wrap">
    <div class="bingo-grid" id="grille"></div>
  </div>

</div>

<script src="data.js"></script>
<script>
  'use strict';
  let carteActuelle = null;
  let clanActuel    = null;
  let selectionnees = new Set();
  let modeOnline    = false;
  let socket        = null;
  let codePartie    = null;
  let nomJoueur     = null;
  let clanJoinForm  = null;
  let tiresOnline   = [];

  // ── Création DOM sécurisée d'un bouton clan ──────────────────────────
  function creerBoutonClan(nom, clan, className, onclickFn) {
    const btn    = document.createElement('button');
    btn.className = className;
    btn.id        = className === 'btn-clan' ? 'clan-' + nom : '';

    const icon   = document.createTextNode(clan.icon + ' ');
    const strong = document.createElement('strong');
    strong.textContent = nom;
    const br     = document.createElement('br');
    const small  = document.createElement('small');
    small.style.fontWeight = 'normal';
    small.style.fontSize   = '.8em';
    small.textContent = clan.wendat;

    btn.append(icon, strong, br, small);
    btn.onclick = onclickFn;
    return btn;
  }

  // ── Init ─────────────────────────────────────────────────────────────
  function demarrer() {
    const clanGridEl = document.getElementById('clan-grid');
    Object.entries(CLANS).forEach(([nom, clan]) => {
      clanGridEl.appendChild(
        creerBoutonClan(nom, clan, 'btn-clan', () => setClan(nom))
      );
    });

    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    if (code) {
      setMode('online');
      activerModeOnline(code.toUpperCase());
    }
  }

  // ── Toggle local / en ligne ──────────────────────────────────────────
  function setMode(mode) {
    modeOnline = (mode === 'online');
    document.getElementById('btn-local').classList.toggle('actif',  !modeOnline);
    document.getElementById('btn-online').classList.toggle('actif',  modeOnline);
    document.getElementById('setup-local').style.display  = modeOnline ? 'none'  : 'block';
    document.getElementById('setup-online').style.display = modeOnline ? 'block' : 'none';
  }

  // ── Setup local ──────────────────────────────────────────────────────
  function setClan(nom) {
    clanActuel = nom;
    document.querySelectorAll('.btn-clan').forEach(b => b.classList.remove('actif'));
    document.getElementById('clan-' + nom).classList.add('actif');
    const clan = CLANS[nom];
    document.getElementById('objectif').textContent =
      'Objectif : ' + clan.label + ' \u2014 ' + clan.points + ' pt' + (clan.points > 1 ? 's' : '') + ' WENDIO';
    document.getElementById('btn-jouer').disabled = false;
  }

  function commencerLocal() {
    carteActuelle = genererCarte();
    selectionnees = new Set();
    afficherBadgeClan(clanActuel);
    basculerVersJeu();
    rendreGrille();
  }

  // ── Setup en ligne ───────────────────────────────────────────────────
  function validerCode() {
    const code = document.getElementById('input-code').value.trim();
    document.getElementById('btn-entrer-code').disabled = code.length !== 4;
  }

  function entrerCode() {
    const code = document.getElementById('input-code').value.trim().toUpperCase();
    if (code.length !== 4) return;
    activerModeOnline(code);
  }

  function activerModeOnline(code) {
    modeOnline = true;
    codePartie = code;

    document.getElementById('badge-code').textContent = codePartie;

    const formClan = document.getElementById('form-clan-grid');
    formClan.replaceChildren();
    Object.entries(CLANS).forEach(([nom, clan]) => {
      formClan.appendChild(
        creerBoutonClan(nom, clan, 'btn-clan-join', () => {
          clanJoinForm = nom;
          document.querySelectorAll('.btn-clan-join').forEach(b => b.classList.remove('actif'));
          document.querySelector('.btn-clan-join[data-nom="' + nom + '"]').classList.add('actif');
          validerFormulaire();
        })
      );
      // stocker nom dans dataset pour ciblage
      formClan.lastChild.dataset.nom = nom;
    });

    document.getElementById('input-nom').addEventListener('input', validerFormulaire);
    document.getElementById('overlay-rejoindre').classList.add('visible');
    chargerSocket();
  }

  function validerFormulaire() {
    const nom = document.getElementById('input-nom').value.trim();
    document.getElementById('btn-rejoindre-submit').disabled = !(nom && clanJoinForm);
  }

  // ── Socket.io ────────────────────────────────────────────────────────
  function chargerSocket() {
    const s    = document.createElement('script');
    s.src      = '/socket.io/socket.io.js';
    s.onload   = connecterSocket;
    s.onerror  = () => {
      const el = document.getElementById('msg-erreur');
      el.textContent = 'Impossible de joindre le serveur.';
      el.classList.add('visible');
    };
    document.head.appendChild(s);
  }

  function connecterSocket() {
    socket = io();  // eslint-disable-line no-undef

    socket.on('rejoint', ({ tirages }) => {
      document.getElementById('overlay-rejoindre').classList.remove('visible');
      clanActuel    = clanJoinForm;
      nomJoueur     = document.getElementById('input-nom').value.trim();
      tiresOnline   = tirages;
      carteActuelle = genererCarte();

      afficherBadgeClan(clanActuel);
      document.getElementById('badge-online').style.display = 'inline-flex';
      document.getElementById('annonce').classList.add('visible');
      basculerVersJeu();
      rendreGrille();
      tirages.forEach(num => marquerNumero(num));
    });

    socket.on('numero-tire', ({ num }) => {
      tiresOnline.push(num);
      document.getElementById('annonce-num').textContent    = num;
      const data = NOMBRES[num];
      document.getElementById('annonce-wendat').textContent = data ? data.wendat : '';
      marquerNumero(num);
      jouerSon(num);
      verifierVictoire();
    });

    socket.on('gagnant', ({ nom, clan, rang }) => {
      if (nom === nomJoueur) afficherGagnant(nom, clan, rang);
      else afficherToastGagnant(nom, clan, rang);
    });

    socket.on('partie-terminee', () => {
      alert('La partie a \u00e9t\u00e9 termin\u00e9e par le meneur.');
    });

    socket.on('erreur', msg => {
      const el = document.getElementById('msg-erreur');
      el.textContent = msg;
      el.classList.add('visible');
    });
  }

  function rejoindrePartie() {
    const nom = document.getElementById('input-nom').value.trim();
    if (!nom || !clanJoinForm || !socket) return;
    socket.emit('rejoindre', { code: codePartie, nom, clan: clanJoinForm });
  }

  // ── Bascule setup ↔ jeu ──────────────────────────────────────────────
  function basculerVersJeu() {
    document.querySelector('h1').style.display        = 'none';
    document.querySelector('.mode-bar').style.display = 'none';
    document.getElementById('vue-setup').style.display = 'none';
    document.getElementById('vue-jeu').classList.add('visible');
  }

  function basculerVersSetup() {
    document.querySelector('h1').style.display        = '';
    document.querySelector('.mode-bar').style.display = '';
    document.getElementById('vue-setup').style.display = '';
    document.getElementById('vue-jeu').classList.remove('visible');
  }

  function afficherBadgeClan(nom) {
    const clan  = CLANS[nom] || {};
    const badge = document.getElementById('badge-clan');
    badge.textContent    = clan.icon + ' ' + nom;
    badge.style.display  = 'inline-flex';
  }

  // ── Nouvelle carte / retour setup ────────────────────────────────────
  function nouvellePartie() {
    clanActuel    = null;
    carteActuelle = null;
    selectionnees = new Set();
    tiresOnline   = [];
    modeOnline    = false;
    socket        = null;
    codePartie    = null;
    nomJoueur     = null;
    clanJoinForm  = null;

    document.querySelectorAll('.btn-clan').forEach(b => b.classList.remove('actif'));
    document.getElementById('objectif').textContent    = 'S\u00e9lectionnez un clan pour voir votre objectif';
    document.getElementById('btn-jouer').disabled      = true;
    document.getElementById('input-code').value        = '';
    document.getElementById('btn-entrer-code').disabled = true;
    document.getElementById('msg-erreur-code').classList.remove('visible');

    document.getElementById('annonce').classList.remove('visible');
    document.getElementById('btn-wendio').classList.remove('visible');
    document.getElementById('win-overlay').classList.remove('visible');
    document.getElementById('badge-clan').style.display   = 'none';
    document.getElementById('badge-online').style.display = 'none';
    document.getElementById('grille').replaceChildren();

    setMode('local');
    basculerVersSetup();
  }

  // ── Marquage ─────────────────────────────────────────────────────────
  function marquerNumero(num) {
    LIGNES.forEach(ligne => {
      for (let col = 0; col < 6; col++) {
        if (!estCoeur(ligne, col) && valeurCase(carteActuelle, ligne, col) === num) {
          selectionnees.add(ligne + col);
        }
      }
    });
    rendreGrille();
  }

  // ── Rendu grille ─────────────────────────────────────────────────────
  function rendreGrille() {
    const grille = document.getElementById('grille');
    grille.replaceChildren();

    LIGNES.forEach((ligne, ligneIdx) => {
      const label = document.createElement('div');
      label.className        = 'row-label';
      label.style.background = CONFIG[ligne].couleur;
      label.textContent      = ligne;
      grille.appendChild(label);

      for (let col = 0; col < 6; col++) {
        const cell = document.createElement('div');
        const id   = ligne + col;

        if (estCoeur(ligne, col)) {
          cell.className   = 'cell coeur';
          cell.textContent = COEUR[id] || '\uD83D\uDC3E';
        } else {
          const val    = valeurCase(carteActuelle, ligne, col);
          const marque = selectionnees.has(id);
          const isTire = modeOnline && tiresOnline.includes(val);

          cell.className = ['cell',
            marque            ? 'marque'      : '',
            isTire && !marque ? 'auto-marque' : '',
            estCible(ligneIdx, col) ? 'cible' : ''
          ].filter(Boolean).join(' ');

          cell.textContent = val;
          cell.onclick = () => {
            if (selectionnees.has(id)) selectionnees.delete(id);
            else selectionnees.add(id);
            if (!modeOnline) jouerSon(val);
            rendreGrille();
            if (!modeOnline) verifierVictoire();
          };
        }
        grille.appendChild(cell);
      }
    });
  }

  function estCible(ligneIdx, colIdx) {
    if (!clanActuel) return false;
    const ligne = LIGNES[ligneIdx];
    const v = CLANS[clanActuel].victoire;
    if (v === 'coins')  return (ligneIdx === 0 || ligneIdx === 5) && (colIdx === 0 || colIdx === 5);
    if (v === 'carre')  return ligneIdx >= 1 && ligneIdx <= 4 && colIdx >= 1 && colIdx <= 4 && !estCoeur(ligne, colIdx);
    if (v === 'pleine') return !estCoeur(ligne, colIdx);
    return false;
  }

  // ── Victoire ─────────────────────────────────────────────────────────
  function verifierVictoire() {
    if (!clanActuel) return;
    const has = (l, c) => selectionnees.has(l + c);
    const v   = CLANS[clanActuel].victoire;
    let gagne = false;

    if (v === 'coins') {
      gagne = has('W',0) && has('W',5) && has('O',0) && has('O',5);
    } else if (v === 'pleine') {
      let n = 0;
      LIGNES.forEach(l => { for (let c = 0; c < 6; c++) if (!estCoeur(l,c) && has(l,c)) n++; });
      gagne = n >= 32;
    } else if (v === 'carre') {
      gagne = true;
      for (let li = 1; li <= 4 && gagne; li++)
        for (let ci = 1; ci <= 4 && gagne; ci++) {
          const l = LIGNES[li];
          if (!estCoeur(l,ci) && !has(l,ci)) gagne = false;
        }
    } else if (v === 'ligne') {
      for (let li = 0; li < 6 && !gagne; li++) {
        const l = LIGNES[li];
        let ok = true;
        for (let ci = 0; ci < 6; ci++) if (!estCoeur(l,ci) && !has(l,ci)) { ok = false; break; }
        if (ok) gagne = true;
      }
    }

    if (gagne) {
      if (modeOnline) document.getElementById('btn-wendio').classList.add('visible');
      else afficherGagnant(null, clanActuel, null);
    }
  }

  function declarerVictoire() {
    if (socket && codePartie) {
      socket.emit('victoire', { code: codePartie, nom: nomJoueur, clan: clanActuel });
    }
    document.getElementById('btn-wendio').classList.remove('visible');
  }

  const MEDAILLES = ['\uD83E\uDD47', '\uD83E\uDD48', '\uD83E\uDD49'];

  function afficherGagnant(nom, clan, rang) {
    const c       = CLANS[clan] || {};
    const medaille = rang ? (MEDAILLES[rang - 1] || '#' + rang) : MEDAILLES[0];
    document.getElementById('win-joueur').textContent = nom
      ? medaille + ' ' + (c.icon || '') + ' ' + nom
      : (c.icon || '') + ' Vous avez gagn\u00e9 !';
    document.getElementById('win-clan').textContent = clan + ' \u2014 ' + (c.label || '');
    document.getElementById('win-overlay').classList.add('visible');
  }

  let _toastTimer = null;
  function afficherToastGagnant(nom, clan, rang) {
    const c       = CLANS[clan] || {};
    const medaille = MEDAILLES[rang - 1] || '#' + rang;
    const ordinal  = rang === 1 ? '1re place' : rang + 'e place';
    document.getElementById('toast-rang').textContent  = medaille + ' ' + ordinal;
    document.getElementById('toast-nom').textContent   = (c.icon || '') + ' ' + nom + ' a gagn\u00e9 !';
    document.getElementById('toast-clan').textContent  = clan + ' \u2014 Continuez \u00e0 jouer !';
    document.getElementById('toast-gagnant').classList.add('visible');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(fermerToast, 6000);
  }

  function fermerToast() { document.getElementById('toast-gagnant').classList.remove('visible'); }
  function fermerWin()   { document.getElementById('win-overlay').classList.remove('visible'); }

  demarrer();

  // Plein écran
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }
  document.addEventListener('fullscreenchange', () => {
    document.getElementById('btn-fullscreen').classList.toggle('actif', !!document.fullscreenElement);
  });
  if (!document.documentElement.requestFullscreen) {
    document.getElementById('btn-fullscreen').style.display = 'none';
  }

</script>
</body>
</html>

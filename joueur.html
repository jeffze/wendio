<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WENDIO — Carte Joueur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2c1a0e;
      --accent:  #b86808;
      --accent-lt: #e09030;
      --bg:      #ede0c8;
      --surface: #ffffff;
      --vert:    #1e9050;
      --vert-lt: #28c86a;
      --muted:   #7a5030;
      --border:  #d4b888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      background-image: radial-gradient(ellipse 120% 50% at 50% 0%, #e4d0a8 0%, #ede0c8 55%);
      color: var(--primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 32px;
    }

    h1 {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 2rem;
      letter-spacing: .22em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-lt) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      filter: drop-shadow(0 1px 3px rgba(184,104,8,.18));
    }

    /* ── Toggle local / en ligne ── */
    .mode-bar {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 4px;
      margin-bottom: 18px;
      box-shadow: 0 1px 8px rgba(60,30,10,.08);
    }
    .btn-mode {
      padding: 9px 22px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 600;
      font-size: .88rem;
      border-radius: 50px;
      transition: all .2s;
      letter-spacing: .03em;
      font-family: inherit;
    }
    .btn-mode.actif {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-lt) 100%);
      color: white;
      box-shadow: 0 2px 10px rgba(184,104,8,.35);
      font-weight: 700;
    }

    /* ── Vue setup ── */
    #vue-setup {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .setup-panel {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(60,30,10,.1);
      border: 1px solid var(--border);
      padding: 20px;
      width: 100%;
    }
    .section-titre {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .13em;
      color: var(--muted);
      margin-bottom: 12px;
      font-weight: 700;
    }

    /* Clan grid */
    .clan-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
    .btn-clan {
      background: #fdf7ee;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: .88rem;
      transition: all .2s;
      text-align: center;
      line-height: 1.4;
      font-family: inherit;
      color: var(--primary);
    }
    .btn-clan:hover { border-color: var(--accent); background: #fef3e2; }
    .btn-clan.actif {
      background: linear-gradient(135deg, var(--accent), var(--accent-lt));
      color: white;
      border-color: transparent;
      box-shadow: 0 3px 12px rgba(184,104,8,.28);
    }
    .objectif { font-size: .83rem; font-style: italic; color: var(--muted); min-height: 18px; margin-bottom: 14px; font-weight: 500; }

    /* Code input */
    .code-entree { display: flex; gap: 10px; margin-top: 8px; }
    .code-entree input {
      flex: 0 0 auto;
      width: 108px;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: .22em;
      text-transform: uppercase;
      text-align: center;
      outline: none;
      transition: border-color .2s;
      color: var(--primary);
      background: var(--surface);
    }
    .code-entree input:focus { border-color: var(--accent); }

    /* Boutons principaux */
    .btn-principal {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .05em;
      transition: all .2s;
      font-family: inherit;
    }
    .btn-principal.vert {
      background: linear-gradient(135deg, var(--vert), var(--vert-lt));
      color: white;
      box-shadow: 0 4px 16px rgba(30,144,80,.32);
    }
    .btn-principal.vert:hover  { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(30,144,80,.42); }
    .btn-principal.vert:disabled { opacity: .38; cursor: default; transform: none; box-shadow: none; }
    .btn-principal.brun {
      background: var(--primary);
      color: white;
    }
    .btn-principal.brun:hover { opacity: .84; transform: translateY(-1px); }
    .btn-principal.brun:disabled { opacity: .38; cursor: default; transform: none; }

    .msg-erreur { color: #c0392b; font-size: .83rem; margin-top: 8px; display: none; font-weight: 500; }
    .msg-erreur.visible { display: block; }

    /* ── Vue jeu ── */
    #vue-jeu {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #vue-jeu.visible { display: flex; }

    /* Barre d'info (en jeu) */
    #jeu-sidebar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 560px;
    }
    #jeu-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .info-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .info-badge.clan {
      background: linear-gradient(135deg, var(--accent), var(--accent-lt));
      color: white;
      box-shadow: 0 2px 8px rgba(184,104,8,.25);
    }
    .info-badge.online {
      background: linear-gradient(135deg, var(--vert), var(--vert-lt));
      color: white;
      box-shadow: 0 2px 8px rgba(30,144,80,.25);
    }
    .btn-retour {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      color: var(--muted);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .2s;
      margin-left: auto;
    }
    .btn-retour:hover { border-color: var(--accent); color: var(--accent); }

    /* Numéro annoncé */
    #annonce {
      display: none;
      background: var(--primary);
      color: white;
      border-radius: 14px;
      padding: 12px 20px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 20px rgba(44,26,14,.28);
    }
    #annonce.visible { display: block; }
    .annonce-label   { font-size: .65rem; color: #b8956a; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .12em; font-weight: 600; }
    /* Grille bingo */
    .bingo-wrap { width: 100%; max-width: 560px; }
    .bingo-grid {
      display: grid;
      grid-template-columns: 2.4rem repeat(6, 1fr);
      gap: 5px;
      background: var(--primary);
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(44,26,14,.32), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .row-label {
      color: white;
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      letter-spacing: .04em;
    }
    .cell {
      background: white;
      aspect-ratio: 1/1;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 8px;
      font-size: 1.35rem;
      font-weight: 900;
      font-family: 'Cinzel', serif;
      cursor: pointer;
      position: relative;
      transition: all .12s;
      user-select: none;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
      border: 2px solid transparent;
    }
    .cell:hover { transform: scale(.94); border-color: rgba(184,104,8,.35); }
    .cell:active { transform: scale(.86); }
    .cell.cible { border-color: var(--accent-lt); background: #fffbf2; box-shadow: 0 0 0 1px var(--accent-lt), 0 2px 8px rgba(224,144,48,.2); }
    .cell.marque::after {
      content: '';
      position: absolute;
      top: 3px; right: 3px;
      width: 1rem; height: 1rem;
      background: url('grain-mais.svg') center/contain no-repeat;
      z-index: 2;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,.35));
    }
    .cell.auto-marque { background: #fff8e8; border-color: rgba(224,144,48,.28); }
    .cell.coeur { background: #b88840; font-size: 0; cursor: default; border-color: transparent; padding: 2px; overflow: hidden; }
    .cell.coeur:hover { transform: none; border-color: transparent; }
    .cell.coeur:active { transform: none; }
    /* Images animaux dans les cases cœur */
    .coeur-animal { width: 100%; height: 100%; object-fit: contain; display: block; }

    /* Partie terminée : grille en lecture seule */
    body.partie-terminee .cell { pointer-events: none; }
    body.partie-terminee .bingo-grid { opacity: .82; }

    /* Bouton WENDIO ! */
    #btn-wendio {
      display: none;
      width: 100%;
      background: linear-gradient(135deg, var(--vert), var(--vert-lt));
      color: white;
      border: none;
      border-radius: 14px;
      padding: 20px;
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: .1em;
      cursor: pointer;
      animation: pulse 1.2s infinite;
      box-shadow: 0 6px 24px rgba(30,144,80,.48);
    }
    #btn-wendio.visible { display: block; }
    @keyframes pulse {
      0%,100% { transform: scale(1);     box-shadow: 0 6px 24px rgba(30,144,80,.48); }
      50%      { transform: scale(1.025); box-shadow: 0 10px 32px rgba(30,144,80,.68); }
    }

    /* ── Paysage tablette ── */
    @media (orientation: landscape) and (min-height: 400px) {
      body {
        flex-direction: row;
        align-items: flex-start;
        justify-content: center;
        padding: 12px;
        gap: 14px;
      }
      h1 { font-size: 1.5rem; margin-bottom: 8px; }
      .mode-bar { margin-bottom: 12px; }

      #vue-jeu {
        flex-direction: row;
        align-items: flex-start;
        justify-content: center;
        gap: 14px;
        width: 100%;
        max-width: 900px;
      }
      #jeu-sidebar {
        width: 200px;
        flex-shrink: 0;
        max-width: none;
        padding-top: 4px;
      }
      #jeu-info { flex-direction: column; align-items: flex-start; }
      .btn-retour { margin-left: 0; }
      #annonce { max-width: none; border-radius: 12px; padding: 10px 14px; }
      #btn-wendio { max-width: none; font-size: 1.1rem; padding: 14px; }
      .bingo-wrap { flex: 1; max-width: none; }
      .bingo-grid { grid-auto-rows: 1fr; }
    }

    /* ── Overlay connexion ── */
    #overlay-rejoindre {
      display: none; position: fixed; inset: 0;
      background: rgba(15,8,0,.78);
      backdrop-filter: blur(6px);
      z-index: 200;
      justify-content: center; align-items: center;
    }
    #overlay-rejoindre.visible { display: flex; }
    .form-rejoindre {
      background: var(--surface);
      border-radius: 20px;
      padding: 36px 30px;
      width: 90%; max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,.4);
      border: 1px solid var(--border);
    }
    .form-rejoindre h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.25rem;
      color: var(--accent);
      margin-bottom: 6px;
      letter-spacing: .06em;
    }
    .form-rejoindre .code-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--vert), var(--vert-lt));
      color: white;
      font-family: 'Cinzel', serif;
      font-weight: 900;
      letter-spacing: .2em;
      padding: 5px 16px;
      border-radius: 8px;
      margin-bottom: 18px;
      font-size: 1.15rem;
      box-shadow: 0 3px 12px rgba(30,144,80,.3);
    }
    .form-rejoindre label {
      display: block;
      font-size: .72rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 5px;
      margin-top: 14px;
      text-transform: uppercase;
      letter-spacing: .1em;
    }
    .form-rejoindre input {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
      color: var(--primary);
      background: var(--surface);
    }
    .form-rejoindre input:focus { border-color: var(--accent); }
    .form-clan { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
    .btn-clan-join {
      padding: 10px 8px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: #fdf7ee;
      cursor: pointer;
      font-weight: 700;
      font-size: .88rem;
      line-height: 1.4;
      transition: all .2s;
      text-align: center;
      font-family: inherit;
      color: var(--primary);
    }
    .btn-clan-join:hover { border-color: var(--accent); background: #fef3e2; }
    .btn-clan-join.actif {
      background: linear-gradient(135deg, var(--accent), var(--accent-lt));
      color: white;
      border-color: transparent;
      box-shadow: 0 3px 12px rgba(184,104,8,.3);
    }

    /* ── Victoire overlay ── */
    #win-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.88);
      backdrop-filter: blur(6px);
      z-index: 100; justify-content: center; align-items: center;
    }
    #win-overlay.visible { display: flex; }
    .win-card {
      background: linear-gradient(160deg, #1a5c35 0%, #0d3820 100%);
      padding: 44px 50px;
      border-radius: 24px;
      border: 1px solid #2ecc71;
      text-align: center;
      animation: pop .4s cubic-bezier(.175,.885,.32,1.275);
      max-width: 480px; width: 90%;
      box-shadow: 0 0 60px rgba(46,204,113,.22), 0 24px 60px rgba(0,0,0,.7);
    }
    .win-card h2 {
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      margin-bottom: 12px;
      letter-spacing: .1em;
      color: white;
    }
    .win-joueur { font-size: 1.5rem; font-weight: 700; margin-bottom: 14px; color: #80edb5; }
    .win-trophee {
      display: none;
      margin: 6px auto 16px;
      max-width: 200px;
      width: 58%;
      border-radius: 14px;
      box-shadow: 0 14px 38px rgba(0,0,0,.55), 0 0 36px rgba(232,201,108,.22);
      animation: trophyIn .9s cubic-bezier(.22,1,.32,1) .15s both;
    }
    .win-trophee.visible { display: block; }
    @keyframes trophyIn {
      from { opacity: 0; transform: scale(.55) translateY(30px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }
    .win-clan   { font-size: .95rem; color: #58b880; margin-bottom: 24px; }
    .win-card button {
      background: rgba(255,255,255,.1);
      color: white;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 10px;
      padding: 12px 26px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      margin: 4px;
      transition: all .2s;
      font-family: inherit;
    }
    .win-card button:hover { background: rgba(255,255,255,.2); }
    @keyframes pop { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ── Bouton plein écran ── */
    #btn-fullscreen {
      position: fixed;
      top: 10px; right: 12px;
      z-index: 300;
      background: rgba(255,255,255,.75);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      transition: color .2s, border-color .2s, background .2s;
      backdrop-filter: blur(4px);
    }
    #btn-fullscreen:hover { color: var(--accent); border-color: var(--accent); background: rgba(255,255,255,.95); }
    #btn-fullscreen svg { width: 18px; height: 18px; display: block; }
    #btn-fullscreen .icon-compress { display: none; }
    #btn-fullscreen.actif .icon-expand   { display: none; }
    #btn-fullscreen.actif .icon-compress { display: block; }

    #btn-accueil {
      position: fixed;
      top: 10px; right: 54px;
      z-index: 300;
      background: rgba(255,255,255,.75);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s, border-color .2s, background .2s;
      backdrop-filter: blur(4px);
    }
    #btn-accueil:hover { color: var(--accent); border-color: var(--accent); background: rgba(255,255,255,.95); }
    #btn-accueil svg { width: 18px; height: 18px; display: block; }

    /* ── Toast autre gagnant ── */
    #toast-gagnant {
      position: fixed; top: 16px; left: 50%;
      transform: translateX(-50%) translateY(-140%);
      background: linear-gradient(135deg, #0d3820, #1a5c35);
      border: 1px solid #2ecc71;
      border-radius: 14px;
      padding: 13px 14px 13px 18px;
      z-index: 150;
      width: min(90vw, 340px);
      box-shadow: 0 8px 28px rgba(0,0,0,.45);
      display: flex; align-items: center; gap: 12px;
      transition: transform .4s cubic-bezier(.175,.885,.32,1.275);
    }
    #toast-gagnant.visible { transform: translateX(-50%) translateY(0); }
    .toast-body { flex: 1; }
    .toast-rang { font-size: .7rem; color: #80edb5; letter-spacing: .08em; margin-bottom: 2px; }
    .toast-nom  { font-size: 1rem; font-weight: 700; color: white; }
    .toast-clan { font-size: .75rem; color: #80edb5; margin-top: 2px; }
    .toast-close {
      background: rgba(255,255,255,.12); border: none; color: white;
      width: 26px; height: 26px; border-radius: 50%;
      cursor: pointer; font-size: 1.1rem; line-height: 1; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .toast-close:hover { background: rgba(255,255,255,.25); }
  </style>
</head>
<body>


<a id="btn-accueil" href="lobby.html" data-i18n-attr="title:joueur.tooltip.accueil" title="Accueil">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
  </svg>
</a>

<button id="btn-fullscreen" data-i18n-attr="title:joueur.tooltip.fullscreen" title="Plein &#233;cran" onclick="toggleFullscreen()">
  <svg class="icon-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
  </svg>
  <svg class="icon-compress" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>
  </svg>
</button>

<!-- Overlay connexion en ligne -->
<div id="overlay-rejoindre">
  <div class="form-rejoindre">
    <h2 data-i18n="joueur.rejoindre.titre">Rejoindre la partie</h2>
    <div class="code-badge" id="badge-code">----</div>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:6px;font-style:italic;" data-i18n="joueur.rejoindre.info_clan">
      Le clan est imposé par le meneur — il sera affiché dès que vous rejoignez.
    </p>
    <label data-i18n="joueur.rejoindre.label_nom">Votre prénom</label>
    <input type="text" id="input-nom" placeholder="ex : Marie" maxlength="20"
           data-i18n-attr="placeholder:joueur.rejoindre.ph_nom"
           onkeydown="if(event.key==='Enter' && !this.disabled) document.getElementById('btn-rejoindre-submit').click()" />
    <button class="btn-principal vert" id="btn-rejoindre-submit" onclick="rejoindrePartie()" disabled style="margin-top:20px;" data-i18n="joueur.rejoindre.btn">Rejoindre &#8594;</button>
    <div class="msg-erreur" id="msg-erreur"></div>
  </div>
</div>

<!-- Toast autre gagnant -->
<div id="toast-gagnant">
  <div class="toast-body">
    <div class="toast-rang" id="toast-rang"></div>
    <div class="toast-nom"  id="toast-nom"></div>
    <div class="toast-clan" id="toast-clan"></div>
  </div>

<h1>WENDIO</h1>

<div class="mode-bar" id="barre-mode">

<div id="vue-setup">

  <div class="setup-panel" id="setup-local">

        oninput="this.value=this.value.toUpperCase(); validerCode()"
        onkeydown="if(event.key==='Enter') entrerCode()" />
      <button class="btn-principal vert" id="btn-entrer-code" onclick="entrerCode()" disabled style="flex:1;" data-i18n="joueur.setup_online.btn">Rejoindre &#8594;</button>

<!-- ── VUE JEU ── -->
<div id="vue-jeu">

  <div id="jeu-sidebar">
    <div id="jeu-info">
      <span class="info-badge clan"   id="badge-clan"   style="display:none;"></span>
      <span class="info-badge online" id="badge-online" style="display:none;" data-i18n="joueur.badge_online">&#127760; En ligne</span>
      <button class="btn-retour" onclick="nouvellePartie()" data-i18n="joueur.btn_nouvelle_carte">&#8617; Nouvelle carte</button>

      <div class="annonce-label" data-i18n="joueur.annonce.label">Case s&#233;lectionn&#233;e</div>
      <img id="annonce-image" alt="Carte WENDIO" style="display:none; width:100%; max-width:280px; height:auto; margin:0 auto; border-radius:10px; box-shadow:0 3px 12px rgba(0,0,0,.4); cursor:pointer;" onclick="rejouerSon()">
    </div>

    <button id="btn-wendio" onclick="declarerVictoire()" data-i18n="joueur.btn_wendio">&#127805; WENDIO !</button>

    <div class="bingo-grid" id="grille"></div>

<script src="data.js"></script>
<script src="i18n.js"></script>
<script>
  'use strict';
  let carteActuelle       = null;
  let clanActuel          = null;
  let selectionnees       = new Set();
  let modeOnline          = false;
  let socket              = null;
  let codePartie          = null;
  let nomJoueur           = null;
  let tiresOnline         = [];
  let dernierNumeroClique = null;
  let modeDemo            = false;
  let oursDataUrl         = null; // cache canvas : fond noir supprimé
  let partieTerminee      = false;

  // Token de session pour permettre la reconnexion (téléphone en veille, refresh, etc.)
  // Stocké dans sessionStorage : un par onglet, partagé entre rechargements.
  let sessionToken = (function () {
    try {
      let t = sessionStorage.getItem('wendio-token');
      if (!t) {
        t = (crypto && crypto.randomUUID)
          ? crypto.randomUUID()
          : 'tok-' + Math.random().toString(36).slice(2) + '-' + Date.now();
        sessionStorage.setItem('wendio-token', t);
      }
      return t;
    } catch (e) {
      return 'tok-' + Math.random().toString(36).slice(2) + '-' + Date.now();
    }
  })();

  // Persistance des cases marquées par le joueur (anti-perte au retour de
  // veille). Sylvain veut que le joueur marque lui-même → si on perdait les
  // marques à chaque mise en veille, ce serait pénible. sessionStorage suffit
  // (survit aux veilles, pas à la fermeture d'onglet).
  const SELECTIONS_KEY = 'wendio-selections-' + sessionToken;
  function persistSelections() {
    try { sessionStorage.setItem(SELECTIONS_KEY, JSON.stringify([...selectionnees])); } catch (e) {}
  }
  function loadSelections() {
    try {
      const raw = sessionStorage.getItem(SELECTIONS_KEY);
      if (raw) selectionnees = new Set(JSON.parse(raw));
    } catch (e) {}
  }
  function clearSelections() {
    try { sessionStorage.removeItem(SELECTIONS_KEY); } catch (e) {}
  }

  // ── Création DOM sécurisée d'un bouton clan ──────────────────────────
  function creerBoutonClan(nom, clan, className, onclickFn) {
    const btn    = document.createElement('button');
    btn.className = className;
    btn.id        = className === 'btn-clan' ? 'clan-' + nom : '';

    const icon   = document.createTextNode(clan.icon + ' ');
    const strong = document.createElement('strong');
    strong.textContent = nom;
    const br     = document.createElement('br');
    const small  = document.createElement('small');
    small.style.fontWeight = 'normal';
    small.style.fontSize   = '.8em';
    small.textContent = clan.wendat;

    btn.append(icon, strong, br, small);
    btn.onclick = onclickFn;
    return btn;
  }

  // ── Init ─────────────────────────────────────────────────────────────
  function demarrer() {
    const clanGridEl = document.getElementById('clan-grid');
    Object.entries(CLANS).forEach(([nom, clan]) => {
      clanGridEl.appendChild(
        creerBoutonClan(nom, clan, 'btn-clan', () => setClan(nom))
      );
    });

    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    if (code) {
      setMode('online');
      activerModeOnline(code.toUpperCase());
    }
    if (params.get('demo') === 'local') {
      modeDemo = true;
      document.getElementById('barre-mode').style.display = 'none';
    }
  }

  // ── Toggle local / en ligne ──────────────────────────────────────────
  function setMode(mode) {
    modeOnline = (mode === 'online');
    document.getElementById('btn-local').classList.toggle('actif',  !modeOnline);
    document.getElementById('btn-online').classList.toggle('actif',  modeOnline);
    document.getElementById('setup-local').style.display  = modeOnline ? 'none'  : 'block';
    document.getElementById('setup-online').style.display = modeOnline ? 'block' : 'none';
  }

  // ── Helpers i18n ─────────────────────────────────────────────────────
  function clanLabel(nom) {
    const key = 'clan.' + nom + '.victoire';
    const txt = t(key);
    if (txt && txt !== key) return txt;
    return (CLANS[nom] && CLANS[nom].label) || '';
  }
  function objectifTexte(nom) {
    const clan = CLANS[nom] || {};
    return t('joueur.objectif_format', {
      label: clanLabel(nom),
      n:     clan.points,
      s:     clan.points > 1 ? 's' : '',
    });
  }

  // ── Setup local ──────────────────────────────────────────────────────
  function setClan(nom) {
    clanActuel = nom;
    document.querySelectorAll('.btn-clan').forEach(b => b.classList.remove('actif'));
    document.getElementById('clan-' + nom).classList.add('actif');
    const objEl = document.getElementById('objectif');
    objEl.dataset.clan = nom;
    objEl.removeAttribute('data-i18n');
    objEl.textContent = objectifTexte(nom);
    document.getElementById('btn-jouer').disabled = false;
  }

  function commencerLocal() {
    carteActuelle = genererCarte();
    selectionnees = new Set();
    clearSelections();
    afficherBadgeClan(clanActuel);
    basculerVersJeu();
    rendreGrille();
  }

  // ── Setup en ligne ───────────────────────────────────────────────────
  function validerCode() {
    const code = document.getElementById('input-code').value.trim();
    document.getElementById('btn-entrer-code').disabled = code.length !== 4;
  }

  function entrerCode() {
    const code = document.getElementById('input-code').value.trim().toUpperCase();
    if (code.length !== 4) return;
    activerModeOnline(code);
  }

  function activerModeOnline(code) {
    modeOnline = true;
    codePartie = code;

    document.getElementById('badge-code').textContent = codePartie;
    document.getElementById('input-nom').addEventListener('input', validerFormulaire);
    document.getElementById('overlay-rejoindre').classList.add('visible');
    chargerSocket();
  }

  function validerFormulaire() {
    const nom = document.getElementById('input-nom').value.trim();
    document.getElementById('btn-rejoindre-submit').disabled = !nom;
  }

  // ── Socket.io ────────────────────────────────────────────────────────
  function chargerSocket() {
    const s    = document.createElement('script');
    s.src      = '/socket.io/socket.io.js';
    s.onload   = connecterSocket;
    s.onerror  = () => {
      const el = document.getElementById('msg-erreur');
      el.textContent = t('joueur.serveur_introuvable');
      el.classList.add('visible');
    };
    document.head.appendChild(s);
  }

  function connecterSocket() {
    socket = io();  // eslint-disable-line no-undef

    // Reconnexion automatique : si on était déjà dans la partie, re-rejoindre avec le token
    socket.on('connect', () => {
      if (clanActuel && nomJoueur && codePartie && !partieTerminee) {
        socket.emit('rejoindre', { code: codePartie, nom: nomJoueur, sessionToken });
      }
    });

    socket.on('rejoint', ({ tirages, clan, carte }) => {
      const enJeu = document.getElementById('vue-jeu').classList.contains('visible');
      if (enJeu && clanActuel) {
        // Reconnexion silencieuse — on garde nomJoueur, on resync les tirages
        // et la carte. Les marques du joueur sont restaurées depuis
        // sessionStorage (Sylvain Lavertu : le joueur marque lui-même).
        tiresOnline   = tirages;
        carteActuelle = carte;
        loadSelections();
        rendreGrille();
        return;
      }
      // Premier rejoint — pas d'auto-marquage : le joueur tap pour rattraper
      // s'il arrive après que des tirages ont déjà eu lieu.
      document.getElementById('overlay-rejoindre').classList.remove('visible');
      clanActuel    = clan;
      nomJoueur     = document.getElementById('input-nom').value.trim();
      tiresOnline   = tirages;
      carteActuelle = carte;

      afficherBadgeClan(clanActuel);
      document.getElementById('badge-online').style.display = 'inline-flex';
      document.getElementById('annonce').classList.add('visible');
      basculerVersJeu();
      rendreGrille();
    });

    socket.on('numero-tire', ({ num }) => {
      if (partieTerminee) return;
      tiresOnline.push(num);
      afficherInfoNumero(num);
      // Pas d'auto-marquage ni de son : le joueur marque lui-même sa carte
      // au tap (Sylvain Lavertu, feedback 2026-05-04 — « le joueur marque
      // lui-même sa carte pour le garder actif »). La case devient juste
      // .auto-marque (fond jaune pâle) tant qu'il n'a pas cliqué.
      rendreGrille();
    });

    socket.on('gagnant', ({ nom, clan }) => {
      if (nom === nomJoueur) afficherGagnant(nom, clan, true);
      else afficherGagnant(nom, clan, false);
    });

    socket.on('partie-terminee', ({ raison }) => {
      partieTerminee = true;
      document.getElementById('btn-wendio').classList.remove('visible');
      document.body.classList.add('partie-terminee');
      // Si termin\u00e9e par le meneur (sans gagnant), informer le joueur
      if (raison === 'meneur' || raison === 'meneur-deco') {
        const winJoueur = document.getElementById('win-joueur');
        // Si l'overlay 'gagnant' est d\u00e9j\u00e0 visible, ne pas l'\u00e9craser
        if (!document.getElementById('win-overlay').classList.contains('visible')) {
          winJoueur.textContent = t('joueur.partie_terminee');
          document.getElementById('win-clan').textContent =
            raison === 'meneur-deco' ? t('joueur.meneur_deco') : t('joueur.meneur_clos');
          document.getElementById('win-trophee').classList.remove('visible');
          document.getElementById('win-overlay').classList.add('visible');
        }
      }
    });

    socket.on('erreur', msg => {
      const el = document.getElementById('msg-erreur');
      el.textContent = msg;
      el.classList.add('visible');
      // Réactive le bouton Rejoindre si on était en train de rejoindre
      const btn = document.getElementById('btn-rejoindre-submit');
      if (btn) btn.disabled = !document.getElementById('input-nom').value.trim();
    });
  }

  function rejoindrePartie() {
    const nom = document.getElementById('input-nom').value.trim();
    if (!nom || !socket) return;
    document.getElementById('btn-rejoindre-submit').disabled = true; // anti double-click
    socket.emit('rejoindre', { code: codePartie, nom, sessionToken });
  }

  // Forcer la reconnexion socket au retour de veille (tel/onglet revient au premier plan)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && socket && !socket.connected) {
      try { socket.connect(); } catch (e) {}
    }
  });

  // ── Bascule setup ↔ jeu ──────────────────────────────────────────────
  function basculerVersJeu() {
    document.querySelector('h1').style.display        = 'none';
    document.querySelector('.mode-bar').style.display = 'none';
    document.getElementById('vue-setup').style.display = 'none';
    document.getElementById('vue-jeu').classList.add('visible');
  }

  function basculerVersSetup() {
    document.querySelector('h1').style.display        = '';
    if (!modeDemo) document.getElementById('barre-mode').style.display = '';
    document.getElementById('vue-setup').style.display = '';
    document.getElementById('vue-jeu').classList.remove('visible');
  }

  function afficherBadgeClan(nom) {
    const clan  = CLANS[nom] || {};
    const badge = document.getElementById('badge-clan');
    badge.textContent    = clan.icon + ' ' + nom;
    badge.style.display  = 'inline-flex';
  }

  // ── Nouvelle carte / retour setup ────────────────────────────────────
  function nouvellePartie() {
    if (socket) { try { socket.disconnect(); } catch (e) {} }
    clearSelections();
    clanActuel          = null;
    carteActuelle       = null;
    selectionnees       = new Set();
    tiresOnline         = [];
    modeOnline          = false;
    socket              = null;
    codePartie          = null;
    nomJoueur           = null;
    dernierNumeroClique = null;
    partieTerminee      = false;
    document.body.classList.remove('partie-terminee');

    document.querySelectorAll('.btn-clan').forEach(b => b.classList.remove('actif'));
    const objEl = document.getElementById('objectif');
    delete objEl.dataset.clan;
    objEl.setAttribute('data-i18n', 'joueur.objectif_default');
    objEl.textContent = t('joueur.objectif_default');
    document.getElementById('btn-jouer').disabled      = true;
    document.getElementById('input-code').value        = '';
    document.getElementById('btn-entrer-code').disabled = true;
    document.getElementById('msg-erreur-code').classList.remove('visible');

    document.getElementById('annonce').classList.remove('visible');
    document.getElementById('btn-wendio').classList.remove('visible');
    document.getElementById('win-overlay').classList.remove('visible');
    document.getElementById('badge-clan').style.display   = 'none';
    document.getElementById('badge-online').style.display = 'none';
    document.getElementById('grille').replaceChildren();

    setMode('local');
    basculerVersSetup();
  }

  // ── Carte info numéro ────────────────────────────────────────────────
  function afficherInfoNumero(num) {
    dernierNumeroClique = num;
    const annonce = document.getElementById('annonce');

    // Carte image (toute l'info — numéro, ligne, nom Wendat, phonétique, traductions — est dans l'image)
    const img = document.getElementById('annonce-image');
    img.src = `cartes/${num}.jpg`;
    img.style.display = 'block';
    img.title = t('joueur.carte_tooltip', { n: num });

    annonce.classList.add('visible');
  }

  function rejouerSon() {
    if (dernierNumeroClique) jouerSon(dernierNumeroClique);
  }

  // ── Suppression fond noir de l'ours par flood fill depuis les bords ──
  // BFS depuis les 4 bords : seuls les pixels noirs *connectés au fond* deviennent
  // transparents. Les zones sombres à l'intérieur du pelage sont préservées.
  function prepareOursImage(imgEl) {
    if (oursDataUrl) { imgEl.src = oursDataUrl; return; }
    const src = new Image();
    src.onload = function () {
      try {
        const W = src.width, H = src.height;
        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(src, 0, 0);
        const imgData = ctx.getImageData(0, 0, W, H);
        const d = imgData.data;
        const SEUIL = 40; // max(R,G,B) < SEUIL → considéré "fond noir"

        // BFS : marque les pixels fond connectés aux bords
        const fond = new Uint8Array(W * H);
        const queue = [];
        const essayer = (x, y) => {
          const k = y * W + x;
          if (fond[k]) return;
          const i = k * 4;
          if (Math.max(d[i], d[i+1], d[i+2]) < SEUIL) { fond[k] = 1; queue.push(k); }
        };
        for (let x = 0; x < W; x++) { essayer(x, 0); essayer(x, H - 1); }
        for (let y = 1; y < H - 1; y++) { essayer(0, y); essayer(W - 1, y); }
        let qi = 0;
        while (qi < queue.length) {
          const k = queue[qi++];
          const x = k % W, y = (k / W) | 0;
          if (x > 0)     essayer(x - 1, y);
          if (x < W - 1) essayer(x + 1, y);
          if (y > 0)     essayer(x, y - 1);
          if (y < H - 1) essayer(x, y + 1);
        }

        // Rend transparent uniquement les pixels du fond
        for (let k = 0; k < W * H; k++) if (fond[k]) d[k * 4 + 3] = 0;

        ctx.putImageData(imgData, 0, 0);
        oursDataUrl = canvas.toDataURL('image/png');
        imgEl.src = oursDataUrl;
      } catch (e) { /* fallback silencieux (file://) */ }
    };
    src.src = 'sources/Ours.png';
  }

  // ── Rendu grille ─────────────────────────────────────────────────────
  function rendreGrille() {
    const grille = document.getElementById('grille');
    grille.replaceChildren();

    LIGNES.forEach((ligne, ligneIdx) => {
      const label = document.createElement('div');
      label.className        = 'row-label';
      label.style.background = CONFIG[ligne].couleur;
      label.textContent      = ligne;
      grille.appendChild(label);

      for (let col = 0; col < 6; col++) {
        const cell = document.createElement('div');
        const id   = ligne + col;

        if (estCoeur(ligne, col)) {
          const clan = COEUR_CLAN[id] || 'Tortue';
          cell.className = 'cell coeur';
          const img = document.createElement('img');
          img.alt = clan;
          img.className = 'coeur-animal';
          if (clan === 'Ours') {
            img.src = 'sources/Ours.png'; // placeholder pendant le traitement
            prepareOursImage(img);
          } else {
            img.src = 'sources/' + clan + '.png';
          }
          cell.appendChild(img);
        } else {
          const val    = valeurCase(carteActuelle, ligne, col);
          const marque = selectionnees.has(id);
          const isTire = modeOnline && tiresOnline.includes(val);

          cell.className = ['cell',
            marque            ? 'marque'      : '',
            isTire && !marque ? 'auto-marque' : '',
            estCible(ligneIdx, col) ? 'cible' : ''
          ].filter(Boolean).join(' ');

          cell.textContent = val;
          cell.onclick = () => {
            if (partieTerminee) return;
            // En online, anti-triche : marquage permis seulement si le chiffre
            // a été tiré (Sylvain Lavertu, feedback 2026-05-04). Le tap reste
            // libre pour afficher l'info + rejouer le son.
            const peutMarquer = !modeOnline || tiresOnline.includes(val);
            if (peutMarquer) {
              if (selectionnees.has(id)) selectionnees.delete(id);
              else selectionnees.add(id);
              persistSelections();
            }
            afficherInfoNumero(val);
            jouerSon(val);
            rendreGrille();
            if (peutMarquer) verifierVictoire();
          };
        }
        grille.appendChild(cell);
      }
    });
  }

  function estCible(ligneIdx, colIdx) {
    if (!clanActuel) return false;
    const ligne = LIGNES[ligneIdx];
    const v = CLANS[clanActuel].victoire;
    if (v === 'coins')  return (ligneIdx === 0 || ligneIdx === 5) && (colIdx === 0 || colIdx === 5);
    if (v === 'carre')  return ligneIdx >= 1 && ligneIdx <= 4 && colIdx >= 1 && colIdx <= 4 && !estCoeur(ligne, colIdx);
    if (v === 'pleine') return !estCoeur(ligne, colIdx);
    return false;
  }

  // ── Victoire ─────────────────────────────────────────────────────────
  function verifierVictoire() {
    if (!clanActuel) return;
    const has = (l, c) => selectionnees.has(l + c);
    const v   = CLANS[clanActuel].victoire;
    let gagne = false;

    if (v === 'coins') {
      gagne = has('W',0) && has('W',5) && has('O',0) && has('O',5);
    } else if (v === 'pleine') {
      let n = 0;
      LIGNES.forEach(l => { for (let c = 0; c < 6; c++) if (!estCoeur(l,c) && has(l,c)) n++; });
      gagne = n >= 32;
    } else if (v === 'carre') {
      gagne = true;
      for (let li = 1; li <= 4 && gagne; li++)
        for (let ci = 1; ci <= 4 && gagne; ci++) {
          const l = LIGNES[li];
          if (!estCoeur(l,ci) && !has(l,ci)) gagne = false;
        }
    } else if (v === 'ligne') {
      // Horizontale
      for (let li = 0; li < 6 && !gagne; li++) {
        const l = LIGNES[li];
        let ok = true;
        for (let ci = 0; ci < 6; ci++) if (!estCoeur(l,ci) && !has(l,ci)) { ok = false; break; }
        if (ok) gagne = true;
      }
      // Verticale
      for (let ci = 0; ci < 6 && !gagne; ci++) {
        let ok = true;
        for (let li = 0; li < 6; li++) {
          const l = LIGNES[li];
          if (!estCoeur(l,ci) && !has(l,ci)) { ok = false; break; }
        }
        if (ok) gagne = true;
      }
      // Diagonale principale (\)
      if (!gagne) {
        let ok = true;
        for (let i = 0; i < 6; i++) {
          const l = LIGNES[i];
          if (!estCoeur(l,i) && !has(l,i)) { ok = false; break; }
        }
        if (ok) gagne = true;
      }
      // Diagonale anti (/)
      if (!gagne) {
        let ok = true;
        for (let i = 0; i < 6; i++) {
          const l = LIGNES[i]; const ci = 5 - i;
          if (!estCoeur(l,ci) && !has(l,ci)) { ok = false; break; }
        }
        if (ok) gagne = true;
      }
    }

    if (gagne) {
      if (modeOnline) document.getElementById('btn-wendio').classList.add('visible');
      else afficherGagnant(null, clanActuel, true);
    }
  }

  function declarerVictoire() {
    if (socket && codePartie) {
      socket.emit('victoire', { code: codePartie, nom: nomJoueur, clan: clanActuel });
    }
    document.getElementById('btn-wendio').classList.remove('visible');
  }

  const TROPHEE = '\uD83C\uDFC6';

  function afficherGagnant(nom, clan, isMoi) {
    const c = CLANS[clan] || {};
    const winJoueur = document.getElementById('win-joueur');
    winJoueur.dataset.gagnant = JSON.stringify({ nom, clan, isMoi });
    if (isMoi) {
      const bravo = nom ? t('joueur.bravo', { nom }) : t('joueur.bravo_anon');
      winJoueur.textContent = TROPHEE + ' ' + (c.icon || '') + ' ' + bravo;
    } else {
      winJoueur.textContent = (c.icon || '') + ' ' + t('joueur.a_gagne', { nom });
    }
    const winClanEl = document.getElementById('win-clan');
    winClanEl.dataset.clan = clan;
    winClanEl.textContent = clan + ' \u2014 ' + clanLabel(clan);
    const trophee = document.getElementById('win-trophee');
    if (c.points) {
      trophee.src = 'cartes/clan-' + c.points + 'pt.jpg';
      trophee.classList.add('visible');
    } else {
      trophee.classList.remove('visible');
    }
    document.getElementById('win-overlay').classList.add('visible');
    document.getElementById('btn-wendio').classList.remove('visible');
  }

  function fermerWin() { document.getElementById('win-overlay').classList.remove('visible'); }

  function quitterPartie() {
    if (socket) { try { socket.disconnect(); } catch (e) {} }
    clearSelections();
    try { sessionStorage.removeItem('wendio-token'); } catch (e) {}
    window.location.href = 'lobby.html';
  }

  demarrer();

  // i18n : re-traduit les textes composés (objectif, win-clan, gagnant)
  // quand la langue change.
  i18n.onLangChange(() => {
    const objEl = document.getElementById('objectif');
    if (objEl.dataset.clan) {
      objEl.textContent = objectifTexte(objEl.dataset.clan);
    }
    const winClan = document.getElementById('win-clan');
    if (winClan.dataset.clan) {
      winClan.textContent = winClan.dataset.clan + ' — ' + clanLabel(winClan.dataset.clan);
    }
    const winJoueur = document.getElementById('win-joueur');
    if (winJoueur.dataset.gagnant) {
      try {
        const { nom, clan, isMoi } = JSON.parse(winJoueur.dataset.gagnant);
        const c = CLANS[clan] || {};
        if (isMoi) {
          const bravo = nom ? t('joueur.bravo', { nom }) : t('joueur.bravo_anon');
          winJoueur.textContent = TROPHEE + ' ' + (c.icon || '') + ' ' + bravo;
        } else {
          winJoueur.textContent = (c.icon || '') + ' ' + t('joueur.a_gagne', { nom });
        }
      } catch (e) {}
    }
  });

  // Plein écran
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }
  document.addEventListener('fullscreenchange', () => {
    document.getElementById('btn-fullscreen').classList.toggle('actif', !!document.fullscreenElement);
  });
  if (!document.documentElement.requestFullscreen) {
    document.getElementById('btn-fullscreen').style.display = 'none';
  }

</script>
<script src="/_widget-loader.js" defer></script>

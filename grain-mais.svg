<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 26">
  <defs>
    <!-- Corps doré : centre clair → bord orangé chaud -->
    <radialGradient id="kernel-body" cx="35%" cy="40%" r="80%">
      <stop offset="0%"   stop-color="#fef3c7"/>
      <stop offset="35%"  stop-color="#fcd34d"/>
      <stop offset="70%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <!-- Pédicule blanc-crème -->
    <radialGradient id="kernel-germ" cx="40%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#fffbeb"/>
      <stop offset="60%"  stop-color="#f5edd0"/>
      <stop offset="100%" stop-color="#c4b78c"/>
    </radialGradient>
  </defs>

  <!-- Corps du grain : ovale arrondi, base large, sommet légèrement plus pointu côté germe -->
  <path d="M 13 4
           C 19 3.5, 24.5 7.5, 24.5 14
           C 24.5 20, 20 23.5, 13 23.5
           C 6 23.5, 3 19.5, 3 13.5
           C 3 8, 7 4.2, 13 4 Z"
        fill="url(#kernel-body)"
        stroke="#7c2d12"
        stroke-width="0.5"
        stroke-opacity="0.7"/>

  <!-- Pédicule blanc qui dépasse en haut-droite (caractéristique du grain détaché de l'épi) -->
  <ellipse cx="20" cy="5.5" rx="3.4" ry="2.2"
           fill="url(#kernel-germ)"
           stroke="#9a8755"
           stroke-width="0.4"
           stroke-opacity="0.6"
           transform="rotate(-18 20 5.5)"/>

  <!-- Reflet sur le côté gauche-haut, donne le volume -->
  <ellipse cx="8.5" cy="9" rx="2.2" ry="3.2"
           fill="#fffbeb" opacity="0.5"
           transform="rotate(-15 8.5 9)"/>
</svg>
